<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Defense - Map Editor Pro 6.2</title>
    <script src="assets-list.js"></script>
    <style>
        :root { --bg-dark: #2c3e50; --panel-bg: #34495e; --text-light: #ecf0f1; --accent: #e74c3c; --accent-b: #3498db; }
        body { background-color: var(--bg-dark); color: var(--text-light); font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: flex-start; padding: 20px; gap: 20px; margin: 0; height: 100vh; box-sizing: border-box; overflow: hidden; }
        
        /* Třísloupcový layout */
        .sidebar-left { display: flex; flex-direction: column; gap: 12px; width: 350px; background: var(--panel-bg); padding: 20px; border-radius: 8px; height: calc(100vh - 40px); overflow-y: auto; box-sizing: border-box; }
        main { border: 4px solid var(--panel-bg); border-radius: 8px; background: #000; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); flex-shrink: 0; }
        .sidebar-right { display: flex; flex-direction: column; gap: 12px; width: 420px; background: var(--panel-bg); padding: 20px; border-radius: 8px; height: calc(100vh - 40px); overflow-y: auto; box-sizing: border-box; }
        
        canvas { display: block; cursor: crosshair; }
        h2 { margin: 0 0 10px 0; font-size: 1.5rem; }
        h3 { margin: 10px 0 5px 0; font-size: 1.1rem; border-bottom: 1px solid #7f8c8d; padding-bottom: 5px; }
        
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        button { background: #7f8c8d; color: white; border: none; padding: 10px 15px; font-size: 0.9rem; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; flex: 1; }
        button:hover:not(:disabled) { filter: brightness(1.1); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        button.active-path { background: var(--accent); }
        button.active-pathB { background: var(--accent-b); }
        button.active-slot { background: #2ecc71; }
        button.active-obj { background: #9b59b6; }
        button.btn-add { background: #2980b9; padding: 6px; font-size: 0.85rem; }
        
        .input-group { display: flex; flex-direction: column; gap: 5px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 4px; }
        .flex-row { display: flex; gap: 10px; align-items: center; }
        .flex-row > div { flex: 1; display: flex; flex-direction: column; gap: 2px; }
        
        label { font-size: 0.8rem; font-weight: bold; color: #bdc3c7; }
        input, select { padding: 6px; border-radius: 4px; border: 1px solid #7f8c8d; background: #2c3e50; color: white; font-family: inherit; width: 100%; box-sizing: border-box; }
        
        /* Kompaktní design vln */
        .wave-item { background: rgba(0,0,0,0.3); padding: 6px 8px; border-radius: 4px; border-left: 3px solid #e67e22; position: relative; margin-bottom: 6px; }
        .wave-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-top: 4px; }
        .wave-grid > div { display: flex; align-items: center; gap: 4px; background: rgba(0,0,0,0.2); padding: 2px 4px; border-radius: 3px; }
        .wave-grid span { font-size: 0.75rem; cursor: help; flex-shrink: 0; }
        .wave-grid input, .wave-grid select { padding: 2px 4px; border: none; background: transparent; color: white; font-size: 0.75rem; width: 100%; box-sizing: border-box; outline: none; }
        .wave-grid input:focus, .wave-grid select:focus { background: rgba(255,255,255,0.1); }
        .wave-grid select option { background: var(--bg-dark); color: white; font-weight: bold; }
        
        /* Tlačítka pro akce s vlnami */
        .wave-actions { position: absolute; top: 4px; right: 4px; display: flex; gap: 2px; }
        .btn-wave-action { padding: 2px 4px; font-size: 0.75rem; border-radius: 3px; flex: none; width: auto; background: #34495e; }
        .btn-wave-remove { background: #c0392b; }
        
        .instructions { color: #f1c40f; font-size: 0.85rem; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 4px; border-left: 3px solid #f1c40f; margin: 0; }
        .bg-picker { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
        .bg-btn { font-size: 0.75rem; background: #2c3e50; padding: 5px; }
        
        .palette { display: flex; flex-wrap: wrap; gap: 5px; flex-grow: 1; overflow-y: auto; background: #1a252f; padding: 10px; border-radius: 4px; border: 1px solid #7f8c8d; align-content: flex-start; }
        .palette img { max-width: 50px; max-height: 50px; object-fit: contain; cursor: pointer; border: 2px solid transparent; border-radius: 4px; background: rgba(255,255,255,0.1); padding: 2px; transition: 0.2s; }
        .palette img:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }
        .palette img.selected { border-color: var(--accent); background: rgba(231, 76, 60, 0.2); }
        .palette-empty { color: #7f8c8d; font-size: 0.8rem; font-style: italic; width: 100%; text-align: center; padding: 20px 0; }
    </style>
</head>
<body>

    <aside class="sidebar-left">
        <h2>Konfigurace kola</h2>
        <div class="flex-row">
            <div>
                <label for="level-select">Načíst Level</label>
                <select id="level-select" onchange="loadLevel(parseInt(this.value))"></select>
            </div>
            <div>
                <label for="starting-gold">Zlaťáky do startu</label>
                <input type="number" id="starting-gold" value="1400" step="50" onchange="updateMeta()">
            </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin: 10px 0 5px 0; border-bottom: 1px solid #7f8c8d; padding-bottom: 5px;">
            <h3 style="margin: 0; border: none; padding: 0;">Vlny nepřátel</h3>
            <button class="btn-add" onclick="addWave()">➕ Přidat vlnu</button>
        </div>
        
        <div id="waves-container" style="flex-grow: 1; overflow-y: auto; padding-right: 5px;"></div>

        <hr style="width: 100%; border: 0; border-top: 1px solid #7f8c8d; margin-top: auto; margin-bottom: 10px;">
        
        <textarea id="output" style="position: absolute; left: -9999px;"></textarea>
        <button onclick="copyCode()" style="background: #27ae60; width: 100%; padding: 15px; font-size: 1.1rem; box-shadow: 0 -4px 10px rgba(0,0,0,0.2);">📋 Kopírovat kód LEVEL_DATA</button>
    </aside>

    <main>
        <canvas id="editor" width="800" height="800"></canvas>
    </main>

    <aside class="sidebar-right">
        <h2>Nástroje & Assets</h2>
        <p class="instructions">
            🖱️ Levý klik: Přidat / Přesunout<br>
            🖱️ Pravý klik: Smazat bod/objekt<br>
            🖱️ Kolečko myši: Zvětšit/zmenšit vybraný objekt<br>
            💡 Bod Cesty B se automaticky chytne Cesty A.
        </p>

        <div class="btn-group">
            <button id="btn-path" class="active-path" onclick="setMode('path')">✏️ Cesta A</button>
            <button id="btn-pathB" onclick="setMode('pathB')">✏️ Cesta B</button>
            <button id="btn-slot" onclick="setMode('slot')">⭕ Věže</button>
            <button id="btn-obj" onclick="setMode('object')">🌲 Objekty</button>
        </div>

        <div class="bg-picker">
            <button class="bg-btn" onclick="setBG('Pokemon/Backgrounds/grass.png')">🌿 Tráva</button>
            <button class="bg-btn" onclick="setBG('Pokemon/Backgrounds/sand.jpg')">⏳ Písek</button>
            <button class="bg-btn" onclick="setBG('Pokemon/Backgrounds/ice.jpg')">❄️ Led</button>
            <button class="bg-btn" onclick="setBG('Pokemon/Backgrounds/rocks.jpg')">🪨 Skály</button>
            <button class="bg-btn" onclick="setBG('Pokemon/Backgrounds/lava.jpg')">🌋 Láva</button>
        </div>

        <div class="input-group" id="obj-settings" style="display: none; flex-grow: 1; overflow: hidden;">
            <label>Vyber objekt z palety (Kolečkem myši změníš velikost):</label>
            <div id="obj-palette" class="palette">
                <div class="palette-empty">Načítám assets...</div>
            </div>
        </div>

        <hr style="width: 100%; border: 0; border-top: 1px solid #7f8c8d; margin-top: auto;">
        <div class="btn-group">
            <button onclick="undo()">↩️ Zpět</button>
            <button onclick="clearAll()" style="background: #c0392b;">🗑️ Smazat vše</button>
        </div>
    </aside>

    <script>
        let LEVEL_DATA = [];
        let ENEMY_STATS = {};

        const canvas = document.getElementById('editor');
        const ctx = canvas.getContext('2d');
        const output = document.getElementById('output');
        const wavesContainer = document.getElementById('waves-container');
        const levelSelect = document.getElementById('level-select');
        
        let mode = 'path'; 
        let data = { id: 1, background: '', startingGold: 0, path: [], pathB: [], slots: [], objects: [], waves: [] };
        let history = []; 
        let draggingPoint = null;
        let isDragging = false;
        
        const bgImg = new Image();
        const piedestalImg = new Image(); piedestalImg.src = 'Pokemon/Assets/Piedestal.png';
        
        let selectedObjectSrc = null;
        let currentObjectScale = 1.0; 
        const loadedObjectImages = {};
        const localBlobUrls = {};
        let ghostX = null, ghostY = null;
        
        const SNAP = 10;
        const MARGIN = 80;
        const HITBOX = 25;

        async function fetchGameData() {
            try {
                const response = await fetch('Pokemon.html');
                if (!response.ok) throw new Error('Nelze načíst Pokemon.html');
                const htmlText = await response.text();

                const searchStr = "const LEVEL_DATA = ";
                const startIndex = htmlText.indexOf(searchStr);
                if (startIndex === -1) throw new Error("Proměnná LEVEL_DATA nebyla nalezena.");

                const arrayStart = htmlText.indexOf('[', startIndex);
                let brackets = 0;
                let arrayEnd = -1;

                for (let i = arrayStart; i < htmlText.length; i++) {
                    if (htmlText[i] === '[') brackets++;
                    if (htmlText[i] === ']') brackets--;
                    if (brackets === 0) { arrayEnd = i + 1; break; }
                }

                if (arrayEnd === -1) throw new Error("Nepodařilo se najít konec pole LEVEL_DATA.");
                const dataString = htmlText.substring(arrayStart, arrayEnd);
                eval("LEVEL_DATA = " + dataString);

                // Načtení ENEMY_STATS
                const statsStr = "const ENEMY_STATS = ";
                const statsStart = htmlText.indexOf(statsStr);
                if (statsStart !== -1) {
                    const objStart = htmlText.indexOf('{', statsStart);
                    let objBrackets = 0, objEnd = -1;
                    for (let i = objStart; i < htmlText.length; i++) {
                        if (htmlText[i] === '{') objBrackets++;
                        if (htmlText[i] === '}') objBrackets--;
                        if (objBrackets === 0) { objEnd = i + 1; break; }
                    }
                    if (objEnd !== -1) eval("ENEMY_STATS = " + htmlText.substring(objStart, objEnd));
                }

                initSelect();
            } catch (error) {
                console.error('Chyba:', error);
                alert(`Nepodařilo se načíst data z Pokemon.html:\\n${error.message}`);
            }
        }

        function initSelect() {
            levelSelect.innerHTML = '';
            LEVEL_DATA.forEach(l => {
                const opt = document.createElement('option');
                opt.value = l.id; opt.textContent = `Level ${l.id}`;
                levelSelect.appendChild(opt);
            });
            loadLevel(1);
        }

        function loadLevel(id) {
            const level = LEVEL_DATA.find(l => l.id === id);
            if (!level) return;
            
            data = JSON.parse(JSON.stringify(level));
            if (!data.objects) data.objects = [];
            if (!data.pathB) data.pathB = [];
            data.objects.forEach(obj => { if (obj.scale === undefined) obj.scale = 1.0; });
            
            levelSelect.value = data.id;
            document.getElementById('starting-gold').value = data.startingGold;
            setBG(data.background);
            
            data.objects.forEach(obj => preloadObject(obj.src));
            renderWaves(); history = []; draw(); updateOutput();
        }

        function updateMeta() { data.startingGold = parseInt(document.getElementById('starting-gold').value) || 500; updateOutput(); }

        function getEnemyOptions(selectedType, selectedLevel) {
            let html = '';
            // Generování dropdownu přímo z parsovaných ENEMY_STATS
            for (const type in ENEMY_STATS) {
                for (const lvl in ENEMY_STATS[type]) {
                    const isSelected = (type === selectedType && parseInt(lvl) === selectedLevel) ? 'selected' : '';
                    const name = ENEMY_STATS[type][lvl].name;
                    html += `<option value="${type}-${lvl}" ${isSelected}>${name}</option>`;
                }
            }
            // Záchrana, pokud by se hra nenačetla správně
            if(html === '') html = `<option value="${selectedType}-${selectedLevel}" selected>${selectedType} Lvl ${selectedLevel}</option>`;
            return html;
        }

        function renderWaves() {
            wavesContainer.innerHTML = '';
            data.waves.forEach((wave, index) => {
                const item = document.createElement('div');
                item.className = 'wave-item';
                
                // Přidání tlačítek nahoru a dolů do HTML struktury vlny
                item.innerHTML = `
                    <div class="wave-actions">
                        <button class="btn-wave-action" title="Posunout nahoru" onclick="moveWaveUp(${index})" ${index === 0 ? 'disabled' : ''}>⬆️</button>
                        <button class="btn-wave-action" title="Posunout dolů" onclick="moveWaveDown(${index})" ${index === data.waves.length - 1 ? 'disabled' : ''}>⬇️</button>
                        <button class="btn-wave-action btn-wave-remove" title="Smazat vlnu" onclick="removeWave(${index})">❌</button>
                    </div>
                    <div style="font-size: 0.8rem; font-weight: bold; margin-bottom: 2px; color: #f39c12;">Vlna ${index + 1}</div>
                    <div class="wave-grid">
                        <div title="Startovací cesta (A / B)"><span style="filter: grayscale(1);">🗺️</span><select onchange="updateWave(${index}, 'path', this.value)"><option value="A" ${wave.path !== 'B' ? 'selected' : ''}>A</option><option value="B" ${wave.path === 'B' ? 'selected' : ''}>B</option></select></div>
                        
                        <div style="grid-column: span 2;" title="Konkrétní typ nepřítele"><span style="filter: grayscale(1);">👹</span>
                            <select onchange="updateWaveEnemy(${index}, this.value)">
                                ${getEnemyOptions(wave.enemyType, wave.enemyLevel)}
                            </select>
                        </div>

                        <div title="Počet kusů"><span style="filter: grayscale(1);">#️⃣</span><input type="number" min="1" value="${wave.count}" onchange="updateWave(${index}, 'count', parseInt(this.value))"></div>
                        <div title="Interval spawnu (sekundy)"><span style="filter: grayscale(1);">⏱️</span><input type="number" min="0.1" step="0.1" value="${wave.interval}" onchange="updateWave(${index}, 'interval', parseFloat(this.value))"></div>
                        <div title="Zpoždění před vlnou (sekundy)"><span style="filter: grayscale(1);">⏳</span><input type="number" min="0" step="0.5" value="${wave.delay}" onchange="updateWave(${index}, 'delay', parseFloat(this.value))"></div>
                    </div>
                `;
                wavesContainer.appendChild(item);
            });
            updateOutput();
        }

        function updateWaveEnemy(index, val) {
            const parts = val.split('-');
            data.waves[index].enemyType = parts[0];
            data.waves[index].enemyLevel = parseInt(parts[1]);
            updateOutput();
        }

        function addWave() { data.waves.push({ enemyType: 'slime', enemyLevel: 1, count: 10, interval: 1.0, delay: 5, path: 'A' }); renderWaves(); }
        function removeWave(index) { saveHistory(); data.waves.splice(index, 1); renderWaves(); }
        
        // Nové funkce pro posouvání vln
        function moveWaveUp(index) {
            if (index > 0) {
                saveHistory();
                const temp = data.waves[index];
                data.waves[index] = data.waves[index - 1];
                data.waves[index - 1] = temp;
                renderWaves();
            }
        }
        
        function moveWaveDown(index) {
            if (index < data.waves.length - 1) {
                saveHistory();
                const temp = data.waves[index];
                data.waves[index] = data.waves[index + 1];
                data.waves[index + 1] = temp;
                renderWaves();
            }
        }

        function updateWave(index, field, value) { data.waves[index][field] = value; updateOutput(); }

        function setBG(url) { data.background = url; bgImg.src = url; bgImg.onload = draw; updateOutput(); }

        let assetsLoaded = false;

        function initAssets() {
            if (assetsLoaded) return; 
            
            const palette = document.getElementById('obj-palette');
            palette.innerHTML = ''; 
            let firstSrc = null, firstImgElement = null;

            if (typeof ASSETS_LIST === 'undefined' || ASSETS_LIST.length === 0) {
                palette.innerHTML = '<div class="palette-empty">Nenalezeny žádné obrázky. Spustil jsi editor přes start-editor.bat?</div>';
                return;
            }

            ASSETS_LIST.forEach(src => {
                const img = document.createElement('img');
                img.src = src; 
                img.title = src.split('/').pop();
                img.dataset.src = src;
                
                img.onclick = () => selectObjectFromPalette(img, src);
                palette.appendChild(img);

                if (!firstSrc) { firstSrc = src; firstImgElement = img; }
                
                localBlobUrls[src] = src; 
                preloadObject(src);
            });

            if (firstSrc) selectObjectFromPalette(firstImgElement, firstSrc);
            assetsLoaded = true;
        }

        function selectObjectFromPalette(imgElement, src) { 
            document.querySelectorAll('#obj-palette img').forEach(i => i.classList.remove('selected')); 
            if (imgElement) imgElement.classList.add('selected'); 
            selectedObjectSrc = src; 
            currentObjectScale = 1.0; 
            preloadObject(src); draw(); 
        }
        function preloadObject(src) { if (!src || loadedObjectImages[src]) return; const img = new Image(); img.src = localBlobUrls[src] || src; img.onload = draw; loadedObjectImages[src] = img; }

        function setMode(newMode) {
            mode = newMode;
            document.getElementById('btn-path').className = mode === 'path' ? 'active-path' : '';
            document.getElementById('btn-pathB').className = mode === 'pathB' ? 'active-pathB' : '';
            document.getElementById('btn-slot').className = mode === 'slot' ? 'active-slot' : '';
            document.getElementById('btn-obj').className = mode === 'object' ? 'active-obj' : '';
            document.getElementById('obj-settings').style.display = mode === 'object' ? 'flex' : 'none';
            
            if (mode === 'object') initAssets();
            
            ghostX = null; ghostY = null; draw();
        }

        function saveHistory() { history.push(JSON.parse(JSON.stringify(data))); }

        function getHoveredItem(mouseX, mouseY) {
            for (let i = data.objects.length - 1; i >= 0; i--) {
                const scale = data.objects[i].scale || 1;
                if (Math.hypot(data.objects[i].x - mouseX, data.objects[i].y - mouseY) <= HITBOX * scale) return { type: 'object', index: i };
            }
            for (let i = data.slots.length - 1; i >= 0; i--) if (Math.hypot(data.slots[i].x - mouseX, data.slots[i].y - mouseY) <= HITBOX) return { type: 'slot', index: i };
            for (let i = data.pathB.length - 1; i >= 0; i--) if (Math.hypot(data.pathB[i].x - mouseX, data.pathB[i].y - mouseY) <= 15) return { type: 'pathB', index: i };
            for (let i = data.path.length - 1; i >= 0; i--) if (Math.hypot(data.path[i].x - mouseX, data.path[i].y - mouseY) <= 15) return { type: 'path', index: i };
            return null;
        }

        canvas.addEventListener('wheel', (e) => {
            if (mode === 'object' && selectedObjectSrc) {
                e.preventDefault(); 
                const delta = e.deltaY < 0 ? 0.1 : -0.1;
                currentObjectScale = Math.max(0.1, Math.min(5.0, currentObjectScale + delta));
                draw();
            }
        }, { passive: false });

        canvas.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return;
            const rect = canvas.getBoundingClientRect(); const mouseX = e.clientX - rect.left; const mouseY = e.clientY - rect.top;
            saveHistory(); draggingPoint = getHoveredItem(mouseX, mouseY);
            if (draggingPoint) { isDragging = true; return; }

            let x = Math.round(mouseX / SNAP) * SNAP; let y = Math.round(mouseY / SNAP) * SNAP;

            if (mode === 'pathB') {
                for (let p of data.path) { if (Math.hypot(p.x - mouseX, p.y - mouseY) <= HITBOX) { x = p.x; y = p.y; break; } }
            }

            if (mode === 'slot') {
                if (x < MARGIN || x > 800 - MARGIN || y < MARGIN || y > 800 - MARGIN) { alert("Mimo zónu cesty!"); return; }
                data.slots.push({ x, y });
            } else if (mode === 'object' && selectedObjectSrc) { 
                data.objects.push({ x, y, src: selectedObjectSrc, scale: parseFloat(currentObjectScale.toFixed(1)) }); 
                preloadObject(selectedObjectSrc); 
            }
            else if (mode === 'path') { data.path.push({ x, y }); }
            else if (mode === 'pathB') { data.pathB.push({ x, y }); }
            
            draw(); updateOutput();
        });

        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault(); const rect = canvas.getBoundingClientRect(); const hovered = getHoveredItem(e.clientX - rect.left, e.clientY - rect.top);
            if (hovered) {
                saveHistory();
                if (hovered.type === 'object') data.objects.splice(hovered.index, 1);
                else if (hovered.type === 'slot') data.slots.splice(hovered.index, 1);
                else if (hovered.type === 'pathB') data.pathB.splice(hovered.index, 1);
                else if (hovered.type === 'path') data.path.splice(hovered.index, 1);
                draw(); updateOutput();
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect(); let x = Math.round((e.clientX - rect.left) / SNAP) * SNAP; let y = Math.round((e.clientY - rect.top) / SNAP) * SNAP;
            if (isDragging && draggingPoint) {
                if (draggingPoint.type === 'pathB') { for (let p of data.path) { if (Math.hypot(p.x - (e.clientX - rect.left), p.y - (e.clientY - rect.top)) <= HITBOX) { x = p.x; y = p.y; break; } } }
                if (draggingPoint.type === 'slot') { x = Math.max(MARGIN, Math.min(800 - MARGIN, x)); y = Math.max(MARGIN, Math.min(800 - MARGIN, y)); data.slots[draggingPoint.index] = { x, y }; }
                else if (draggingPoint.type === 'object') { data.objects[draggingPoint.index].x = x; data.objects[draggingPoint.index].y = y; }
                else if (draggingPoint.type === 'pathB') { data.pathB[draggingPoint.index] = { x, y }; }
                else { data.path[draggingPoint.index] = { x, y }; }
                ghostX = null; ghostY = null; draw(); updateOutput();
            } else { if (mode === 'object' && selectedObjectSrc) { ghostX = x; ghostY = y; draw(); } }
        });

        canvas.addEventListener('mouseleave', () => { ghostX = null; ghostY = null; draw(); });
        canvas.addEventListener('mouseup', (e) => { if(e.button === 0) { isDragging = false; draggingPoint = null; } });

        function drawPathLayer(pathArray, colorMain, colorDots) {
            if (pathArray.length === 0) return;
            let smoothed = pathArray;
            if (pathArray.length > 2) {
                let result = [...pathArray];
                for (let i = 0; i < 2; i++) {
                    let nextPath = [result[0]];
                    for (let j = 0; j < result.length - 1; j++) {
                        let p0 = result[j]; let p1 = result[j + 1];
                        nextPath.push({ x: 0.75 * p0.x + 0.25 * p1.x, y: 0.75 * p0.y + 0.25 * p1.y });
                        nextPath.push({ x: 0.25 * p0.x + 0.75 * p1.x, y: 0.25 * p0.y + 0.75 * p1.y });
                    }
                    nextPath.push(result[result.length - 1]); result = nextPath;
                } smoothed = result;
            }

            ctx.lineJoin = 'round'; ctx.lineCap = 'round';
            ctx.lineWidth = 1; ctx.strokeStyle = '#000000';
            [-50, 50].forEach(side => {
                ctx.beginPath(); const a0 = Math.atan2(smoothed[1]?.y - smoothed[0].y, smoothed[1]?.x - smoothed[0].x) + Math.PI/2;
                ctx.moveTo(smoothed[0].x + Math.cos(a0) * side, smoothed[0].y + Math.sin(a0) * side);
                for (let i = 1; i < smoothed.length; i++) {
                    const p1 = smoothed[i-1], p2 = smoothed[i];
                    const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x) + Math.PI/2;
                    ctx.lineTo(p2.x + Math.cos(angle) * side, p2.y + Math.sin(angle) * side);
                } ctx.stroke();
            });

            for (let w = 100; w >= 70; w -= 6) {
                ctx.lineWidth = w; ctx.strokeStyle = colorMain;
                ctx.beginPath(); ctx.moveTo(smoothed[0].x, smoothed[0].y);
                for (let i = 1; i < smoothed.length; i++) ctx.lineTo(smoothed[i].x, smoothed[i].y);
                ctx.stroke();
            }

            ctx.fillStyle = colorDots;
            pathArray.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI * 2); ctx.fill(); });
        }

        function draw() {
            ctx.clearRect(0, 0, 800, 800);
            if (bgImg.complete) ctx.drawImage(bgImg, 0, 0, 800, 800);

            data.objects.forEach(obj => {
                const img = loadedObjectImages[obj.src];
                const scale = obj.scale || 1.0;
                
                if (img && img.complete && img.naturalHeight !== 0) {
                    const drawW = img.width * scale;
                    const drawH = img.height * scale;
                    ctx.drawImage(img, obj.x - drawW / 2, obj.y - drawH / 2, drawW, drawH);
                } else { 
                    ctx.fillStyle = '#9b59b6'; ctx.beginPath(); ctx.arc(obj.x, obj.y, 10, 0, Math.PI*2); ctx.fill(); 
                }
                ctx.strokeStyle = 'rgba(155, 89, 182, 0.4)'; ctx.lineWidth = 1; 
                ctx.strokeRect(obj.x - 5, obj.y - 5, 10, 10);
            });

            if (mode === 'object' && ghostX !== null && ghostY !== null && !isDragging && selectedObjectSrc) {
                const img = loadedObjectImages[selectedObjectSrc];
                if (img && img.complete && img.naturalHeight !== 0) { 
                    const drawW = img.width * currentObjectScale;
                    const drawH = img.height * currentObjectScale;
                    ctx.globalAlpha = 0.6; 
                    ctx.drawImage(img, ghostX - drawW / 2, ghostY - drawH / 2, drawW, drawH); 
                    ctx.globalAlpha = 1.0; 
                    
                    ctx.fillStyle = '#f1c40f';
                    ctx.font = 'bold 16px sans-serif';
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 3;
                    const txt = `${currentObjectScale.toFixed(1)}x`;
                    ctx.strokeText(txt, ghostX + 20, ghostY - 20);
                    ctx.fillText(txt, ghostX + 20, ghostY - 20);
                }
            }

            ctx.strokeStyle = 'rgba(231, 76, 60, 0.5)'; ctx.setLineDash([5, 5]); ctx.lineWidth = 1;
            ctx.strokeRect(MARGIN, MARGIN, 800 - 2 * MARGIN, 800 - 2 * MARGIN); ctx.setLineDash([]);
            ctx.fillStyle = 'rgba(231, 76, 60, 0.05)';
            ctx.fillRect(0, 0, 800, MARGIN); ctx.fillRect(0, 800 - MARGIN, 800, MARGIN); 
            ctx.fillRect(0, MARGIN, MARGIN, 800 - 2 * MARGIN); ctx.fillRect(800 - MARGIN, MARGIN, MARGIN, 800 - 2 * MARGIN);

            drawPathLayer(data.path, `rgba(127, 140, 141, 0.2)`, '#e74c3c');
            drawPathLayer(data.pathB, `rgba(52, 152, 219, 0.2)`, '#3498db');

            data.slots.forEach(slot => {
                const r = 25;
                if (piedestalImg.complete && piedestalImg.naturalHeight !== 0) {
                    const tW = r * 2.5; const tH = piedestalImg.height * (tW / piedestalImg.width);
                    ctx.drawImage(piedestalImg, slot.x - tW / 2, slot.y - tH / 2 + 5, tW, tH);
                } else {
                    ctx.beginPath(); ctx.arc(slot.x, slot.y, r, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(46, 204, 113, 0.3)'; ctx.strokeStyle = '#2ecc71'; ctx.lineWidth = 2; ctx.fill(); ctx.stroke();
                }
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(slot.x, slot.y, 3, 0, Math.PI * 2); ctx.fill();
            });
        }

        function updateOutput() {
            const fmt = (arr) => '[' + arr.map(p => `{ x: ${p.x}, y: ${p.y} }`).join(', ') + ']';
            const fmtObj = (arr) => '[' + arr.map(p => `{ x: ${p.x}, y: ${p.y}, src: '${p.src}', scale: ${p.scale || 1.0} }`).join(', ') + ']';
            
            // Dynamické formátování vln s přesným odsazením (12 mezer)
            const fmtWaves = (arr) => {
                if (arr.length === 0) return '[]';
                const wavesStr = arr.map(w => `            { path: '${w.path || 'A'}', enemyType: '${w.enemyType}', enemyLevel: ${w.enemyLevel}, count: ${w.count}, interval: ${w.interval}, delay: ${w.delay} }`).join(',\n');
                return '[\n' + wavesStr + '\n        ]';
            };

            // Template literál je zarovnán přesně k levému okraji editoru, odsazení se generuje vnitřními mezerami
            output.value = `{
        id: ${data.id}, background: '${data.background}', startingGold: ${data.startingGold},
        path: ${fmt(data.path)}, pathB: ${fmt(data.pathB)},
        slots: ${fmt(data.slots)},
        objects: ${fmtObj(data.objects)},
        waves: ${fmtWaves(data.waves)}
    }`;
        }

        function undo() { if (history.length > 0) { data = history.pop(); renderWaves(); draw(); updateOutput(); } }
        function clearAll() { if(confirm("Smazat celou mapu (Cesty, Sloty, Objekty)?")) { saveHistory(); data.path = []; data.pathB = []; data.slots = []; data.objects = []; data.waves = []; renderWaves(); draw(); updateOutput(); } }
        
        function copyCode() { 
            output.style.display = 'block';
            output.select();
            document.execCommand('copy');
            output.style.display = 'none';
            alert('Kód zkopírován! Nahraďte jím příslušný objekt v poli LEVEL_DATA v Pokemon.html'); 
        }
        
        fetchGameData();
    </script>
</body>
