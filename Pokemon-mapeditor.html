<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Defense - Map Editor Pro</title>
    <style>
        :root { --bg-dark: #2c3e50; --panel-bg: #34495e; --text-light: #ecf0f1; --accent: #e74c3c; }
        body { background-color: var(--bg-dark); color: var(--text-light); font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: flex-start; padding: 20px; gap: 20px; margin: 0; height: 100vh; box-sizing: border-box; }
        
        main { border: 4px solid var(--panel-bg); border-radius: 8px; background: #000; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); flex-shrink: 0; }
        canvas { display: block; cursor: crosshair; }
        
        aside { display: flex; flex-direction: column; gap: 12px; width: 420px; background: var(--panel-bg); padding: 20px; border-radius: 8px; max-height: calc(100vh - 40px); overflow-y: auto; box-sizing: border-box; }
        
        h2 { margin: 0 0 10px 0; font-size: 1.5rem; }
        h3 { margin: 10px 0 5px 0; font-size: 1.1rem; border-bottom: 1px solid #7f8c8d; padding-bottom: 5px; }
        
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        button { background: #7f8c8d; color: white; border: none; padding: 10px 15px; font-size: 0.9rem; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; flex: 1; }
        button:hover { filter: brightness(1.1); }
        button.active-path { background: var(--accent); }
        button.active-slot { background: #2ecc71; }
        button.active-obj { background: #9b59b6; }
        button.btn-add { background: #2980b9; }
        
        .input-group { display: flex; flex-direction: column; gap: 5px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 4px; }
        .flex-row { display: flex; gap: 10px; align-items: center; }
        .flex-row > div { flex: 1; display: flex; flex-direction: column; gap: 2px; }
        
        label { font-size: 0.8rem; font-weight: bold; color: #bdc3c7; }
        input, select { padding: 6px; border-radius: 4px; border: 1px solid #7f8c8d; background: #2c3e50; color: white; font-family: inherit; width: 100%; box-sizing: border-box; }
        
        textarea { width: 100%; height: 200px; background: #1a252f; color: #2ecc71; border: 1px solid #7f8c8d; border-radius: 4px; padding: 10px; font-family: monospace; font-size: 12px; box-sizing: border-box; resize: vertical; white-space: pre; }
        
        .instructions { color: #f1c40f; font-size: 0.85rem; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 4px; border-left: 3px solid #f1c40f; margin: 0; }
        
        .bg-picker { display: flex; gap: 5px; margin-top: 5px; }
        .bg-btn { font-size: 0.75rem; background: #2c3e50; }
        
        .palette { display: flex; flex-wrap: wrap; gap: 5px; max-height: 150px; overflow-y: auto; background: #1a252f; padding: 10px; border-radius: 4px; border: 1px solid #7f8c8d; }
        .palette img { max-width: 50px; max-height: 50px; object-fit: contain; cursor: pointer; border: 2px solid transparent; border-radius: 4px; background: rgba(255,255,255,0.1); padding: 2px; transition: 0.2s; }
        .palette img:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }
        .palette img.selected { border-color: var(--accent); background: rgba(231, 76, 60, 0.2); }
        .palette-empty { color: #7f8c8d; font-size: 0.8rem; font-style: italic; width: 100%; text-align: center; padding: 20px 0; }

        .wave-item { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 4px; border-left: 4px solid #e67e22; position: relative; margin-bottom: 8px; }
        .wave-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 5px; }
        .btn-remove-wave { position: absolute; top: 5px; right: 5px; background: #c0392b; padding: 2px 6px; font-size: 0.8rem; flex: none; width: auto; }
    </style>
</head>
<body>

    <main>
        <canvas id="editor" width="800" height="800"></canvas>
    </main>

    <aside>
        <h2>Editor Mapy 4.0</h2>
        <p class="instructions">🖱️ Levý klik: Přidat / Přesunout<br>🖱️ Pravý klik: Smazat bod/objekt</p>

        <div class="flex-row">
            <div>
                <label for="level-select">Načíst Level</label>
                <select id="level-select" onchange="loadLevel(parseInt(this.value))"></select>
            </div>
            <div>
                <label for="starting-gold">Zlaťáky do startu</label>
                <input type="number" id="starting-gold" value="1400" step="50" onchange="updateMeta()">
            </div>
        </div>

        <div class="btn-group">
            <button id="btn-path" class="active-path" onclick="setMode('path')">✏️ Cesta</button>
            <button id="btn-slot" onclick="setMode('slot')">⭕ Věže</button>
            <button id="btn-obj" onclick="setMode('object')">🌲 Objekty</button>
        </div>

        <div class="bg-picker">
            <button class="bg-btn" onclick="setBG('Pokemon/Backgrounds/grass.png')">🌿 Tráva</button>
            <button class="bg-btn" onclick="setBG('Pokemon/Backgrounds/sand.jpg')">⏳ Písek</button>
            <button class="bg-btn" onclick="setBG('Pokemon/Backgrounds/ice.jpg')">❄️ Led</button>
            <button class="bg-btn" onclick="setBG('Pokemon/Backgrounds/rocks.jpg')">🪨 Skály</button>
            <button class="bg-btn" onclick="setBG('Pokemon/Backgrounds/lava.jpg')">🌋 Láva</button>
        </div>

        <div class="input-group" id="obj-settings" style="display: none;">
            <input type="file" id="folder-input" webkitdirectory directory multiple style="display:none;" onchange="handleFolderSelect(event)">
            <button onclick="document.getElementById('folder-input').click()" style="background: #8e44ad; margin-bottom: 5px;">📁 Načíst složku Assets</button>
            <label>Vyber objekt z palety:</label>
            <div id="obj-palette" class="palette">
                <div class="palette-empty">Nejdříve načti složku s obrázky</div>
            </div>
        </div>

        <h3>Vlny nepřátel</h3>
        <div id="waves-container"></div>
        <button class="btn-add" onclick="addWave()">➕ Přidat vlnu</button>

        <hr style="width: 100%; border: 0; border-top: 1px solid #7f8c8d; margin-top: 10px;">
        
        <div class="btn-group">
            <button onclick="undo()">↩️ Zpět</button>
            <button onclick="clearAll()" style="background: #c0392b;">🗑️ Smazat vše</button>
        </div>
        
        <textarea id="output" readonly placeholder="Zde se objeví kód..."></textarea>
        <button onclick="copyCode()" style="background: #2980b9; width: 100%;">📋 Kopírovat kód pro LEVEL_DATA</button>
    </aside>

    <script>
        // SDÍLENÁ DATA LEVELŮ (Načítají se dynamicky z Pokemon.html)
        let LEVEL_DATA = [];

        // KONFIGURACE EDITORU
        const canvas = document.getElementById('editor');
        const ctx = canvas.getContext('2d');
        const output = document.getElementById('output');
        const wavesContainer = document.getElementById('waves-container');
        const levelSelect = document.getElementById('level-select');
        
        let mode = 'path'; 
        let data = { id: 1, background: '', startingGold: 0, path: [], slots: [], objects: [], waves: [] };
        let history = []; 
        let draggingPoint = null;
        let isDragging = false;
        
        // Assety
        const bgImg = new Image();
        const piedestalImg = new Image(); piedestalImg.src = 'Pokemon/Assets/Piedestal.png';
        
        let selectedObjectSrc = null;
        const loadedObjectImages = {};
        const localBlobUrls = {};
        let ghostX = null, ghostY = null;
        
        const SNAP = 10;
        const MARGIN = 80;
        const HITBOX = 25;

        // NAČÍTÁNÍ DAT Z POKEMON.HTML
        async function fetchGameData() {
            try {
                // Stažení obsahu hlavní hry přes Live Server
                const response = await fetch('Pokemon.html');
                if (!response.ok) throw new Error('Nelze načíst Pokemon.html');
                const htmlText = await response.text();

                // Najití začátku pole
                const searchStr = "const LEVEL_DATA = ";
                const startIndex = htmlText.indexOf(searchStr);
                if (startIndex === -1) throw new Error("Proměnná LEVEL_DATA nebyla nalezena.");

                const arrayStart = htmlText.indexOf('[', startIndex);
                let brackets = 0;
                let arrayEnd = -1;

                // Spolehlivé spárování závorek pro nalezení konce pole
                for (let i = arrayStart; i < htmlText.length; i++) {
                    if (htmlText[i] === '[') brackets++;
                    if (htmlText[i] === ']') brackets--;
                    
                    if (brackets === 0) {
                        arrayEnd = i + 1;
                        break;
                    }
                }

                if (arrayEnd === -1) throw new Error("Nepodařilo se najít konec pole LEVEL_DATA.");

                // Extrakce textu a jeho bezpečný převod na JS objekt
                const dataString = htmlText.substring(arrayStart, arrayEnd);
                eval("LEVEL_DATA = " + dataString);

                // Inicializace UI editoru
                initSelect();

            } catch (error) {
                console.error('Chyba:', error);
                alert(`Nepodařilo se načíst data z Pokemon.html:\n${error.message}\n\nUjistěte se, že používáte Live Server a Pokemon.html je ve stejné složce.`);
            }
        }

        // INICIALIZACE
        function initSelect() {
            levelSelect.innerHTML = '';
            LEVEL_DATA.forEach(l => {
                const opt = document.createElement('option');
                opt.value = l.id; opt.textContent = `Level ${l.id}`;
                levelSelect.appendChild(opt);
            });
            loadLevel(1);
        }

        function loadLevel(id) {
            const level = LEVEL_DATA.find(l => l.id === id);
            if (!level) return;
            
            // Hluboká kopie dat, aby úpravy neovlivnily původní pole dokud neuložíme
            data = JSON.parse(JSON.stringify(level));
            if (!data.objects) data.objects = [];
            
            levelSelect.value = data.id;
            document.getElementById('starting-gold').value = data.startingGold;
            setBG(data.background);
            
            // Přednačtení objektů
            data.objects.forEach(obj => preloadObject(obj.src));
            
            renderWaves();
            history = [];
            draw();
            updateOutput();
        }

        function updateMeta() {
            data.startingGold = parseInt(document.getElementById('starting-gold').value) || 500;
            updateOutput();
        }

        // SPRÁVA VLN
        function renderWaves() {
            wavesContainer.innerHTML = '';
            data.waves.forEach((wave, index) => {
                const item = document.createElement('div');
                item.className = 'wave-item';
                item.innerHTML = `
                    <button class="btn-remove-wave" onclick="removeWave(${index})">X</button>
                    <strong>Vlna ${index + 1}</strong>
                    <div class="wave-grid">
                        <div>
                            <label>Typ nepřítele</label>
                            <select onchange="updateWave(${index}, 'enemyType', this.value)">
                                <option value="slime" ${wave.enemyType === 'slime' ? 'selected' : ''}>Slime</option>
                                <option value="orc" ${wave.enemyType === 'orc' ? 'selected' : ''}>Orc</option>
                                <option value="vampire" ${wave.enemyType === 'vampire' ? 'selected' : ''}>Vampire</option>
                            </select>
                        </div>
                        <div>
                            <label>Level (1-3)</label>
                            <input type="number" min="1" max="3" value="${wave.enemyLevel}" onchange="updateWave(${index}, 'enemyLevel', parseInt(this.value))">
                        </div>
                        <div>
                            <label>Počet</label>
                            <input type="number" min="1" value="${wave.count}" onchange="updateWave(${index}, 'count', parseInt(this.value))">
                        </div>
                        <div style="display: flex; gap: 8px;">
                            <div style="flex:1">
                                <label>Interval (s)</label>
                                <input type="number" min="0.1" step="0.1" value="${wave.interval}" onchange="updateWave(${index}, 'interval', parseFloat(this.value))">
                            </div>
                            <div style="flex:1">
                                <label>Zpoždění (s)</label>
                                <input type="number" min="0" step="0.5" value="${wave.delay}" onchange="updateWave(${index}, 'delay', parseFloat(this.value))">
                            </div>
                        </div>
                    </div>
                `;
                wavesContainer.appendChild(item);
            });
            updateOutput();
        }

        function addWave() { data.waves.push({ enemyType: 'slime', enemyLevel: 1, count: 10, interval: 1.0, delay: 5 }); renderWaves(); }
        function removeWave(index) { saveHistory(); data.waves.splice(index, 1); renderWaves(); }
        function updateWave(index, field, value) { data.waves[index][field] = value; updateOutput(); }

        // ASSETY A POZADÍ
        function setBG(url) { data.background = url; bgImg.src = url; bgImg.onload = draw; updateOutput(); }

        function handleFolderSelect(event) {
            const files = event.target.files;
            const palette = document.getElementById('obj-palette');
            palette.innerHTML = '';
            let firstSrc = null, firstImgElement = null;
            const sortedFiles = Array.from(files).sort((a, b) => a.name.localeCompare(b.name));

            for (let file of sortedFiles) {
                if (file.name.match(/\.(png|jpg|jpeg)$/i)) {
                    const blobUrl = URL.createObjectURL(file);
                    const exportPath = `Pokemon/Assets/${file.name}`;
                    localBlobUrls[exportPath] = blobUrl;
                    
                    const img = document.createElement('img');
                    img.src = blobUrl; img.title = file.name; img.dataset.src = exportPath;
                    img.onclick = () => selectObjectFromPalette(img, exportPath);
                    palette.appendChild(img);

                    if (!firstSrc) { firstSrc = exportPath; firstImgElement = img; }
                }
            }
            if (firstSrc) selectObjectFromPalette(firstImgElement, firstSrc);
            else { palette.innerHTML = '<div class="palette-empty">Žádné obrázky nenalezeny</div>'; selectedObjectSrc = null; }
            
            // Obnov canvas (kdyby náhodou už na mapě byly objekty z této složky)
            Object.keys(localBlobUrls).forEach(src => preloadObject(src));
        }

        function selectObjectFromPalette(imgElement, src) {
            document.querySelectorAll('#obj-palette img').forEach(i => i.classList.remove('selected'));
            if (imgElement) imgElement.classList.add('selected');
            selectedObjectSrc = src; preloadObject(src); draw();
        }

        function preloadObject(src) {
            if (!src || loadedObjectImages[src]) return;
            const img = new Image(); img.src = localBlobUrls[src] || src;
            img.onload = draw;
            loadedObjectImages[src] = img;
        }

        // INTERAKCE NA PLATNĚ
        function setMode(newMode) {
            mode = newMode;
            document.getElementById('btn-path').className = mode === 'path' ? 'active-path' : '';
            document.getElementById('btn-slot').className = mode === 'slot' ? 'active-slot' : '';
            document.getElementById('btn-obj').className = mode === 'object' ? 'active-obj' : '';
            document.getElementById('obj-settings').style.display = mode === 'object' ? 'flex' : 'none';
            ghostX = null; ghostY = null; draw();
        }

        function saveHistory() { history.push(JSON.parse(JSON.stringify(data))); }

        function getHoveredItem(mouseX, mouseY) {
            // Kontrola od konce (to co je vykresleno nahoře)
            for (let i = data.objects.length - 1; i >= 0; i--) {
                if (Math.hypot(data.objects[i].x - mouseX, data.objects[i].y - mouseY) <= HITBOX) return { type: 'object', index: i };
            }
            for (let i = data.slots.length - 1; i >= 0; i--) {
                if (Math.hypot(data.slots[i].x - mouseX, data.slots[i].y - mouseY) <= HITBOX) return { type: 'slot', index: i };
            }
            for (let i = data.path.length - 1; i >= 0; i--) {
                if (Math.hypot(data.path[i].x - mouseX, data.path[i].y - mouseY) <= 15) return { type: 'path', index: i };
            }
            return null;
        }

        // LEVÝ KLIK: Přidat nebo chytit (Move)
        canvas.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return; // Pouze levé tlačítko
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left; const mouseY = e.clientY - rect.top;

            saveHistory();
            draggingPoint = getHoveredItem(mouseX, mouseY);
            
            if (draggingPoint) { isDragging = true; return; }

            // Pokud nic nechytáme, přidáváme nový bod/objekt
            const x = Math.round(mouseX / SNAP) * SNAP; const y = Math.round(mouseY / SNAP) * SNAP;

            if (mode === 'slot') {
                if (x < MARGIN || x > 800 - MARGIN || y < MARGIN || y > 800 - MARGIN) { alert("Mimo zónu cesty!"); return; }
                data.slots.push({ x, y });
            } else if (mode === 'object' && selectedObjectSrc) {
                data.objects.push({ x, y, src: selectedObjectSrc }); preloadObject(selectedObjectSrc);
            } else if (mode === 'path') {
                data.path.push({ x, y });
            }
            draw(); updateOutput();
        });

        // PRAVÝ KLIK: Smazat
        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const hovered = getHoveredItem(e.clientX - rect.left, e.clientY - rect.top);
            
            if (hovered) {
                saveHistory();
                if (hovered.type === 'object') data.objects.splice(hovered.index, 1);
                else if (hovered.type === 'slot') data.slots.splice(hovered.index, 1);
                else if (hovered.type === 'path') data.path.splice(hovered.index, 1);
                draw(); updateOutput();
            }
        });

        // POHYB MYŠI
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            let x = Math.round((e.clientX - rect.left) / SNAP) * SNAP; let y = Math.round((e.clientY - rect.top) / SNAP) * SNAP;

            if (isDragging && draggingPoint) {
                if (draggingPoint.type === 'slot') {
                    x = Math.max(MARGIN, Math.min(800 - MARGIN, x)); y = Math.max(MARGIN, Math.min(800 - MARGIN, y));
                    data.slots[draggingPoint.index] = { x, y };
                } else if (draggingPoint.type === 'object') {
                    data.objects[draggingPoint.index].x = x; data.objects[draggingPoint.index].y = y;
                } else { data.path[draggingPoint.index] = { x, y }; }
                ghostX = null; ghostY = null; draw(); updateOutput();
            } else {
                if (mode === 'object' && selectedObjectSrc) { ghostX = x; ghostY = y; draw(); }
            }
        });

        canvas.addEventListener('mouseleave', () => { ghostX = null; ghostY = null; draw(); });
        canvas.addEventListener('mouseup', (e) => { if(e.button === 0) { isDragging = false; draggingPoint = null; } });

        // VYKRESLOVÁNÍ
        function draw() {
            ctx.clearRect(0, 0, 800, 800);
            if (bgImg.complete) ctx.drawImage(bgImg, 0, 0, 800, 800);

            // Objekty
            data.objects.forEach(obj => {
                const img = loadedObjectImages[obj.src];
                if (img && img.complete && img.naturalHeight !== 0) ctx.drawImage(img, obj.x - img.width / 2, obj.y - img.height / 2);
                else { ctx.fillStyle = '#9b59b6'; ctx.beginPath(); ctx.arc(obj.x, obj.y, 10, 0, Math.PI*2); ctx.fill(); }
                // Jemný obrys pro identifikaci interaktivní oblasti v editoru
                ctx.strokeStyle = 'rgba(155, 89, 182, 0.4)'; ctx.lineWidth = 1; ctx.strokeRect(obj.x - 5, obj.y - 5, 10, 10);
            });

            // Ghost objekt
            if (mode === 'object' && ghostX !== null && ghostY !== null && !isDragging && selectedObjectSrc) {
                const img = loadedObjectImages[selectedObjectSrc];
                if (img && img.complete && img.naturalHeight !== 0) {
                    ctx.globalAlpha = 0.5; ctx.drawImage(img, ghostX - img.width / 2, ghostY - img.height / 2); ctx.globalAlpha = 1.0;
                }
            }

            // Ochranná zóna a hranice
            ctx.strokeStyle = 'rgba(231, 76, 60, 0.5)'; ctx.setLineDash([5, 5]); ctx.lineWidth = 1;
            ctx.strokeRect(MARGIN, MARGIN, 800 - 2 * MARGIN, 800 - 2 * MARGIN); ctx.setLineDash([]);
            ctx.fillStyle = 'rgba(231, 76, 60, 0.05)';
            ctx.fillRect(0, 0, 800, MARGIN); ctx.fillRect(0, 800 - MARGIN, 800, MARGIN); 
            ctx.fillRect(0, MARGIN, MARGIN, 800 - 2 * MARGIN); ctx.fillRect(800 - MARGIN, MARGIN, MARGIN, 800 - 2 * MARGIN);

            // Cesta
            if (data.path.length > 0) {
                let smoothed = data.path;
                if (data.path.length > 2) {
                    // Plynulá interpolace cesty čistě pro vizualizaci editoru
                    let result = [...data.path];
                    for (let i = 0; i < 2; i++) {
                        let nextPath = [result[0]];
                        for (let j = 0; j < result.length - 1; j++) {
                            let p0 = result[j]; let p1 = result[j + 1];
                            nextPath.push({ x: 0.75 * p0.x + 0.25 * p1.x, y: 0.75 * p0.y + 0.25 * p1.y });
                            nextPath.push({ x: 0.25 * p0.x + 0.75 * p1.x, y: 0.25 * p0.y + 0.75 * p1.y });
                        }
                        nextPath.push(result[result.length - 1]); result = nextPath;
                    }
                    smoothed = result;
                }

                ctx.lineJoin = 'round'; ctx.lineCap = 'round';
                
                // Black outline
                ctx.lineWidth = 1; 
                ctx.strokeStyle = '#000000';
                [-50, 50].forEach(side => {
                    ctx.beginPath();
                    const a0 = Math.atan2(smoothed[1]?.y - smoothed[0].y, smoothed[1]?.x - smoothed[0].x) + Math.PI/2;
                    ctx.moveTo(smoothed[0].x + Math.cos(a0) * side, smoothed[0].y + Math.sin(a0) * side);
                    for (let i = 1; i < smoothed.length; i++) {
                        const p1 = smoothed[i-1], p2 = smoothed[i];
                        const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x) + Math.PI/2;
                        ctx.lineTo(p2.x + Math.cos(angle) * side, p2.y + Math.sin(angle) * side);
                    }
                    ctx.stroke();
                });

                // Tlustá cesta
                for (let w = 100; w >= 70; w -= 6) {
                    ctx.lineWidth = w; ctx.strokeStyle = `rgba(127, 140, 141, 0.2)`;
                    ctx.beginPath(); ctx.moveTo(smoothed[0].x, smoothed[0].y);
                    for (let i = 1; i < smoothed.length; i++) ctx.lineTo(smoothed[i].x, smoothed[i].y);
                    ctx.stroke();
                }

                // Hard-points cesty
                ctx.fillStyle = '#e74c3c';
                data.path.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI * 2); ctx.fill(); });
            }

            // Sloty (Věže / Podstavce)
            data.slots.forEach(slot => {
                const r = 25; // Poloměr
                if (piedestalImg.complete && piedestalImg.naturalHeight !== 0) {
                    const tW = r * 2.5; 
                    const tH = piedestalImg.height * (tW / piedestalImg.width);
                    ctx.drawImage(piedestalImg, slot.x - tW / 2, slot.y - tH / 2 + 5, tW, tH);
                } else {
                    ctx.beginPath(); ctx.arc(slot.x, slot.y, r, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(46, 204, 113, 0.3)'; ctx.strokeStyle = '#2ecc71'; ctx.lineWidth = 2; ctx.fill(); ctx.stroke();
                }
                // Indikátor středu pro snazší chytání
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(slot.x, slot.y, 3, 0, Math.PI * 2); ctx.fill();
            });
        }

        // GENERACE KÓDU
        function updateOutput() {
            const fmt = (arr) => '[' + arr.map(p => `{ x: ${p.x}, y: ${p.y} }`).join(', ') + ']';
            const fmtObj = (arr) => '[' + arr.map(p => `{ x: ${p.x}, y: ${p.y}, src: '${p.src}' }`).join(', ') + ']';
            const fmtWaves = (arr) => '[\n' + arr.map(w => `                    { enemyType: '${w.enemyType}', enemyLevel: ${w.enemyLevel}, count: ${w.count}, interval: ${w.interval}, delay: ${w.delay} }`).join(',\n') + '\n                ]';
            
            output.value = `{
                id: ${data.id}, background: '${data.background}', startingGold: ${data.startingGold},
                path: ${fmt(data.path)},
                slots: ${fmt(data.slots)},
                objects: ${fmtObj(data.objects)},
                waves: ${fmtWaves(data.waves)}
            }`;
        }

        function undo() { if (history.length > 0) { data = history.pop(); renderWaves(); draw(); updateOutput(); } }
        function clearAll() { if(confirm("Smazat celou mapu (Cesty, Sloty, Objekty)?")) { saveHistory(); data.path = []; data.slots = []; data.objects = []; data.waves = []; renderWaves(); draw(); updateOutput(); } }
        function copyCode() { output.select(); document.execCommand('copy'); alert('Kód zkopírován! Nahraďte jím příslušný objekt v poli LEVEL_DATA v Pokemon.html'); }
        
        // Start (Zavolá funkci získá data z Pokemon.html)
        fetchGameData();
    </script>
</body>
</html>
