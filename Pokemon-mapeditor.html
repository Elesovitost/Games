<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Defense - Map Editor Pro</title>
    <style>
        :root {
            --bg-dark: #2c3e50;
            --panel-bg: #34495e;
            --text-light: #ecf0f1;
            --accent: #e74c3c;
            --safe-zone: rgba(231, 76, 60, 0.1);
        }
        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            gap: 20px;
            margin: 0;
        }
        .canvas-container {
            border: 4px solid var(--panel-bg);
            border-radius: 8px;
            background: #000;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        canvas { display: block; cursor: crosshair; }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 380px;
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 8px;
        }
        h2 { margin: 0 0 10px 0; font-size: 1.5rem; }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        button {
            background: #7f8c8d;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 0.9rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            flex: 1;
        }
        button:hover { filter: brightness(1.1); }
        button.active-path { background: var(--accent); }
        button.active-slot { background: #2ecc71; }
        
        .bg-picker { display: flex; gap: 5px; margin-top: 5px; }
        .bg-btn { font-size: 0.75rem; background: #2c3e50; }
        
        textarea {
            width: 100%;
            height: 180px;
            background: #1a252f;
            color: #2ecc71;
            border: 1px solid #7f8c8d;
            border-radius: 4px;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            box-sizing: border-box;
            resize: none;
        }
        .warning {
            color: #f1c40f;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.2);
            padding: 8px;
            border-radius: 4px;
            border-left: 3px solid #f1c40f;
        }
    </style>
</head>
<body>

    <div class="canvas-container">
        <canvas id="editor" width="800" height="800"></canvas>
    </div>

    <div class="controls">
        <h2>Editor Mapy 2.0</h2>
        
        <div class="btn-group">
            <button id="btn-path" class="active-path" onclick="setMode('path')">✏️ Cesta</button>
            <button id="btn-slot" onclick="setMode('slot')">⭕ Věže</button>
        </div>

        <div class="bg-picker">
            <button class="bg-btn" onclick="setBG('/Pokemon/Backgrounds/grass.png')">🌿 Tráva</button>
            <button class="bg-btn" onclick="setBG('/Pokemon/Backgrounds/sand.png')">⏳ Písek</button>
            <button class="bg-btn" onclick="setBG('/Pokemon/Backgrounds/water.png')">💧 Voda</button>
        </div>

        <div class="warning">
            ⚠️ <strong>Ochranný pruh (80px):</strong> Sloty pro věže nelze umístit do červené zóny, aby menu ve hře nevyčnívalo z mapy.
        </div>

        <hr style="width: 100%; border: 0; border-top: 1px solid #7f8c8d;">
        
        <div class="btn-group">
            <button onclick="undo()">↩️ Krok zpět</button>
            <button onclick="clearAll()" style="background: #c0392b;">🗑️ Smazat</button>
        </div>
        
        <textarea id="output" readonly placeholder="Zde se objeví kód..."></textarea>
        <button onclick="copyCode()" style="background: #2980b9; width: 100%;">📋 Kopírovat kód</button>
    </div>

    <script>
        const canvas = document.getElementById('editor');
        const ctx = canvas.getContext('2d');
        const output = document.getElementById('output');
        
        let mode = 'path'; 
        let data = { path: [], slots: [] };
        let history = []; 
        let draggingPoint = null;
        let isDragging = false;
        let bgImg = new Image();
        
        const SNAP = 10;
        const MARGIN = 80; // Bezpečnostní zóna pro menu věží
        const HITBOX_PATH = 15;
        const HITBOX_SLOT = 25;

        function setBG(url) { bgImg.src = url; bgImg.onload = draw; }

        function smoothPath(path, iterations = 2) {
            if (path.length < 3) return path;
            let result = [...path];
            for (let i = 0; i < iterations; i++) {
                let nextPath = [result[0]];
                for (let j = 0; j < result.length - 1; j++) {
                    let p0 = result[j]; let p1 = result[j + 1];
                    nextPath.push({ x: 0.75 * p0.x + 0.25 * p1.x, y: 0.75 * p0.y + 0.25 * p1.y });
                    nextPath.push({ x: 0.25 * p0.x + 0.75 * p1.x, y: 0.25 * p0.y + 0.75 * p1.y });
                }
                nextPath.push(result[result.length - 1]);
                result = nextPath;
            }
            return result;
        }

        function setMode(newMode) {
            mode = newMode;
            document.getElementById('btn-path').className = mode === 'path' ? 'active-path' : '';
            document.getElementById('btn-slot').className = mode === 'slot' ? 'active-slot' : '';
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            history.push(JSON.parse(JSON.stringify(data)));

            // Detekce tažení existujících prvků
            for (let i = data.slots.length - 1; i >= 0; i--) {
                if (Math.hypot(data.slots[i].x - mouseX, data.slots[i].y - mouseY) <= HITBOX_SLOT) {
                    draggingPoint = { type: 'slot', index: i };
                    isDragging = true; return;
                }
            }
            for (let i = data.path.length - 1; i >= 0; i--) {
                if (Math.hypot(data.path[i].x - mouseX, data.path[i].y - mouseY) <= HITBOX_PATH) {
                    draggingPoint = { type: 'path', index: i };
                    isDragging = true; return;
                }
            }

            // Přidání nového bodu
            const x = Math.round(mouseX / SNAP) * SNAP;
            const y = Math.round(mouseY / SNAP) * SNAP;

            if (mode === 'slot') {
                // Kontrola MARGINu pro sloty
                if (x < MARGIN || x > 800 - MARGIN || y < MARGIN || y > 800 - MARGIN) {
                    alert("Tady nelze umístit věž! Menu by zasahovalo mimo obrazovku.");
                    return;
                }
                data.slots.push({ x, y });
            } else {
                data.path.push({ x, y });
            }
            
            draw(); updateOutput();
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging || !draggingPoint) return;
            const rect = canvas.getBoundingClientRect();
            let x = Math.round((e.clientX - rect.left) / SNAP) * SNAP;
            let y = Math.round((e.clientY - rect.top) / SNAP) * SNAP;

            if (draggingPoint.type === 'slot') {
                // Omezení tažení slotu do marginu
                x = Math.max(MARGIN, Math.min(800 - MARGIN, x));
                y = Math.max(MARGIN, Math.min(800 - MARGIN, y));
                data.slots[draggingPoint.index] = { x, y };
            } else {
                data.path[draggingPoint.index] = { x, y };
            }
            draw(); updateOutput();
        });

        canvas.addEventListener('mouseup', () => { isDragging = false; draggingPoint = null; });

        function draw() {
            ctx.clearRect(0, 0, 800, 800);
            if (bgImg.src) ctx.drawImage(bgImg, 0, 0, 800, 800);

            // 1. Vizuální ochraný pruh
            ctx.strokeStyle = 'rgba(231, 76, 60, 0.5)';
            ctx.setLineDash([5, 5]);
            ctx.lineWidth = 1;
            ctx.strokeRect(MARGIN, MARGIN, 800 - 2 * MARGIN, 800 - 2 * MARGIN);
            ctx.setLineDash([]);
            
            ctx.fillStyle = 'rgba(231, 76, 60, 0.05)';
            ctx.fillRect(0, 0, 800, MARGIN); // Horní
            ctx.fillRect(0, 800 - MARGIN, 800, MARGIN); // Dolní
            ctx.fillRect(0, MARGIN, MARGIN, 800 - 2 * MARGIN); // Levý
            ctx.fillRect(800 - MARGIN, MARGIN, MARGIN, 800 - 2 * MARGIN); // Pravý

            // 2. Vykreslení cesty (stejně jako v Tower.html)
            if (data.path.length > 0) {
                const smoothed = smoothPath(data.path, 2);
                
                ctx.strokeStyle = '#7f8c8d'; 
                ctx.lineWidth = 100; // Shoda se hrou
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(smoothed[0].x, smoothed[0].y);
                for (let i = 1; i < smoothed.length; i++) ctx.lineTo(smoothed[i].x, smoothed[i].y);
                ctx.stroke();

                // Bílá osa
                ctx.strokeStyle = '#ecf0f1';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(smoothed[0].x, smoothed[0].y);
                for (let i = 1; i < smoothed.length; i++) ctx.lineTo(smoothed[i].x, smoothed[i].y);
                ctx.stroke();

                // Editační body cesty
                ctx.fillStyle = '#e74c3c';
                data.path.forEach(p => {
                    ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI * 2); ctx.fill();
                });
            }

            // 3. Sloty pro věže (shoda s Tower.html)
            data.slots.forEach(slot => {
                ctx.beginPath();
                ctx.arc(slot.x, slot.y, 25, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(46, 204, 113, 0.3)';
                ctx.strokeStyle = '#2ecc71';
                ctx.lineWidth = 2;
                ctx.fill();
                ctx.stroke();
                
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(slot.x, slot.y, 3, 0, Math.PI * 2); ctx.fill();
            });
        }

        function updateOutput() {
            const fmt = (arr) => arr.length === 0 ? '[]' : '[' + arr.map(p => `{ x: ${p.x}, y: ${p.y} }`).join(', ') + ']';
            output.value = `path: ${fmt(data.path)},\nslots: ${fmt(data.slots)},`;
        }

        function undo() { if (history.length > 0) { data = history.pop(); draw(); updateOutput(); } }
        function clearAll() { if(confirm("Smazat celou mapu?")) { history.push(JSON.parse(JSON.stringify(data))); data = { path: [], slots: [] }; draw(); updateOutput(); } }
        function copyCode() { output.select(); document.execCommand('copy'); alert('Kód zkopírován pro použití v LEVEL_DATA!'); }

        // Start
        setBG('/Pokemon/Backgrounds/grass.png');
    </script>
</body>
</html>
