<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Defense - Map Editor Pro</title>
    <style>
        :root { --bg-dark: #2c3e50; --panel-bg: #34495e; --text-light: #ecf0f1; --accent: #e74c3c; }
        body { background-color: var(--bg-dark); color: var(--text-light); font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: flex-start; padding: 20px; gap: 20px; margin: 0; }
        .canvas-container { border: 4px solid var(--panel-bg); border-radius: 8px; background: #000; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        canvas { display: block; cursor: crosshair; }
        .controls { display: flex; flex-direction: column; gap: 12px; width: 380px; background: var(--panel-bg); padding: 20px; border-radius: 8px; }
        h2 { margin: 0 0 10px 0; font-size: 1.5rem; }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        button { background: #7f8c8d; color: white; border: none; padding: 10px 15px; font-size: 0.9rem; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; flex: 1; }
        button:hover { filter: brightness(1.1); }
        button.active-path { background: var(--accent); }
        button.active-slot { background: #2ecc71; }
        button.active-obj { background: #9b59b6; }
        .input-group { display: flex; flex-direction: column; gap: 5px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 4px; }
        textarea { width: 100%; height: 200px; background: #1a252f; color: #2ecc71; border: 1px solid #7f8c8d; border-radius: 4px; padding: 10px; font-family: monospace; font-size: 12px; box-sizing: border-box; resize: none; }
        .warning { color: #f1c40f; font-size: 0.8rem; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 4px; border-left: 3px solid #f1c40f; }
        .bg-picker { display: flex; gap: 5px; margin-top: 5px; }
        .bg-btn { font-size: 0.75rem; background: #2c3e50; }
        
        .palette { display: flex; flex-wrap: wrap; gap: 5px; max-height: 200px; overflow-y: auto; background: #1a252f; padding: 10px; border-radius: 4px; border: 1px solid #7f8c8d; }
        .palette img { max-width: 50px; max-height: 50px; object-fit: contain; cursor: pointer; border: 2px solid transparent; border-radius: 4px; background: rgba(255,255,255,0.1); padding: 2px; transition: 0.2s; }
        .palette img:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }
        .palette img.selected { border-color: var(--accent); background: rgba(231, 76, 60, 0.2); }
        .palette-empty { color: #7f8c8d; font-size: 0.8rem; font-style: italic; width: 100%; text-align: center; padding: 20px 0; }
    </style>
</head>
<body>

    <div class="canvas-container">
        <canvas id="editor" width="800" height="800"></canvas>
    </div>

    <div class="controls">
        <h2>Editor Mapy 4.0</h2>
        
        <div class="btn-group">
            <button id="btn-path" class="active-path" onclick="setMode('path')">✏️ Cesta</button>
            <button id="btn-slot" onclick="setMode('slot')">⭕ Věže</button>
            <button id="btn-obj" onclick="setMode('object')">🌲 Objekty</button>
        </div>

        <div class="bg-picker">
            <button class="bg-btn" onclick="setBG('Pokemon/Backgrounds/grass.png')">🌿 Tráva</button>
            <button class="bg-btn" onclick="setBG('Pokemon/Backgrounds/sand.jpg')">⏳ Písek</button>
            <button class="bg-btn" onclick="setBG('Pokemon/Backgrounds/ice.jpg')">❄️ Led</button>
        </div>

        <div class="input-group" id="obj-settings" style="display: none;">
            <input type="file" id="folder-input" webkitdirectory directory multiple style="display:none;" onchange="handleFolderSelect(event)">
            <button onclick="document.getElementById('folder-input').click()" style="background: #8e44ad; margin-bottom: 5px;">📁 1. Vybrat složku Assets</button>
            
            <label>2. Vyber objekt z palety:</label>
            <div id="obj-palette" class="palette">
                <div class="palette-empty">Nejdříve načti složku s obrázky</div>
            </div>
        </div>

        <div class="warning">
            ⚠️ <strong>Ochranný pruh (80px):</strong> Sloty pro věže nelze umístit do červené zóny, aby menu ve hře nevyčnívalo z mapy.
        </div>

        <hr style="width: 100%; border: 0; border-top: 1px solid #7f8c8d;">
        
        <div class="btn-group">
            <button onclick="undo()">↩️ Krok zpět</button>
            <button onclick="clearAll()" style="background: #c0392b;">🗑️ Smazat</button>
        </div>
        
        <textarea id="output" readonly placeholder="Zde se objeví kód..."></textarea>
        <button onclick="copyCode()" style="background: #2980b9; width: 100%;">📋 Kopírovat kód</button>
    </div>

    <script>
        const canvas = document.getElementById('editor');
        const ctx = canvas.getContext('2d');
        const output = document.getElementById('output');
        
        let mode = 'path'; 
        let data = { path: [], slots: [], objects: [] };
        let history = []; 
        let draggingPoint = null;
        let isDragging = false;
        let bgImg = new Image();
        
        let selectedObjectSrc = null;
        const loadedObjectImages = {};
        const localBlobUrls = {};
        let ghostX = null, ghostY = null;
        
        const SNAP = 10;
        const MARGIN = 80;
        const HITBOX = 25;

        function setBG(url) { 
            bgImg.src = url; 
            bgImg.onload = draw; 
        }

        function handleFolderSelect(event) {
            const files = event.target.files;
            const palette = document.getElementById('obj-palette');
            palette.innerHTML = '';
            
            let firstSrc = null;
            let firstImgElement = null;

            // Seřazení souborů abecedně
            const sortedFiles = Array.from(files).sort((a, b) => a.name.localeCompare(b.name));

            for (let file of sortedFiles) {
                if (file.name.match(/\.(png|jpg|jpeg)$/i)) {
                    const blobUrl = URL.createObjectURL(file);
                    const exportPath = `Pokemon/Assets/${file.name}`;
                    localBlobUrls[exportPath] = blobUrl;
                    
                    const img = document.createElement('img');
                    img.src = blobUrl;
                    img.title = file.name;
                    img.dataset.src = exportPath;
                    img.onclick = () => selectObjectFromPalette(img, exportPath);
                    
                    palette.appendChild(img);

                    if (!firstSrc) {
                        firstSrc = exportPath;
                        firstImgElement = img;
                    }
                }
            }
            
            if (firstSrc) {
                selectObjectFromPalette(firstImgElement, firstSrc);
            } else {
                palette.innerHTML = '<div class="palette-empty">Žádné obrázky nenalezeny</div>';
                selectedObjectSrc = null;
            }
        }

        function selectObjectFromPalette(imgElement, src) {
            document.querySelectorAll('#obj-palette img').forEach(i => i.classList.remove('selected'));
            if (imgElement) imgElement.classList.add('selected');
            selectedObjectSrc = src;
            preloadObject(src);
            draw();
        }

        function preloadObject(src) {
            if (!src) return;
            if (!loadedObjectImages[src]) {
                const img = new Image();
                img.src = localBlobUrls[src] || src;
                img.onload = draw;
                img.onerror = () => console.warn("Nepodařilo se načíst obrázek: " + src);
                loadedObjectImages[src] = img;
            }
        }

        function smoothPath(path, iterations = 2) {
            if (path.length < 3) return path;
            let result = [...path];
            for (let i = 0; i < iterations; i++) {
                let nextPath = [result[0]];
                for (let j = 0; j < result.length - 1; j++) {
                    let p0 = result[j]; let p1 = result[j + 1];
                    nextPath.push({ x: 0.75 * p0.x + 0.25 * p1.x, y: 0.75 * p0.y + 0.25 * p1.y });
                    nextPath.push({ x: 0.25 * p0.x + 0.75 * p1.x, y: 0.25 * p0.y + 0.75 * p1.y });
                }
                nextPath.push(result[result.length - 1]);
                result = nextPath;
            }
            return result;
        }

        function setMode(newMode) {
            mode = newMode;
            document.getElementById('btn-path').className = mode === 'path' ? 'active-path' : '';
            document.getElementById('btn-slot').className = mode === 'slot' ? 'active-slot' : '';
            document.getElementById('btn-obj').className = mode === 'object' ? 'active-obj' : '';
            document.getElementById('obj-settings').style.display = mode === 'object' ? 'flex' : 'none';
            ghostX = null; ghostY = null;
            draw();
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            history.push(JSON.parse(JSON.stringify(data)));

            for (let i = data.objects.length - 1; i >= 0; i--) {
                if (Math.hypot(data.objects[i].x - mouseX, data.objects[i].y - mouseY) <= HITBOX) {
                    draggingPoint = { type: 'object', index: i }; isDragging = true; return;
                }
            }
            for (let i = data.slots.length - 1; i >= 0; i--) {
                if (Math.hypot(data.slots[i].x - mouseX, data.slots[i].y - mouseY) <= HITBOX) {
                    draggingPoint = { type: 'slot', index: i }; isDragging = true; return;
                }
            }
            for (let i = data.path.length - 1; i >= 0; i--) {
                if (Math.hypot(data.path[i].x - mouseX, data.path[i].y - mouseY) <= 15) {
                    draggingPoint = { type: 'path', index: i }; isDragging = true; return;
                }
            }

            const x = Math.round(mouseX / SNAP) * SNAP;
            const y = Math.round(mouseY / SNAP) * SNAP;

            if (mode === 'slot') {
                if (x < MARGIN || x > 800 - MARGIN || y < MARGIN || y > 800 - MARGIN) { alert("Mimo povolenou zónu!"); return; }
                data.slots.push({ x, y });
            } else if (mode === 'object') {
                if(selectedObjectSrc) {
                    data.objects.push({ x, y, src: selectedObjectSrc });
                    preloadObject(selectedObjectSrc);
                }
            } else if (mode === 'path') {
                data.path.push({ x, y });
            }
            
            draw(); updateOutput();
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            let x = Math.round((e.clientX - rect.left) / SNAP) * SNAP;
            let y = Math.round((e.clientY - rect.top) / SNAP) * SNAP;

            if (isDragging && draggingPoint) {
                if (draggingPoint.type === 'slot') {
                    x = Math.max(MARGIN, Math.min(800 - MARGIN, x));
                    y = Math.max(MARGIN, Math.min(800 - MARGIN, y));
                    data.slots[draggingPoint.index] = { x, y };
                } else if (draggingPoint.type === 'object') {
                    data.objects[draggingPoint.index].x = x;
                    data.objects[draggingPoint.index].y = y;
                } else {
                    data.path[draggingPoint.index] = { x, y };
                }
                ghostX = null; ghostY = null;
                updateOutput();
            } else {
                if (mode === 'object' && selectedObjectSrc) {
                    ghostX = x; ghostY = y;
                } else {
                    ghostX = null; ghostY = null;
                }
            }
            draw();
        });

        canvas.addEventListener('mouseleave', () => { ghostX = null; ghostY = null; draw(); });
        canvas.addEventListener('mouseup', () => { isDragging = false; draggingPoint = null; });

        function draw() {
            ctx.clearRect(0, 0, 800, 800);
            if (bgImg.complete) ctx.drawImage(bgImg, 0, 0, 800, 800);

            // Objekty
            data.objects.forEach(obj => {
                const img = loadedObjectImages[obj.src];
                if (img && img.complete && img.naturalHeight !== 0) {
                    ctx.drawImage(img, obj.x - img.width / 2, obj.y - img.height / 2);
                } else {
                    ctx.fillStyle = '#9b59b6'; ctx.beginPath(); ctx.arc(obj.x, obj.y, 10, 0, Math.PI*2); ctx.fill();
                }
                ctx.strokeStyle = 'rgba(155, 89, 182, 0.4)'; ctx.lineWidth = 1; ctx.strokeRect(obj.x - 5, obj.y - 5, 10, 10);
            });

            // Ghost
            if (mode === 'object' && ghostX !== null && ghostY !== null && !isDragging && selectedObjectSrc) {
                const img = loadedObjectImages[selectedObjectSrc];
                if (img && img.complete && img.naturalHeight !== 0) {
                    ctx.globalAlpha = 0.5;
                    ctx.drawImage(img, ghostX - img.width / 2, ghostY - img.height / 2);
                    ctx.globalAlpha = 1.0;
                }
            }

            // Ochranný pruh
            ctx.strokeStyle = 'rgba(231, 76, 60, 0.5)'; ctx.setLineDash([5, 5]); ctx.lineWidth = 1;
            ctx.strokeRect(MARGIN, MARGIN, 800 - 2 * MARGIN, 800 - 2 * MARGIN); ctx.setLineDash([]);
            ctx.fillStyle = 'rgba(231, 76, 60, 0.05)';
            ctx.fillRect(0, 0, 800, MARGIN); ctx.fillRect(0, 800 - MARGIN, 800, MARGIN); 
            ctx.fillRect(0, MARGIN, MARGIN, 800 - 2 * MARGIN); ctx.fillRect(800 - MARGIN, MARGIN, MARGIN, 800 - 2 * MARGIN);

            // Cesta
            if (data.path.length > 0) {
                const smoothed = smoothPath(data.path, 2);
                ctx.lineJoin = 'round'; ctx.lineCap = 'round';
                for (let w = 100; w >= 70; w -= 6) {
                    ctx.lineWidth = w; ctx.strokeStyle = `rgba(127, 140, 141, 0.2)`;
                    ctx.beginPath(); ctx.moveTo(smoothed[0].x, smoothed[0].y);
                    for (let i = 1; i < smoothed.length; i++) ctx.lineTo(smoothed[i].x, smoothed[i].y);
                    ctx.stroke();
                }
                ctx.fillStyle = '#e74c3c';
                data.path.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI * 2); ctx.fill(); });
            }

            // Sloty
            data.slots.forEach(slot => {
                ctx.beginPath(); ctx.arc(slot.x, slot.y, 25, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(46, 204, 113, 0.3)'; ctx.strokeStyle = '#2ecc71'; ctx.lineWidth = 2; ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(slot.x, slot.y, 3, 0, Math.PI * 2); ctx.fill();
            });
        }

        function updateOutput() {
            const fmt = (arr) => '[' + arr.map(p => `{ x: ${p.x}, y: ${p.y} }`).join(', ') + ']';
            const fmtObj = (arr) => '[' + arr.map(p => `{ x: ${p.x}, y: ${p.y}, src: '${p.src}' }`).join(', ') + ']';
            output.value = `path: ${fmt(data.path)},\nslots: ${fmt(data.slots)},\nobjects: ${fmtObj(data.objects)},`;
        }

        function undo() { if (history.length > 0) { data = history.pop(); draw(); updateOutput(); } }
        function clearAll() { if(confirm("Smazat celou mapu?")) { history.push(JSON.parse(JSON.stringify(data))); data = { path: [], slots: [], objects: [] }; draw(); updateOutput(); } }
        function copyCode() { output.select(); document.execCommand('copy'); alert('Kód zkopírován!'); }
        
        setBG('Pokemon/Backgrounds/grass.png');
    </script>
</body>
</html>
