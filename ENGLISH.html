<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English ABC Game</title>
<style>
/* Základní tělo stránky */
body {font-family:sans-serif;text-align:center;padding:10px;background-color:#f8f9fa;margin:0;}

/* Horní panel */
.topbar {display:flex;flex-direction:column;align-items:center;gap:20px;margin-bottom:20px;margin-top:10px;}
.menu {display:flex;gap:15px;justify-content:center;}
.score-container {text-align:center;}

/* Tlačítka módů */
.mode-button {font-size:22px;padding:10px 20px;border:2px solid #333;border-radius:12px;cursor:pointer;transition:all 0.3s;font-weight:bold;box-shadow:2px 2px 6px rgba(0,0,0,0.2);}
.mode-button.writing {background-color:#ffcc70;color:#4b2e00;}
.mode-button.reading {background-color:#a0e8af;color:#004d25;}
.mode-button:hover {transform:scale(1.05);box-shadow:4px 4px 10px rgba(0,0,0,0.3);}

/* Styl pro menu skupin */
#group-menu {position: absolute;background: white;border: 2px solid #333;border-radius: 12px;display: none;flex-direction: column;z-index: 10002;box-shadow: 4px 4px 15px rgba(0,0,0,0.3);padding: 8px;min-width: 160px;}
#group-menu button {padding: 10px 15px;border: none;background: none;cursor: pointer;text-align: left;font-weight: bold;font-size: 16px;border-radius: 6px;transition: background 0.2s;}
#group-menu button:hover { background: #f0f0f0; }
#group-menu .active-group { background: #e0e0e0; color: #007bff; }

/* Herní prvky */
.framed-image {border:3px solid #333;max-height:220px;margin-bottom:10px;border-radius:15px;background:white;}
#image {max-height:220px;margin-bottom:10px;border-radius:15px;border:3px solid #333;}
#translation-hint {font-size: 24px; color: #2c3e50; font-weight: bold; margin-bottom: 15px; height: 30px;}

/* Skóre */
.score-label {font-size:16px;font-weight:bold;margin-bottom:5px;}
.score {font-size:24px;}
.score .good {color:green;margin-right:15px;font-weight:bold;}
.score .bad {color:red;font-weight:bold;}
.score-box {display:inline-flex;align-items:center;justify-content:center;width:80px;height:45px;overflow:hidden;position:relative;}

/* Písmenka */
.letter-box {display:inline-block;width:45px;height:45px;border:2px solid #ccc;font-size:32px;line-height:45px;margin:4px;text-align:center;vertical-align:middle;background:white;border-radius:8px;}
.correct {border-color:green;color:green;background:#e6ffe6;}
.incorrect {border-color:red;color:red;background:#ffe6e6;}
.letter-box.space {border-color:transparent !important; background:transparent !important;}

/* Animace */
@keyframes pop-in {0%{transform:scale(1);}40%{transform:scale(1.3);}100%{transform:scale(1);}}
.letter-pop {animation:pop-in 0.2s ease-out;}
.image-pop {animation:pop-in 0.2s ease-out;}

/* Čtení - Volby */
#reading-word {font-size:48px;font-weight:bold;margin:20px;color:#333;text-transform:uppercase;letter-spacing:2px;}
#reading-options {display:flex;justify-content:center;gap:20px;flex-wrap:wrap;align-items:flex-start;}
.reading-option {display: flex;flex-direction: column;align-items: center;gap: 5px;}
.reading-label {font-size: 18px;font-weight: bold;color: #333;}
#reading-options img {height:120px;cursor:pointer;border:3px solid #333;border-radius:15px;transition:transform 0.2s, filter 0.3s;background:white;}
#reading-options img:hover {transform:scale(1.1);border-color:#007bff;}

/* Progress Bar */
#progress-bar-container {margin-top:10px;margin-bottom:20px;width:300px;height:24px;border:2px solid #aaa;margin-inline:auto;position:relative;background:#f0f0f0;border-radius:12px;overflow:hidden;}
#progress-fill-green, #progress-fill-teal, #progress-fill-cyan, #progress-fill-blue, 
#progress-fill-purple, #progress-fill-pink, #progress-fill-red, #progress-fill-orange, #progress-fill-gold {
  height:100%; width:0%; position:absolute; left:0; transition:width 0.4s ease-in-out; border-radius: 12px 0 0 12px;
}
#progress-fill-green  {background:linear-gradient(to right,#00ff88,#007744); z-index:1;}
#progress-fill-teal   {background:linear-gradient(to right,#00ffaa,#008877); z-index:2;}
#progress-fill-cyan   {background:linear-gradient(to right,#33ccff,#0099cc); z-index:3;}
#progress-fill-blue   {background:linear-gradient(to right,#3399ff,#003355); z-index:4;}
#progress-fill-purple {background:linear-gradient(to right,#cc66ff,#4b0066); z-index:5;}
#progress-fill-pink   {background:linear-gradient(to right,#ff99cc,#cc0066); z-index:6;}
#progress-fill-red    {background:linear-gradient(to right,#ff4444,#880000); z-index:7;}
#progress-fill-orange {background:linear-gradient(to right,#ffaa33,#cc5500); z-index:8;}
#progress-fill-gold   {background:linear-gradient(to right,#ffd700,#ccaa00); z-index:9;}

#gif-container {position:fixed;top:100px;left:50%;transform:translateX(-160px);z-index:999;display:none;}
#wrong-robot-fixed {position:fixed;top:100px;left:50%;transform:translateX(60px);z-index:999;display:none;}
#mobile-input {position:fixed;top:-100px;left:0;width:1px;height:1px;opacity:0;}
</style>
</head>
<body>

<div class="topbar">
  <div class="menu">
    <button class="mode-button writing">✍️ WRITING</button>
    <button class="mode-button reading">📖 READING</button>
  </div>
  <div id="group-menu"></div>
  <div class="score-container">
    <div class="score-label">SCORE</div>
    <div class="score">
      <div class="score-box"><div class="score-inner good" id="score-good">0</div></div>
      <div class="score-box"><div class="score-inner bad" id="score-bad">0</div></div>
    </div>
  </div>
</div>

<div id="progress-bar-container">
  <div id="progress-fill-green"></div><div id="progress-fill-teal"></div><div id="progress-fill-cyan"></div>
  <div id="progress-fill-blue"></div><div id="progress-fill-purple"></div><div id="progress-fill-pink"></div>
  <div id="progress-fill-red"></div><div id="progress-fill-orange"></div><div id="progress-fill-gold"></div>
  <span style="position:absolute; right:5px; top:0; font-size:18px;">🏅</span>
</div>

<div id="wrong-robot-fixed"><img src="wrong-robot.gif" style="height:120px;" /></div>
<div id="gif-container"><img id="gif-animation" src="dance1.gif" style="height:120px;" /></div>

<input id="mobile-input" type="text" autocomplete="off" />

<div id="game-area">
  <img id="image" src="" alt="word image" hidden />
  <div id="translation-hint"></div>
  <div id="letters"></div>
  <div id="reading-word"></div>
  <div id="reading-options"></div>
</div>

<h5 id="medals-today-title" style="margin-top:30px; display:none;">MEDALS</h5>
<div id="medals-container" style="font-size:32px;"></div>

<div style="margin-top:20px;">
  <button id="settings-toggle" style="font-size:24px; background:none; border:none; cursor:pointer;">⚙️</button>
  <div id="settings" style="display:none; margin-top:10px;">
    <button id="toggle-uppercase" style="font-size:24px;">🔠</button>
    <button id="toggle-sound" style="font-size:24px;">🔊</button>
    <button id="toggle-kid-mode" style="font-size:24px;">🧒</button>
    <button id="toggle-stats" style="font-size: 24px;">%</button>
    
    <div id="stats-popup" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; border:3px solid #333; border-radius:15px; padding:20px; z-index:10001; max-height:80vh; overflow-y:auto; box-shadow: 0 0 20px rgba(0,0,0,0.5);">
        <h2 style="margin-top:0;">Word Progress</h2>
        <table id="stats-table" style="width:100%; border-collapse:collapse; text-align:left;">
            <thead>
                <tr style="border-bottom:2px solid #333;">
                    <th style="padding:10px;">Word</th>
                    <th style="padding:10px;">Probability</th>
                </tr>
            </thead>
            <tbody id="stats-body"></tbody>
        </table>
        <p id="stats-empty" style="display:none;">Všechna slova mají základní váhu (100 %).</p>
        <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
            <button onclick="resetAllWeights()" style="padding:10px 20px; cursor:pointer; font-weight:bold; background-color: #ff4444; color: white; border: none; border-radius: 8px;">RESET MEMORY</button>
            <button onclick="toggleStatsPopup()" style="padding:10px 20px; cursor:pointer; font-weight:bold; border-radius: 8px; border: 1px solid #333;">CLOSE</button>
        </div>
    </div>
    <div id="stats-overlay" onclick="toggleStatsPopup()" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:10000;"></div>
  </div>
</div>

<audio id="sound-correct" src="correct.mp3"></audio>
<audio id="sound-wrong" src="wrong.mp3"></audio>
<audio id="sound-win" src="win.mp3"></audio>
<audio id="sound-metal-fall" src="sound-metal-fall.mp3"></audio>
<audio id="sound-metal-fuse" src="sound-metal-fuse.mp3"></audio>

<script>
const GIF_COUNT = 16, MUSIC_COUNT = 10;
let englishData = [], pool = [], recentWords = [];
let currentItem = null, currentWord = '', currentMode = null;
let userInput = [];
let scoreGood = 0, scoreBad = 0;
let isLocked = false;
let medals = { gold: 0, silver: 0, bronze: 0, trophy: 0, crown: 0 };
let settings = { uppercase: true, sound: true, kidMode: false };
let groups = ["vše"], selectedGroups = ["vše"], holdTimer;
let wordWeights = JSON.parse(localStorage.getItem('englishWeights')) || {};

// --- INICIALIZACE A NAČÍTÁNÍ DAT ---
(async () => {
  try {
    const resp = await fetch('English/words.txt');
    if (!resp.ok) throw new Error();
    const text = await resp.text();
    const lines = text.split(/\r?\n/);
    
    let currentGroup = "vše";
    englishData = [];
    
    lines.forEach(line => {
      const trimmed = line.trim();
      if (!trimmed) return;
      if (trimmed.startsWith('"') && trimmed.endsWith('"')) {
        currentGroup = trimmed.replace(/"/g, '');
        if (!groups.includes(currentGroup)) groups.push(currentGroup);
      } else if (trimmed.includes('-')) {
        const [en, cz] = trimmed.split('-').map(s => s.trim());
        englishData.push({ en, cz, img: `English/${en}.jpg`, audio: `English/${en}.mp3`, group: currentGroup });
      }
    });
  } catch (e) {
    alert("Chyba při načítání English/words.txt");
  }
})();

function loadSettings() {
  const match = document.cookie.match(/englishSettings=([^;]+)/);
  if (match) {
    try {
      settings = JSON.parse(match[1]);
      document.getElementById('toggle-uppercase').textContent = settings.uppercase ? '🔠' : '🔡';
      document.getElementById('toggle-sound').textContent = settings.sound ? '🔊' : '🔇';
      document.getElementById('toggle-kid-mode').textContent = settings.kidMode ? '👶' : '🧒';
    } catch (e) {}
  }
}

function saveSettings() {
  document.cookie = `englishSettings=${JSON.stringify(settings)};path=/;max-age=31536000`;
}

// --- LOGIKA VÁŽENÉ PRAVDĚPODOBNOSTI ---
function saveWeights() {
  localStorage.setItem('englishWeights', JSON.stringify(wordWeights));
}

function updateWordWeight(word, hadError) {
  let w = wordWeights[word] || 100;
  wordWeights[word] = hadError ? Math.min(300, w + 50) : Math.max(25, w - 25);
  saveWeights();
}

function getNextWord() {
  let filtered = selectedGroups.includes("vše") ? englishData : englishData.filter(item => selectedGroups.includes(item.group));
  if (filtered.length === 0) filtered = englishData;

  let bufferSize = Math.max(0, Math.min(5, Math.floor(filtered.length * 0.4)));
  let candidates = filtered.filter(item => !recentWords.includes(item.en));
  if (candidates.length === 0) { candidates = [...filtered]; recentWords = []; }

  let totalWeight = candidates.reduce((sum, item) => sum + (wordWeights[item.en] || 100), 0);
  let random = Math.random() * totalWeight;
  let cursor = 0, selectedItem = candidates[0];

  for (let item of candidates) {
    cursor += (wordWeights[item.en] || 100);
    if (random <= cursor) { selectedItem = item; break; }
  }

  recentWords.push(selectedItem.en);
  if (recentWords.length > bufferSize) recentWords.shift();
  return selectedItem;
}

function getWeightColor(w) {
  if (w <= 25) return "rgb(0, 128, 0)";
  if (w >= 300) return "rgb(255, 0, 0)";
  if (w < 100) {
    let factor = (w - 25) / 75;
    return `rgb(0, ${Math.round(128 * (1 - factor))}, 0)`;
  } else if (w < 200) {
    let factor = (w - 100) / 100;
    return `rgb(${Math.round(255 * factor)}, ${Math.round(165 * factor)}, 0)`;
  } else {
    let factor = (w - 200) / 100;
    return `rgb(255, ${Math.round(165 * (1 - factor))}, 0)`;
  }
}

// --- HERNÍ LOGIKA ---
function startGame(mode) {
  if (englishData.length === 0) return;
  currentMode = mode;
  
  document.getElementById('image').hidden = true;
  document.getElementById('translation-hint').textContent = '';
  document.getElementById('letters').innerHTML = '';
  document.getElementById('reading-word').textContent = '';
  document.getElementById('reading-options').innerHTML = '';
  userInput = []; isLocked = false;
  
  document.removeEventListener('keydown', handleKey);
  if (mode === 'writing') {
    loadWritingTask();
    document.addEventListener('keydown', handleKey);
  } else {
    loadReadingTask();
  }
  const mobileInput = document.getElementById('mobile-input');
  if (mobileInput) mobileInput.focus();
}

function loadWritingTask() {
  currentItem = getNextWord();
  currentWord = currentItem.en;
  currentItem.firstTryError = false; 
  userInput = []; isLocked = false;
  
  document.getElementById('image').src = currentItem.img;
  document.getElementById('image').hidden = false;
  document.getElementById('translation-hint').textContent = currentItem.cz.replace(/_/g, ' ');
  playAudio(currentItem.audio);
  
  const lettersDiv = document.getElementById('letters');
  lettersDiv.innerHTML = '';
  for (let char of currentWord) {
    const span = document.createElement('span');
    span.className = 'letter-box' + (char === '_' ? ' space' : '');
    lettersDiv.appendChild(span);
  }
  while (userInput.length < currentWord.length && currentWord[userInput.length] === '_') userInput.push('_');
}

function loadReadingTask() {
  currentItem = getNextWord();
  currentWord = currentItem.en;
  currentItem.firstTryError = false;
  isLocked = false;
  
  const wordEl = document.getElementById('reading-word');
  wordEl.textContent = currentWord.replace(/_/g, ' ');
  wordEl.style.color = getWeightColor(wordWeights[currentItem.en] || 100);
  document.getElementById('translation-hint').textContent = "";
  playAudio(currentItem.audio);
  
  const container = document.getElementById('reading-options');
  container.innerHTML = '';

  const options = [...englishData.filter(i => i.en !== currentWord).sort(() => 0.5 - Math.random()).slice(0, 4), currentItem].sort(() => 0.5 - Math.random());

  options.forEach(item => {
    const wrapper = document.createElement('div');
    wrapper.className = 'reading-option';
    const img = document.createElement('img');
    img.src = item.img;
    img.onclick = () => {
      if (isLocked) return;
      item.en === currentWord ? handleSuccess(img, item.audio) : handleError(img, item.audio);
    };
    const label = document.createElement('div');
    label.className = 'reading-label';
    label.textContent = item.cz.replace(/_/g, ' ');

    wrapper.append(img, label);
    container.appendChild(wrapper);
  });
}

function handleKey(e) {
  if (isLocked || e.repeat) return;
  const key = e.key;

  if (key === 'Backspace') {
    do { userInput.pop(); } while (userInput.length > 0 && currentWord[userInput.length - 1] === '_');
    updateDisplay(); return;
  }
  if (key === ' ') { if (e.preventDefault) e.preventDefault(); return; }
  if (!key || key.length !== 1 || !/[a-zA-Z]/.test(key)) return;
  if (e.preventDefault) e.preventDefault();

  while (userInput.length < currentWord.length && currentWord[userInput.length] === '_') userInput.push('_');

  const idx = userInput.length;
  if (idx < currentWord.length) {
    if (key.toLowerCase() === currentWord[idx].toLowerCase()) {
      userInput.push(key);
      scoreGood++; 
      const isCelebrating = addProgress(1); 
      playSound('sound-correct');
      
      while (userInput.length < currentWord.length && currentWord[userInput.length] === '_') userInput.push('_');
      updateDisplay();
      
      if (userInput.length === currentWord.length) {
        isLocked = true;
        document.getElementById('translation-hint').textContent = currentItem.cz.replace(/_/g, ' ');
        playSound('sound-win');
        updateWordWeight(currentItem.en, currentItem.firstTryError);
        
        if (!isCelebrating) setTimeout(loadWritingTask, 2000);
      }
    } else {
      if (currentItem) currentItem.firstTryError = true;
      scoreBad++;
      if (!settings.kidMode) resetProgressBar();
      playSound('sound-wrong');
      showWrongRobot();
      updateScoreDisplay();
      
      const boxes = document.getElementById('letters').children;
      if (boxes[idx]) {
        boxes[idx].textContent = key;
        boxes[idx].classList.add('incorrect');
        isLocked = true;
        setTimeout(() => { boxes[idx].textContent = ''; boxes[idx].classList.remove('incorrect'); isLocked = false; }, 500);
      }
    }
  }
}

function handleSuccess(img, audioPath) {
  isLocked = true;
  img.classList.add('image-pop');
  playAudio(audioPath);
  scoreGood++; 
  updateWordWeight(currentItem.en, currentItem.firstTryError);

  const isCelebrating = addProgress(3); 
  updateScoreDisplay();
  if (!isCelebrating) setTimeout(loadReadingTask, 2000);
}

function handleError(img, audioPath) {
  isLocked = true;
  img.style.filter = 'grayscale(1) opacity(0.5)';
  scoreBad++;
  if (currentItem) currentItem.firstTryError = true;

  if (!settings.kidMode) resetProgressBar();
  playAudio(audioPath);
  playSound('sound-wrong');
  showWrongRobot();
  updateScoreDisplay();
  setTimeout(() => { isLocked = false; }, 1000);
}

function updateDisplay() {
  const boxes = document.getElementById('letters').children;
  for (let i = 0; i < boxes.length; i++) {
    const char = userInput[i];
    if (currentWord[i] === '_') {
      boxes[i].textContent = '';
      boxes[i].className = 'letter-box space';
    } else {
      boxes[i].textContent = char || '';
      boxes[i].className = 'letter-box' + (char ? ' correct' : '');
      if (settings.uppercase && char) boxes[i].style.textTransform = 'uppercase';
    }
  }
  updateScoreDisplay();
}

// --- POMOCNÉ FUNKCE A PROGRESS ---
function playSound(id) {
  if (!settings.sound || (settings.kidMode && id === 'sound-wrong')) return;
  const s = document.getElementById(id);
  if (s) { s.currentTime = 0; s.play().catch(()=>{}); }
}
function playAudio(path) { if (settings.sound) new Audio(path).play().catch(()=>{}); }
function updateScoreDisplay() { document.getElementById('score-good').textContent = scoreGood; document.getElementById('score-bad').textContent = scoreBad; }
function showWrongRobot() {
  if (settings.kidMode) return;
  const r = document.getElementById('wrong-robot-fixed');
  if (r) { r.style.display = 'block'; setTimeout(() => r.style.display = 'none', 1200); }
}

let progressPoints = 0, progressLayer = 0;
function addProgress(p) {
  let isCelebrating = false;
  progressPoints += p;
  if (progressPoints >= 15) {
    if (progressLayer === 8 && typeof showWinBanner === "function") showWinBanner();
    progressPoints = 0; progressLayer = (progressLayer + 1) % 9;
    addMedal('bronze'); showCelebration(); isCelebrating = true;
  }
  updateProgressBar();
  return isCelebrating;
}

function updateProgressBar() {
  const pct = (progressPoints / 15) * 100;
  const ids = ["green", "teal", "cyan", "blue", "purple", "pink", "red", "orange", "gold"];
  ids.forEach((color, index) => {
    const el = document.getElementById(`progress-fill-${color}`);
    if (el) el.style.width = index < progressLayer ? "100%" : (index === progressLayer ? pct + "%" : "0%");
  });
}

function resetProgressBar() { progressPoints = 0; progressLayer = 0; updateProgressBar(); }

function addMedal(type) {
  medals[type]++; updateMedalsUI(); playSound('sound-metal-fall');
  if (medals[type] >= 3 && type !== 'crown') setTimeout(() => mergeMedals(type), 1000);
}
function mergeMedals(type) {
  const next = {bronze:'silver', silver:'gold', gold:'trophy', trophy:'crown'}[type];
  medals[type] -= 3; medals[next]++;
  playSound('sound-metal-fuse'); updateMedalsUI();
  if (medals[next] >= 3 && next !== 'crown') mergeMedals(next);
}
function updateMedalsUI() {
  const container = document.getElementById('medals-container');
  container.innerHTML = '';
  const map = {crown:'👑', trophy:'🏆', gold:'🥇', silver:'🥈', bronze:'🥉'};
  let total = 0;
  for (let [k, v] of Object.entries(map)) {
    for (let i = 0; i < medals[k]; i++) {
      const s = document.createElement('span'); s.textContent = v; s.className='medal';
      container.appendChild(s); total++;
    }
  }
  document.getElementById('medals-today-title').style.display = total > 0 ? 'block' : 'none';
}

function showCelebration() {
  const container = document.getElementById('gif-container');
  document.getElementById('gif-animation').src = `dance${Math.floor(Math.random()*GIF_COUNT)+1}.gif`;
  container.style.display = 'block';
  
  const finish = () => { container.style.display = 'none'; currentMode === 'writing' ? loadWritingTask() : loadReadingTask(); };
  if (!settings.sound) { setTimeout(finish, 4000); return; }
  const audio = new Audio(`music${Math.floor(Math.random()*MUSIC_COUNT)+1}.mp3`);
  audio.play().catch(() => setTimeout(finish, 4000));
  audio.onended = finish;
}

// --- STATISTIKY ---
function toggleStatsPopup() {
  const popup = document.getElementById('stats-popup'), overlay = document.getElementById('stats-overlay');
  if (popup.style.display === 'none') { renderStatsTable(); popup.style.display = 'block'; overlay.style.display = 'block'; } 
  else { popup.style.display = 'none'; overlay.style.display = 'none'; }
}

function renderStatsTable() {
  const tbody = document.getElementById('stats-body'), emptyMsg = document.getElementById('stats-empty');
  tbody.innerHTML = '';
  
  const statsData = englishData.map(item => ({ en: item.en, cz: item.cz.replace(/_/g, ' '), weight: wordWeights[item.en] || 100 }))
    .filter(item => item.weight !== 100).sort((a, b) => b.weight - a.weight);

  if (statsData.length === 0) { emptyMsg.style.display = 'block'; return; }
  
  emptyMsg.style.display = 'none';
  statsData.forEach(item => {
    const color = item.weight > 100 ? "#e74c3c" : (item.weight < 100 ? "#27ae60" : "#333");
    const row = document.createElement('tr');
    row.style.borderBottom = "1px solid #eee";
    row.innerHTML = `<td style="padding:10px;"><strong>${item.en}</strong><br><small>${item.cz}</small></td><td style="padding:10px; color:${color}; font-weight:bold;">${item.weight}%</td>`;
    tbody.appendChild(row);
  });
}

function resetAllWeights() {
  if (confirm("Opravdu chcete vymazat veškerý naučený pokrok a vrátit všechna slova na 100 %?")) {
    wordWeights = {}; saveWeights(); renderStatsTable();
  }
}

// --- OVLÁDÁNÍ ---
document.getElementById('settings-toggle').onclick = () => { const s = document.getElementById('settings'); s.style.display = s.style.display === 'none' ? 'block' : 'none'; };
document.getElementById('toggle-uppercase').onclick = () => { settings.uppercase = !settings.uppercase; document.getElementById('toggle-uppercase').textContent = settings.uppercase ? '🔠' : '🔡'; saveSettings(); updateDisplay(); };
document.getElementById('toggle-sound').onclick = () => { settings.sound = !settings.sound; document.getElementById('toggle-sound').textContent = settings.sound ? '🔊' : '🔇'; saveSettings(); };
document.getElementById('toggle-kid-mode').onclick = () => { settings.kidMode = !settings.kidMode; document.getElementById('toggle-kid-mode').textContent = settings.kidMode ? '👶' : '🧒'; saveSettings(); };
document.getElementById('mobile-input').oninput = (e) => { const val = e.target.value; if (val) { handleKey({key: val.slice(-1)}); e.target.value = ''; } };

function showGroupMenu(x, y) {
  const menu = document.getElementById('group-menu');
  if (!menu) return;
  menu.innerHTML = '';
  
  groups.forEach(group => {
    const btn = document.createElement('button');
    const isActive = selectedGroups.includes(group);
    
    btn.textContent = (isActive ? "✓ " : "") + group;
    if (isActive) btn.className = 'active-group';
    
    btn.onclick = (e) => { 
      e.stopPropagation(); 
      
      if (group === "vše") {
        selectedGroups = ["vše"];
      } else {
        selectedGroups = selectedGroups.filter(g => g !== "vše"); // Odebere "vše"
        if (selectedGroups.includes(group)) {
          selectedGroups = selectedGroups.filter(g => g !== group); // Odznačí
          if (selectedGroups.length === 0) selectedGroups = ["vše"]; // Pojistka
        } else {
          selectedGroups.push(group); // Přidá
        }
      }
      recentWords = []; 
      showGroupMenu(x, y); // Překreslí menu (nechá ho otevřené)
    };
    menu.appendChild(btn);
  });
  
  menu.style.left = x + 'px'; menu.style.top = y + 'px'; menu.style.display = 'flex';
}

function setupModeButtons() {
  [{ class: 'writing', name: 'writing' }, { class: 'reading', name: 'reading' }].forEach(m => {
    const btn = document.querySelector(`.mode-button.${m.class}`);
    if (!btn) return;
    let longPressTriggered = false;

    const onStart = (e) => {
      longPressTriggered = false;
      const x = e.touches ? e.touches[0].pageX : e.pageX;
      const y = e.touches ? e.touches[0].pageY : e.pageY;
      if (m.name === 'reading') { holdTimer = setTimeout(() => { longPressTriggered = true; showGroupMenu(x, y); }, 1000); }
    };
    const onEnd = (e) => {
      clearTimeout(holdTimer);
      if (!longPressTriggered) { if (e.type === 'touchend') e.preventDefault(); startGame(m.name); }
    };

    btn.onclick = (e) => { if (longPressTriggered) { e.stopPropagation(); longPressTriggered = false; } };
    btn.onmousedown = onStart; btn.onmouseup = onEnd; btn.onmouseleave = () => clearTimeout(holdTimer);
    btn.ontouchstart = onStart; btn.ontouchend = onEnd;
  });
}

// --- INIT ---
setupModeButtons();
const statsBtn = document.getElementById('toggle-stats');
if (statsBtn) statsBtn.onclick = toggleStatsPopup;
// NAHRADIT TENTO BLOK NA KONCI SOUBORU:
document.addEventListener('click', (e) => {
  const menu = document.getElementById('group-menu'), isModeBtn = e.target.closest('.mode-button');
  // Oprava: kontrolujeme, zda je menu explicitně otevřené (style.display === 'flex')
  if (menu && menu.style.display === 'flex' && !menu.contains(e.target) && !isModeBtn) {
    menu.style.display = 'none';
    startGame('reading'); // Načte nová slova až když uživatel dokliká a zavře menu
  }
});
loadSettings();
