<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Defense - All Branching Upgrades</title>
    <style>
        :root { --bg-dark: #2c3e50; --panel-bg: #34495e; --text-light: #ecf0f1; --accent: #e74c3c; --canvas-bg: #1a252f; --win-color: #2ecc71; --upgrade-color: #f39c12; --level-menu-bg: #2c3e50; --btn-size: 40px; }
        body { margin: 0; min-height: 100vh; min-height: 100dvh; background-color: var(--bg-dark); font-family: system-ui, -apple-system, sans-serif; color: var(--text-light); overflow: hidden; touch-action: none; position: relative; }
        .main-container { position: absolute; top: 50%; left: 50%; display: flex; gap: 20px; transform-origin: center center; width: max-content; }
        .level-sidebar { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: row; gap: 10px; background: rgba(52, 73, 94, 0.2); padding: 10px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 20; visibility: visible; }
        .game-ui.active ~ .level-sidebar, .level-sidebar.hidden { display: none; }
        .level-btn { width: 50px; height: 50px; border: 2px solid transparent; border-radius: 8px; color: white; font-size: 1.2rem; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: all 0.2s ease; }
        .level-btn.completed { background: #27ae60; border-color: #2ecc71; }
        .level-btn.completed:hover { transform: scale(1.05); filter: brightness(1.2); }
        .level-btn.unlocked { background: #f1c40f; border-color: #f39c12; color: #2c3e50; }
        .level-btn.unlocked:hover { transform: scale(1.05); filter: brightness(1.1); }
        .level-btn:disabled { cursor: not-allowed; background: #c0392b; border-color: #e74c3c; opacity: 0.8; }
        .game-wrapper { display: flex; flex-direction: column; gap: 1rem; }
        .game-ui { position: absolute; top: 0; left: 0; width: 100%; box-sizing: border-box; z-index: 10; display: flex; justify-content: space-between; align-items: center; background: rgba(52, 73, 94, 0.2); padding: 5px 15px; font-size: 1rem; visibility: hidden; }
        .game-ui.active { visibility: visible; }
        .stats { display: flex; gap: 1.5rem; text-shadow: 1px 1px 2px #000; }
        .controls-group { display: flex; gap: 10px; }
        .icon-btn { width: 30px; height: 30px; background: var(--accent); color: white; border: none; border-radius: 4px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: filter 0.2s ease, transform 0.1s ease; }
        .icon-btn:hover:not(:disabled) { filter: brightness(1.1); transform: scale(1.05); }
        .icon-btn:active:not(:disabled) { transform: scale(0.95); }
        .icon-btn:disabled { opacity: 0.5; cursor: not-allowed; background: #7f8c8d; }
        .icon-btn svg { width: 16px; height: 16px; fill: currentColor; }
        .btn-end { background: #c0392b; }
        .btn-play-pause { background: #27ae60; }
        .btn-primary { background: var(--accent); color: white; border: none; padding: 0.5rem 1rem; font-size: 1rem; border-radius: 4px; cursor: pointer; font-weight: bold; transition: filter 0.2s ease; }
        .btn-primary:hover { filter: brightness(1.1); }
        .canvas-container { position: relative; border: 4px solid var(--panel-bg); border-radius: 8px; overflow: hidden; background: url('Pokemon/Backgrounds/main.jpg') no-repeat center / cover; width: 800px; height: 800px; }
        #game-canvas { display: block; image-rendering: pixelated; }
        #tower-menu, #upgrade-menu { position: absolute; pointer-events: none; z-index: 5; }
        .hidden { display: none !important; }
        .radial-btn { position: absolute; background: rgba(52, 73, 94, 0.9); border: 2px solid transparent; cursor: pointer; border-radius: 50%; width: 60px; height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.2s ease, border-color 0.2s ease; color: white; pointer-events: auto; transform: translate(-50%, -50%); box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        .radial-btn:hover:not(:disabled) { border-color: var(--text-light); transform: translate(-50%, -50%) scale(1.1); }
        .radial-btn.upgrade { background: rgba(243, 156, 18, 0.9); border-color: #e67e22; }
        .radial-btn:disabled { background: rgba(127, 140, 141, 0.9); border-color: #95a5a6; cursor: not-allowed; }
        .price-tag { font-size: 0.7rem; font-weight: bold; background: rgba(0,0,0,0.7); padding: 2px 4px; border-radius: 4px; position: absolute; bottom: -10px; }
        .modal { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 3rem; font-weight: bold; z-index: 10; }
        #modal-text.win { color: var(--win-color); }
        #modal-text.lose { color: var(--accent); }
        #unlock-container { display: flex; flex-direction: column; align-items: center; margin-top: 20px; opacity: 0; transform: scale(0); }
        #unlock-container.active { animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .unlock-star { position: relative; font-size: 6rem; line-height: 1; color: #f1c40f; display: flex; justify-content: center; align-items: center; filter: drop-shadow(0 0 20px rgba(241,196,15,1)); }
        #unlock-level-num { position: absolute; font-size: 2.5rem; color: #2c3e50; font-weight: 900; text-shadow: none; margin-top: 5px; font-family: sans-serif; }
        .unlock-text { font-size: 1.8rem; color: #f1c40f; letter-spacing: 6px; margin-top: 15px; text-transform: uppercase; text-shadow: 2px 2px 4px #000; animation: unlockPulse 1s infinite alternate; font-weight: bold; }
        .fade-in { animation: fadeIn 0.5s ease forwards; }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes unlockPulse { 0% { opacity: 0.7; filter: drop-shadow(0 0 5px #f1c40f); } 100% { opacity: 1; filter: drop-shadow(0 0 15px #f1c40f); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .pokemon-menu-icon { width: 48px; height: 48px; background-size: cover; background-repeat: no-repeat; background-position: center; image-rendering: auto; border-radius: 50%; overflow: hidden; }
        #info-tooltip { position: absolute; background: rgba(255, 255, 255, 0.8); border: 1px solid #000; border-radius: 6px; color: #000; padding: 12px; font-size: 0.9rem; pointer-events: none; z-index: 20; width: 240px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); display: flex; flex-direction: column; gap: 6px; transition: opacity 0.2s ease, visibility 0.2s ease; }
        #info-tooltip.hidden { opacity: 0; visibility: hidden; }
        .tooltip-header { font-weight: bold; text-align: center; border-bottom: 1px solid #000; padding-bottom: 6px; margin-bottom: 2px; font-size: 1rem; }
        .tooltip-row { display: flex; justify-content: space-between; }
        .tooltip-effects { margin-top: 6px; font-size: 0.8rem; font-style: italic; border-top: 1px dotted #666; padding-top: 6px; }
        .main-menu-bottom { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 20; transition: opacity 0.3s ease; }
        .main-menu-bottom.hidden { opacity: 0; pointer-events: none; }
       .dex-btn { width: 50px; height: 50px; border-radius: 8px; border: 2px solid rgb(79, 87, 32); box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s ease; padding: 0; background-size: cover; background-position: center; background-repeat: no-repeat; cursor: pointer; }
        .dex-btn:hover { transform: scale(1.05); border-color: #d4f543; filter: brightness(1.1); }
        #btn-dex-pokemon { background-image: url('Pokemon/Pictures/Enc-pok.jpg'); }
        #btn-dex-enemies { background-image: url('Pokemon/Pictures/Enc-mon.png'); }
        .dex-modal { position: absolute; inset: 20px; background: rgba(44, 62, 80, 0.98); border: 4px solid var(--panel-bg); border-radius: 12px; z-index: 30; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .dex-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: rgba(0,0,0,0.4); border-bottom: 2px solid var(--panel-bg); }
        .dex-header h2 { margin: 0; font-size: 1.8rem; color: #f1c40f; text-shadow: 1px 1px 3px #000; }
        .close-dex { background: none; border: none; font-size: 1.5rem; cursor: pointer; transition: transform 0.2s; filter: grayscale(1); }
        .close-dex:hover { transform: scale(1.2); filter: grayscale(0); }

        .dex-content { flex: 1; overflow: hidden; padding: 10px; display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 8px; box-sizing: border-box; }
        .enemy-card { position: relative; background: rgba(0,0,0,0.6); border: 1px solid #7f8c8d; border-radius: 6px; padding: 6px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; transition: transform 0.2s; box-sizing: border-box; height: 100%; overflow: hidden; }
        .enemy-card:hover { transform: translateY(-3px); border-color: #e74c3c; background: rgba(0,0,0,0.8); z-index: 5; }
        .enemy-card h3 { position: relative; z-index: 1; margin: 0; font-size: 0.85rem; color: #e74c3c; width: 100%; text-align: center; text-transform: capitalize; background: rgba(0,0,0,0.6); border-radius: 4px; padding: 2px 0; text-shadow: 1px 1px 2px #000; border-bottom: 1px solid #555; }
        .enemy-stats { position: relative; z-index: 1; font-size: 0.75rem; width: 100%; display: flex; flex-direction: column; gap: 2px; color: #ecf0f1; text-align: center; background: rgba(0,0,0,0.6); border-radius: 4px; padding: 4px; text-shadow: 1px 1px 2px #000; box-sizing: border-box; }
        .res-stats { display: flex; justify-content: center; flex-wrap: wrap; gap: 4px; font-size: 0.65rem; margin-top: 2px; }
        .dex-sprite-viewport { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); overflow: hidden; z-index: 0; pointer-events: none; }
        .dex-sprite-strip { position: absolute; left: 0; top: 0; background-repeat: no-repeat; image-rendering: pixelated; }
        @keyframes dex-sprite-walk { from { transform: translateX(0); } to { transform: translateX(-100%); } }

        #pokemon-dex-content { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 10px; overflow-y: auto; align-content: start; height: 100%; box-sizing: border-box; }
        .poke-card { position: relative; background: rgba(0,0,0,0.6); border: 1px solid #7f8c8d; border-radius: 6px; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; text-align: center; transition: transform 0.2s; height: 100%; box-sizing: border-box; gap: 8px; }
        .poke-card:hover { transform: translateY(-3px); border-color: #ffd700; background: rgba(0,0,0,0.9); z-index: 5; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .poke-card h3 { position: relative; z-index: 1; margin: 0; font-size: 1rem; width: 100%; background: rgba(0,0,0,0.6); border-radius: 4px; padding: 4px 0; text-shadow: 1px 1px 2px #000; border-bottom: 1px solid #555; flex-shrink: 0; }
        .poke-card .dex-sprite-viewport { position: relative; top: auto; left: auto; transform: none; margin: 5px 0; flex-shrink: 0; z-index: 1; pointer-events: none; }
        .split-stats-container { position: relative; z-index: 1; display: flex; width: 100%; gap: 6px; align-items: stretch; margin-top: auto; }
        .split-stat-block { flex: 1; background: rgba(0,0,0,0.6); border-radius: 4px; padding: 6px; display: flex; flex-direction: column; align-items: center; box-sizing: border-box; justify-content: flex-start; }
        .split-header { font-size: 0.75rem; font-weight: bold; color: #f1c40f; border-bottom: 1px dotted #7f8c8d; width: 100%; margin-bottom: 4px; padding-bottom: 2px; }
        .poke-card > .poke-stats { margin-top: auto; }
        .poke-stats { position: relative; z-index: 1; font-size: 0.8rem; color: #ecf0f1; display: flex; flex-direction: column; gap: 4px; width: 100%; background: rgba(0,0,0,0.6); border-radius: 4px; padding: 6px; text-shadow: 1px 1px 2px #000; box-sizing: border-box; flex-grow: 1; }
        .poke-stats strong { color: #f1c40f; }
        .poke-effects { font-size: 0.75rem; color: #a29bfe; font-style: italic; margin-top: 4px; border-top: 1px dotted #666; padding-top: 4px; line-height: 1.2; }

        #bonus-container { position: absolute; bottom: 20px; left: 20px; display: flex; gap: 10px; z-index: 20; }
        .bonus-btn { width: 50px; height: 50px; border-radius: 8px; border: 3px solid transparent; cursor: pointer; background-size: cover; background-position: center; transition: transform 0.2s, filter 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.5); background-color: rgba(0,0,0,0.5); }
        .bonus-btn.ready { border-color: #ffd700; animation: pulseGold 1.5s infinite; filter: brightness(1.2); }
        .bonus-btn.ready:hover { transform: scale(1.1); }
        .bonus-btn.used { border-color: #7f8c8d; filter: grayscale(1) brightness(0.5); cursor: not-allowed; animation: none; }
        .bonus-btn.selected { border-color: #2ecc71; transform: scale(1.1); animation: none; box-shadow: 0 0 15px #2ecc71; }
        canvas.bonus-placement { cursor: crosshair !important; }
        @keyframes pulseGold { 0% { box-shadow: 0 0 5px #ffd700; } 50% { box-shadow: 0 0 20px #ffd700; } 100% { box-shadow: 0 0 5px #ffd700; } }

        .enter-anim-circle { position: absolute; width: 250px; height: 250px; border: 4px solid #ffd700; border-radius: 50%; overflow: hidden; pointer-events: none; z-index: 15; transform: translate(-50%, -50%); box-shadow: 0 0 15px rgba(255, 215, 0, 0.8), inset 0 0 15px rgba(255, 215, 0, 0.8); background: rgba(0,0,0,0.4); opacity: 1; transition: opacity 0.5s ease; }
        .enter-anim-circle img { width: 100%; height: 100%; object-fit: cover; }

        #debug-trigger { position: absolute; top: 0; left: 0; width: 10px; height: 10px; z-index: 1000; cursor: default; }
        #debug-menu { position: absolute; top: 15px; left: 15px; background: var(--panel-bg); border: 2px solid var(--accent); padding: 15px; z-index: 1001; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 10px; }
        #debug-menu label { font-weight: bold; font-size: 0.9rem; color: var(--text-light); }
        #debug-menu input { padding: 5px; border-radius: 4px; border: 1px solid #7f8c8d; background: #2c3e50; color: white; width: 60px; }
    </style>
</head>
<body>
    <div class="main-container">
        <main class="game-wrapper">
            <section class="canvas-container" id="main-canvas-container">
                <nav class="level-sidebar" id="level-sidebar"></nav>
                <div id="debug-trigger"></div>
                <div id="debug-menu" class="hidden">
                    <label>Odemčeno kol:</label>
                    <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 5px;">
                        <input type="number" id="debug-level-input" min="1" max="10">
                        <button id="debug-save-btn" class="btn-primary" style="padding: 5px 10px; font-size: 0.8rem;">Uložit</button>
                    </div>
                    <button id="debug-win-btn" class="btn-primary" style="padding: 5px 10px; font-size: 0.8rem; background: #27ae60;">Okamžitá výhra (Test)</button>
                </div>
                <header class="game-ui" id="game-ui-header">
                    <div class="stats">
                        <span>🪙 <strong id="gold-display">500</strong></span>
                        <span>Vlna: <strong id="wave-display">0/10</strong></span>
                    </div>
                    <div class="controls-group">
                        <button id="btn-end-game" class="icon-btn btn-end" title="Ukončit hru" disabled><svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg></button>
                        <button id="btn-play-pause" class="icon-btn btn-play-pause" title="Spustit hru" disabled>
                            <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            <svg class="icon-pause hidden" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        </button>
                    </div>
                </header>

                <canvas id="game-canvas" width="800" height="800"></canvas>
                <div id="tower-menu" class="hidden" aria-label="Výběr věže"></div>
                <div id="upgrade-menu" class="hidden" aria-label="Vylepšení věže"></div>
                <div id="game-modal" class="modal hidden" role="dialog" aria-labelledby="modal-text">
                    <span id="modal-text"></span>
                    <div id="unlock-container" class="hidden">
                        <div class="unlock-star">⭐<span id="unlock-level-num"></span></div>
                        <div class="unlock-text">Unlocked</div>
                    </div>
                    <button id="restart-btn" class="btn-primary hidden" style="margin-top: 1.5rem; font-size: 1.5rem;">Continue</button>
                </div>
                <div id="info-tooltip" class="hidden"></div>

                <div id="bonus-container" class="hidden"></div>
                <nav class="main-menu-bottom" id="main-menu-bottom">
                    <button id="btn-dex-pokemon" class="icon-btn dex-btn" title="Encyklopedie Pokémonů"></button>
                    <button id="btn-dex-enemies" class="icon-btn dex-btn" title="Encyklopedie Nepřátel"></button>
                </nav>

                <div id="enemy-dex-modal" class="dex-modal hidden" role="dialog">
                    <div class="dex-header"><h2>Encyklopedie Nepřátel</h2><button class="close-dex">❌</button></div>
                    <div class="dex-content" id="enemy-dex-content"></div>
                </div>
                <div id="pokemon-dex-modal" class="dex-modal hidden" role="dialog">
                    <div class="dex-header"><h2>Encyklopedie Pokémonů</h2><button class="close-dex">❌</button></div>
                    <div class="dex-content" id="pokemon-dex-content"></div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // ==========================================
        // 1. KONSTANTY A KONFIGURACE
        // ==========================================
        const TOWER_COST = 100;

        const ENEMY_STATS = {
            vampire: {
                1: { hp: 80, speed: 50, size: 0.9, gold: 15, res: { grass: 0, water: 0, fire: -25, electric: -25 }, walkSrc: 'Pokemon/SPRITES/Vampire1/Vampires1_Walk_with_shadow.png', walkFrames: 6, dieSrc: 'Pokemon/SPRITES/Vampire1/Vampires1_Death_with_shadow.png', dieFrames: 11 },
                2: { hp: 150, speed: 55, size: 1.1, gold: 25, res: { grass: 0, water: 0, fire: -50, electric: -20 }, walkSrc: 'Pokemon/SPRITES/Vampire2/Vampires2_Walk_with_shadow.png', walkFrames: 6, dieSrc: 'Pokemon/SPRITES/Vampire2/Vampires2_Death_with_shadow.png', dieFrames: 11 },
                3: { hp: 500, speed: 60, size: 1.3, gold: 100, res: { grass: 0, water: 0, fire: -50, electric: -20 }, walkSrc: 'Pokemon/SPRITES/Vampire3/Vampires3_Walk_with_shadow.png', walkFrames: 6, dieSrc: 'Pokemon/SPRITES/Vampire3/Vampires3_Death_with_shadow.png', dieFrames: 11 },
                4: { hp: 600, speed: 120, size: 1.3, gold: 100, res: { grass: 0, water: 0, fire: -75, electric: -50 }, walkSrc: 'Pokemon/SPRITES/Vampire3/Vampires3_Run_with_shadow.png', walkFrames: 8, dieSrc: 'Pokemon/SPRITES/Vampire3/Vampires3_Death_with_shadow.png', dieFrames: 11 },
            },
            orc: {
                1: { hp: 40, speed: 40, size: 1.0, gold: 10, res: { grass: 0, water: -25, fire: 25, electric:25 }, walkSrc: 'Pokemon/SPRITES/Orc1/orc1_walk_with_shadow.png', walkFrames: 6, dieSrc: 'Pokemon/SPRITES/Orc1/orc1_death_with_shadow.png', dieFrames: 8 },
                2: { hp: 90, speed: 42, size: 1.1, gold: 20, res: { grass: 0, water: 0, fire: 50, electric: 30 }, walkSrc: 'Pokemon/SPRITES/Orc2/orc2_walk_with_shadow.png', walkFrames: 6, dieSrc: 'Pokemon/SPRITES/Orc2/orc2_death_with_shadow.png', dieFrames: 8 },
                3: { hp: 150, speed: 45, size: 1.2, gold: 30, res: { grass: 0, water: 0, fire: 50, electric: 30 }, walkSrc: 'Pokemon/SPRITES/Orc3/orc3_walk_with_shadow.png', walkFrames: 6, dieSrc: 'Pokemon/SPRITES/Orc3/orc3_death_with_shadow.png', dieFrames: 8 },
                4: { hp: 90, speed: 25, size: 1.3, gold: 50, res: { grass: 0, water: 0, fire: 50, electric: 30 }, walkSrc: 'Pokemon/SPRITES/Orc3/orc3_run_with_shadow.png', walkFrames: 8, dieSrc: 'Pokemon/SPRITES/Orc3/orc3_death_with_shadow.png', dieFrames: 8 }
            },
            slime: {
                1: { hp: 30, speed: 65, size: 0.8, gold: 5, res: { grass: 25, water: 50, fire: -25, electric: -25 }, walkSrc: 'Pokemon/SPRITES/Slime1/Slime1_Walk_with_shadow.png', walkFrames: 8, dieSrc: 'Pokemon/SPRITES/Slime1/Slime1_Death_with_shadow.png', dieFrames: 10 },
                2: { hp: 60, speed: 70, size: 1.0, gold: 10, res: { grass: 0, water: 80, fire: -30, electric: -20 }, walkSrc: 'Pokemon/SPRITES/Slime2/Slime2_Walk_with_shadow.png', walkFrames: 8, dieSrc: 'Pokemon/SPRITES/Slime2/Slime2_Death_with_shadow.png', dieFrames: 10 },
                3: { hp: 90, speed: 75, size: 1.2, gold: 15, res: { grass: 0, water: 50, fire: 80, electric: -20 }, walkSrc: 'Pokemon/SPRITES/Slime3/Slime3_Walk_with_shadow.png', walkFrames: 8, dieSrc: 'Pokemon/SPRITES/Slime3/Slime3_Death_with_shadow.png', dieFrames: 10 }
            }
        };

        const LEVEL_DATA = [
    {
        id: 1, background: 'Pokemon/Backgrounds/grass.png', startingGold: 400,

        function smoothPath(path, iters = 2) {
            if (path.length < 3) return path; let res = [...path];
            for (let i = 0; i < iters; i++) {
                let next = [res[0]];
                for (let j = 0; j < res.length - 1; j++) {
                    next.push({ x: 0.75 * res[j].x + 0.25 * res[j+1].x, y: 0.75 * res[j].y + 0.25 * res[j+1].y });
                    next.push({ x: 0.25 * res[j].x + 0.75 * res[j+1].x, y: 0.25 * res[j].y + 0.75 * res[j+1].y });
                }
                next.push(res[res.length - 1]); res = next;
            } return res;
        }

            let minDps = baseDps; let maxDps = baseDps; let effects = [];
            const getAoETargets = (r) => r <= 15 ? 2 : r <= 30 ? 3 : r <= 60 ? 4 : r <= 120 ? 5 : (r ? 6 : 1);

            switch(stats.attackName) {
                case 'chain_lightning': maxDps = baseDps * (stats.chainCount + 1); effects.push(`Řetězový blesk (až ${stats.chainCount+1} cílů, skok ${stats.chainRange}px)`); break;

                case 'plant_trap': minDps = (stats.trapDps*stats.trapDur)/cooldownSec; maxDps = minDps*getAoETargets(stats.trapRadius); effects.push(`Smrtící rostlina (DPS: ${stats.trapDps}, trvání ${stats.trapDur}s, r: ${stats.trapRadius})`); break;
                case 'earthquake': minDps = (stats.eqDps*stats.eqDur)/cooldownSec; maxDps = minDps*getAoETargets(stats.eqRadius); effects.push(`Zemětřesení (Plošné DPS: ${stats.eqDps}, trvání ${stats.eqDur}s, r: ${stats.eqRadius})`); break;
                case 'water_cutter': effects.push(`Vodní řezač (Soustředěný ničivý paprsek)`); break;
                case 'water_paralyzer': effects.push(`Vodní paralyzér (Stun ${stats.stunDuration}s)`); break;
                case 'fire_hurricane': case 'fire_tornado': case 'fire_spin': minDps = (stats.firestormDps*stats.firestormDur)/cooldownSec; maxDps = minDps*getAoETargets(stats.firestormRadius); effects.push(`Ohnivá bouře (${stats.firestormDur}s, r: ${stats.firestormRadius})`); break;
                default:
                    if (stats.paraChance) { maxDps += (stats.paraDps*stats.paraDuration)/cooldownSec; effects.push(`Paralýza (${stats.paraChance*100}%, ${stats.paraDuration}s, ${stats.paraDps} DPS)`); }
                    if (stats.doubleChance) { maxDps = baseDps * (stats.doubleMultiplier || 2); effects.push(`Dvojitý útok (${stats.doubleChance*100}%)`); }
                    if (stats.splashRadius && stats.splashMultiplier) { const targets = getAoETargets(stats.splashRadius); minDps = (baseDps+baseDps*stats.splashMultiplier)/2; maxDps = (baseDps+baseDps*stats.splashMultiplier*targets)/2; effects.push(`Plošný útok (r: ${stats.splashRadius})`); }

                    if (stats.turnChance) effects.push(`Zmatení (${stats.turnChance*100}%, ${stats.turnDuration}s)`);
                    if (stats.burnChance) { maxDps += stats.burnDps; effects.push(`Popálení (${stats.burnChance*100}%/s, ${stats.burnDps} DPS)`); }
            }
            const dpsStr = Math.abs(maxDps - minDps) > 0.1 ? `${minDps.toFixed(1)} - ${maxDps.toFixed(1)}` : minDps.toFixed(1);
            return { name: stats.name, attack: stats.attackName.replace('_', ' '), element: { fire: 'Oheň', water: 'Voda', grass: 'Tráva', electric: 'Elektřina' }[type] || type, cooldown: cooldownSec === 0 ? 'Trvalý' : `${cooldownSec}s`, range: stats.range, dps: dpsStr, effects: effects.length > 0 ? effects.join('<br>') : 'Žádné' };
        }

                    const stats = TOWER_STATS[type].levels[row]; if (!stats) return; const info = getTowerTooltipInfo(type, row); const sN = stats.spriteName || stats.name; const pK = sN.toLowerCase();
                    const fC = pK === 'pichu' ? 8 : (pK === 'bulbasaur' ? 6 : 4); const aW = (ANIM_DATA[pK] && ANIM_DATA[pK]['Walk']) ? ANIM_DATA[pK]['Walk'].width : 64; const dW = aW * 1.25; const sW = dW * fC;
                    html += `<div class="poke-card"><h3 style="color: ${lc[row]}">${info.name}</h3><div class="dex-sprite-viewport" style="width: ${dW}px; height: ${dW}px;"><div class="dex-sprite-strip" style="width: ${sW}px; height: ${dW}px; background-image: url('Pokemon/SPRITES/${sN}/Walk-Anim.png'); background-size: ${sW}px auto; animation: dex-sprite-walk 1s steps(${fC}) infinite;"></div></div><div class="poke-stats"><div><strong>⚔️ Útok:</strong> <span style="text-transform: capitalize">${info.attack}</span></div><div><strong>🎯 Element:</strong> ${info.element}</div><div><strong>💥 DPS:</strong> ${info.dps}</div>${info.effects !== 'Žádné' ? `<div class="poke-effects">${info.effects}</div>` : ''}</div></div>`;
                }
            }); }); ui.pokemonDexContent.innerHTML = html;
        }

        // Debug Menu
        const dbgTrg = document.getElementById('debug-trigger'); const dbgMenu = document.getElementById('debug-menu'); const dbgInp = document.getElementById('debug-level-input');
        dbgTrg.addEventListener('click', (e) => { e.stopPropagation(); dbgInp.value = maxUnlockedLevel; dbgMenu.classList.toggle('hidden'); });
        document.getElementById('debug-save-btn').addEventListener('click', () => { const nl = parseInt(dbgInp.value); if (nl>=1 && nl<=10) { maxUnlockedLevel = nl; localStorage.setItem('pokemonTD_maxLevel', maxUnlockedLevel); renderLevelMenu(); dbgMenu.classList.add('hidden'); } });
        document.getElementById('debug-win-btn').addEventListener('click', () => { 
            if (!state.gameOver && state.activeLevelId !== null) { 
                endGame(true); 
                dbgMenu.classList.add('hidden'); 
            } else { 
                alert('Musíš mít spuštěný level, abys mohl vyhrát!'); 
            } 
        });
        document.addEventListener('click', (e) => { if (!dbgMenu.contains(e.target) && e.target !== dbgTrg) dbgMenu.classList.add('hidden'); });

        // INIT
        async function initializeGame() { await Promise.all([loadEnemyImages(), loadAnimData()]); renderLevelMenu(); createRadialMenu(); }
        
        function resizeResponsive() {
            const wrapper = document.querySelector('.main-container');
            const targetWidth = 820;  // 800px plátno + tenké okraje
            const targetHeight = 880; // 800px plátno + bezpečný prostor pro horní/spodní UI menu
            
            // Výpočet zmenšení tak, aby se kontejner vždy stoprocentně vešel do okna
            const scale = Math.min(window.innerWidth / targetWidth, window.innerHeight / targetHeight, 1);

            // Kombinace translate(-50%, -50%) udrží herní okno vycentrované 
            // k absolutnímu bodu left: 50%, top: 50% předtím, než se aplikuje scale
            wrapper.style.transform = `translate(-50%, -50%) scale(${scale})`;
        }
        
        window.addEventListener('resize', resizeResponsive);
        resizeResponsive(); // Zavolá se rovnou při prvním načtení stránky

        initializeGame();
    </script>
</body>
</html>
