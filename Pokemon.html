<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Defense - All Branching Upgrades</title>
    <style>
        :root { --bg-dark: #2c3e50; --panel-bg: #34495e; --text-light: #ecf0f1; --accent: #e74c3c; --canvas-bg: #1a252f; --win-color: #2ecc71; --upgrade-color: #f39c12; --level-menu-bg: #2c3e50; --btn-size: 40px; }
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: var(--bg-dark); font-family: system-ui, -apple-system, sans-serif; color: var(--text-light); }
        .main-container { display: flex; gap: 20px; }
        .level-sidebar { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: row; gap: 10px; background: rgba(52, 73, 94, 0.2); padding: 10px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 20; visibility: visible; }
        .game-ui.active ~ .level-sidebar, .level-sidebar.hidden { display: none; }
        .level-btn { width: 50px; height: 50px; border: 2px solid transparent; border-radius: 8px; color: white; font-size: 1.2rem; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: all 0.2s ease; }
        .level-btn.completed { background: #27ae60; border-color: #2ecc71; }
        .level-btn.completed:hover { transform: scale(1.05); filter: brightness(1.2); }
        .level-btn.unlocked { background: #f1c40f; border-color: #f39c12; color: #2c3e50; }
        .level-btn.unlocked:hover { transform: scale(1.05); filter: brightness(1.1); }
        .level-btn:disabled { cursor: not-allowed; background: #c0392b; border-color: #e74c3c; opacity: 0.8; }
        .game-wrapper { display: flex; flex-direction: column; gap: 1rem; }
        .game-ui { position: absolute; top: 0; left: 0; width: 100%; box-sizing: border-box; z-index: 10; display: flex; justify-content: space-between; align-items: center; background: rgba(52, 73, 94, 0.2); padding: 5px 15px; font-size: 1rem; visibility: hidden; }
        .game-ui.active { visibility: visible; }
        .stats { display: flex; gap: 1.5rem; text-shadow: 1px 1px 2px #000; }
        .controls-group { display: flex; gap: 10px; }
        .icon-btn { width: 30px; height: 30px; background: var(--accent); color: white; border: none; border-radius: 4px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: filter 0.2s ease, transform 0.1s ease; }
        .icon-btn:hover:not(:disabled) { filter: brightness(1.1); transform: scale(1.05); }
        .icon-btn:active:not(:disabled) { transform: scale(0.95); }
        .icon-btn:disabled { opacity: 0.5; cursor: not-allowed; background: #7f8c8d; }
        .icon-btn svg { width: 16px; height: 16px; fill: currentColor; }
        .btn-end { background: #c0392b; }
        .btn-play-pause { background: #27ae60; }
        .btn-primary { background: var(--accent); color: white; border: none; padding: 0.5rem 1rem; font-size: 1rem; border-radius: 4px; cursor: pointer; font-weight: bold; transition: filter 0.2s ease; }
        .btn-primary:hover { filter: brightness(1.1); }
        .canvas-container { position: relative; border: 4px solid var(--panel-bg); border-radius: 8px; overflow: hidden; background: url('Pokemon/Backgrounds/main.jpg') no-repeat center / cover; width: 800px; height: 800px; }
        #game-canvas { display: block; image-rendering: pixelated; }
        #tower-menu, #upgrade-menu { position: absolute; pointer-events: none; z-index: 5; }
        .hidden { display: none !important; }
        .radial-btn { position: absolute; background: rgba(52, 73, 94, 0.9); border: 2px solid transparent; cursor: pointer; border-radius: 50%; width: 60px; height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.2s ease, border-color 0.2s ease; color: white; pointer-events: auto; transform: translate(-50%, -50%); box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        .radial-btn:hover:not(:disabled) { border-color: var(--text-light); transform: translate(-50%, -50%) scale(1.1); }
        .radial-btn.upgrade { background: rgba(243, 156, 18, 0.9); border-color: #e67e22; }
        .radial-btn:disabled { background: rgba(127, 140, 141, 0.9); border-color: #95a5a6; cursor: not-allowed; }
        .price-tag { font-size: 0.7rem; font-weight: bold; background: rgba(0,0,0,0.7); padding: 2px 4px; border-radius: 4px; position: absolute; bottom: -10px; }
        .modal { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 3rem; font-weight: bold; z-index: 10; }
        #modal-text.win { color: var(--win-color); }
        #modal-text.lose { color: var(--accent); }
        .pokemon-menu-icon { width: 48px; height: 48px; background-size: 200% auto; background-repeat: no-repeat; background-position: 0% center; image-rendering: pixelated; animation: sleepAnim 1s steps(1) infinite; }
        @keyframes sleepAnim { 0% { background-position: 0% center; } 50% { background-position: 100% center; } }
        #info-tooltip { position: absolute; background: rgba(255, 255, 255, 0.8); border: 1px solid #000; border-radius: 6px; color: #000; padding: 12px; font-size: 0.9rem; pointer-events: none; z-index: 20; width: 240px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); display: flex; flex-direction: column; gap: 6px; transition: opacity 0.2s ease, visibility 0.2s ease; }
        #info-tooltip.hidden { opacity: 0; visibility: hidden; }
        .tooltip-header { font-weight: bold; text-align: center; border-bottom: 1px solid #000; padding-bottom: 6px; margin-bottom: 2px; font-size: 1rem; }
        .tooltip-row { display: flex; justify-content: space-between; }
        .tooltip-effects { margin-top: 6px; font-size: 0.8rem; font-style: italic; border-top: 1px dotted #666; padding-top: 6px; }
        .main-menu-bottom { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 20; transition: opacity 0.3s ease; }
        .main-menu-bottom.hidden { opacity: 0; pointer-events: none; }
       .dex-btn { width: 50px; height: 50px; border-radius: 8px; border: 2px solid rgb(79, 87, 32); box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s ease; padding: 0; background-size: cover; background-position: center; background-repeat: no-repeat; cursor: pointer; }
        .dex-btn:hover { transform: scale(1.05); border-color: #d4f543; filter: brightness(1.1); }
        #btn-dex-pokemon { background-image: url('Pokemon/Pictures/Enc-pok.jpg'); }
        #btn-dex-enemies { background-image: url('Pokemon/Pictures/Enc-mon.png'); }
        .dex-modal { position: absolute; inset: 20px; background: rgba(44, 62, 80, 0.98); border: 4px solid var(--panel-bg); border-radius: 12px; z-index: 30; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .dex-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: rgba(0,0,0,0.4); border-bottom: 2px solid var(--panel-bg); }
        .dex-header h2 { margin: 0; font-size: 1.8rem; color: #f1c40f; text-shadow: 1px 1px 3px #000; }
        .close-dex { background: none; border: none; font-size: 1.5rem; cursor: pointer; transition: transform 0.2s; filter: grayscale(1); }
        .close-dex:hover { transform: scale(1.2); filter: grayscale(0); }
        .dex-content { flex: 1; overflow-y: auto; padding: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; align-content: start; box-sizing: border-box; }
        .enemy-card { background: rgba(0,0,0,0.5); border: 2px solid #7f8c8d; border-radius: 8px; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; transition: transform 0.2s; height: 100%; box-sizing: border-box; }
        .enemy-card:hover { transform: translateY(-5px); border-color: #e74c3c; background: rgba(0,0,0,0.7); }
        .enemy-card h3 { margin: 0 0 10px 0; text-transform: capitalize; color: #e74c3c; border-bottom: 1px solid #7f8c8d; padding-bottom: 5px; width: 100%; text-align: center; font-size: 1.1rem; }
        .enemy-sprite-container { margin-bottom: 10px; background-repeat: no-repeat; image-rendering: pixelated; background-position: 0 0; }
        .enemy-stats { font-size: 0.85rem; width: 100%; display: flex; flex-direction: column; gap: 2px; color: #bdc3c7; text-align: center; }
        .enemy-stats strong { color: #ecf0f1; }
        @keyframes dex-sprite-walk { from { transform: translateX(0); } to { transform: translateX(-100%); } }
        .dex-sprite-viewport { overflow: hidden; position: relative; margin-bottom: 10px; }
        .dex-sprite-strip { position: absolute; left: 0; top: 0; background-repeat: no-repeat; image-rendering: pixelated; }
        .res-stats { display: flex; justify-content: center; flex-wrap: wrap; gap: 6px; font-size: 0.75rem; margin-top: 5px; background: rgba(0,0,0,0.4); padding: 4px; border-radius: 4px; border: 1px solid #7f8c8d; width: 100%; box-sizing: border-box; }
        #pokemon-dex-content { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 5px; overflow-y: auto; align-content: start; height: 100%; box-sizing: border-box; }

        .poke-card h3 { margin: 0 0 8px 0; border-bottom: 1px solid #7f8c8d; padding-bottom: 5px; font-size: 1.15rem; width: 100%; text-shadow: 1px 1px 2px #000; }
        .poke-stats { font-size: 0.8rem; color: #bdc3c7; display: flex; flex-direction: column; gap: 4px; width: 100%; flex-grow: 1; }
        .poke-stats strong { color: #ecf0f1; }
        .poke-effects { font-size: 0.75rem; color: #a29bfe; font-style: italic; margin-top: 4px; border-top: 1px dotted #666; padding-top: 4px; }
        .enter-anim-circle { position: absolute; width: 250px; height: 250px; border: 4px solid #ffd700; border-radius: 50%; overflow: hidden; pointer-events: none; z-index: 15; transform: translate(-50%, -50%); box-shadow: 0 0 15px rgba(255, 215, 0, 0.8), inset 0 0 15px rgba(255, 215, 0, 0.8); background: rgba(0,0,0,0.4); opacity: 1; transition: opacity 0.5s ease; }
        .enter-anim-circle img { width: 100%; height: 100%; object-fit: cover; }

        #debug-trigger { position: absolute; top: 0; left: 0; width: 10px; height: 10px; z-index: 1000; cursor: default; }
        #debug-menu { position: absolute; top: 15px; left: 15px; background: var(--panel-bg); border: 2px solid var(--accent); padding: 15px; z-index: 1001; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 10px; }
        #debug-menu label { font-weight: bold; font-size: 0.9rem; color: var(--text-light); }
        #debug-menu input { padding: 5px; border-radius: 4px; border: 1px solid #7f8c8d; background: #2c3e50; color: white; width: 60px; }
</style>
</head>

        function smoothPath(path, iterations = 2) {
            if (path.length < 3) return path;
            let result = [...path];
            for (let i = 0; i < iterations; i++) {
                let nextPath = [result[0]];
                for (let j = 0; j < result.length - 1; j++) {
                    let p0 = result[j], p1 = result[j + 1];
                    nextPath.push({ x: 0.75 * p0.x + 0.25 * p1.x, y: 0.75 * p0.y + 0.25 * p1.y });
                    nextPath.push({ x: 0.25 * p0.x + 0.75 * p1.x, y: 0.25 * p0.y + 0.75 * p1.y });
                }
                nextPath.push(result[result.length - 1]);
                result = nextPath;
            }
            return result;
        }

                    enemyImages[type] = {};
                    for (const level in ENEMY_STATS[type]) {
                        const config = ENEMY_STATS[type][level];
                        enemyImages[type][level] = { walk: new Image(), die: new Image() };
                        totalEnemyFrames += 2;

                        enemyImages[type][level].walk.src = config.walkSrc;
                        enemyImages[type][level].walk.onload = () => { enemyFramesLoaded++; if (enemyFramesLoaded === totalEnemyFrames) resolve(); };
                        enemyImages[type][level].walk.onerror = () => { enemyFramesLoaded++; if (enemyFramesLoaded === totalEnemyFrames) resolve(); };

                        enemyImages[type][level].die.src = config.dieSrc;
                        enemyImages[type][level].die.onload = () => { enemyFramesLoaded++; if (enemyFramesLoaded === totalEnemyFrames) resolve(); };
                        enemyImages[type][level].die.onerror = () => { enemyFramesLoaded++; if (enemyFramesLoaded === totalEnemyFrames) resolve(); };
                    }
                }
            });

        function getTowerTooltipInfo(type, level) {
            const stats = TOWER_STATS[type].levels[level];
            let minDps = 0; let maxDps = 0; let effects = []; 
            const cooldownSec = stats.continuous ? 0 : (stats.cooldown / 1000);
            const baseDps = stats.continuous ? stats.damage : (cooldownSec > 0 ? stats.damage / cooldownSec : 0);

            minDps = baseDps;
            maxDps = baseDps;

            // Odhad počtu zasažených cílů na základě poloměru
            const getAoETargets = (radius) => {
                if (!radius) return 1;
                if (radius <= 15) return 2;
                if (radius <= 30) return 3;
                if (radius <= 60) return 4;
                if (radius <= 120) return 5;
                return 6; // Pro největší efekty (např. zemětřesení s r: 180)
            };

            if (stats.attackName === 'chain_lightning') {
                maxDps = baseDps * (stats.chainCount + 1);
                effects.push(`Řetězový blesk (až ${stats.chainCount + 1} cílů, skok ${stats.chainRange}px)`);
            } else if (stats.attackName === 'static_field') {
                const dpsPerTarget = (stats.damage * 0.5) / cooldownSec;
                minDps = dpsPerTarget;
                maxDps = dpsPerTarget * getAoETargets(stats.fieldRadius);
                effects.push(`Statické pole (Zastavení na ${stats.stunDuration}s, r: ${stats.fieldRadius})`);
            } else if (stats.attackName === 'plant_trap') {
                const dpsPerTarget = (stats.trapDps * stats.trapDur) / cooldownSec;
                minDps = dpsPerTarget;
                maxDps = dpsPerTarget * getAoETargets(stats.trapRadius);
                effects.push(`Smrtící rostlina (DPS: ${stats.trapDps}, na ${stats.trapDur}s, r: ${stats.trapRadius})`);
            } else if (stats.attackName === 'earthquake') {
                const dpsPerTarget = (stats.eqDps * stats.eqDur) / cooldownSec;
                minDps = dpsPerTarget;
                maxDps = dpsPerTarget * getAoETargets(stats.eqRadius);
                effects.push(`Zemětřesení (Plošné DPS: ${stats.eqDps}, trvání ${stats.eqDur}s, r: ${stats.eqRadius})`);
            } else if (stats.attackName === 'water_cutter') {
                effects.push(`Vodní řezač (Soustředěný ničivý paprsek)`);
            } else if (stats.attackName === 'water_paralyzer') {
                effects.push(`Vodní paralyzér (Okamžitě zastaví cíl na ${stats.stunDuration}s)`);
            } else if (stats.attackName === 'fire_hurricane' || stats.attackName === 'fire_tornado' || stats.attackName === 'fire_spin') {
                const dpsPerTarget = (stats.firestormDps * stats.firestormDur) / cooldownSec;
                minDps = dpsPerTarget;
                maxDps = dpsPerTarget * getAoETargets(stats.firestormRadius);
                if (stats.attackName === 'fire_hurricane') effects.push(`Ohnivý hurikán (Stacionární silná bouře, trvání ${stats.firestormDur}s, r: ${stats.firestormRadius})`);
                else if (stats.attackName === 'fire_tornado') effects.push(`Ohnivé tornádo (Cestuje s cílem, trvání ${stats.firestormDur}s, r: ${stats.firestormRadius})`);
                else effects.push(`Ohnivá bouře (${stats.firestormDur}s, r: ${stats.firestormRadius})`);
            } else {
                if (type === 'electric' && stats.paraChance) {
                    const addedDps = (stats.paraDps * stats.paraDuration) / cooldownSec;
                    maxDps = baseDps + addedDps;
                    effects.push(`Paralýza (${(stats.paraChance * 100)}%, ${stats.paraDuration}s, ${stats.paraDps} DPS)`);
                } 
                if (type === 'grass') {
                    if (stats.doubleChance) { 
                        minDps = baseDps; 
                        maxDps = baseDps * (stats.doubleMultiplier || 2); 
                        effects.push(`Dvojitý útok (${(stats.doubleChance * 100)}%)`); 
                    }
                    if (stats.splashRadius && stats.splashMultiplier) { 
                        const targets = getAoETargets(stats.splashRadius);
                        minDps = (baseDps + baseDps * stats.splashMultiplier) / 2;
                        maxDps = (baseDps + baseDps * stats.splashMultiplier * targets) / 2;
                        effects.push(`Plošný útok (r: ${stats.splashRadius})`); 
                    }
                } 
                if (type === 'water') {
                    if (stats.turnChance) effects.push(`Zmatení (${(stats.turnChance * 100)}%, ${stats.turnDuration}s)`);
                    if (stats.splashRadius) { 
                        maxDps = baseDps * getAoETargets(stats.splashRadius);
                        effects.push(`Plošný útok (r: ${stats.splashRadius})`); 
                    }
                } 
                if (type === 'fire') {
                    if (stats.burnChance) { 
                        maxDps = baseDps + stats.burnDps;
                        effects.push(`Popálení (${(stats.burnChance * 100)}% / s, ${stats.burnDps} DPS)`); 
                    }
                }
            }

            const elementNames = { 'fire': 'Oheň', 'water': 'Voda', 'grass': 'Tráva', 'electric': 'Elektřina' };
            
            let dpsString = minDps.toFixed(1);
            if (Math.abs(maxDps - minDps) > 0.1) {
                dpsString = `${minDps.toFixed(1)} - ${maxDps.toFixed(1)}`;
            }

            return { 
                name: stats.name, 
                attack: stats.attackName.replace('_', ' '), 
                element: elementNames[type] || type, 
                cooldown: cooldownSec === 0 ? 'Trvalý' : `${cooldownSec}s`, 
                range: stats.range, 
                dps: dpsString, 
                effects: effects.length > 0 ? effects.join('<br>') : 'Žádné' 
            };
        }

        function showTooltip(type, level, originX, originY) {

            infoTooltip.innerHTML = `

            state.pathCanvas = document.createElement('canvas'); 
            state.pathCanvas.width = canvas.width; 
            state.pathCanvas.height = canvas.height;
            const pctx = state.pathCanvas.getContext('2d'); 
            pctx.lineJoin = 'round'; 
            pctx.lineCap = 'round';
            
            const renderPathCanvas = () => {
                pctx.clearRect(0, 0, canvas.width, canvas.height);

                // 1. Tělo cesty z textury (šířka 100px)
                if (pathTextureImg.complete && pathTextureImg.naturalHeight !== 0) {
                    pctx.strokeStyle = pctx.createPattern(pathTextureImg, 'repeat');
                } else {
                    pctx.strokeStyle = '#7f8c8d'; // Fallback barva
                }
                pctx.globalAlpha = 0.5;
                pctx.lineWidth = 100;
                pctx.beginPath(); 
                pctx.moveTo(state.path[0].x, state.path[0].y);
                for (let i = 1; i < state.path.length; i++) pctx.lineTo(state.path[i].x, state.path[i].y);
                pctx.stroke();
                pctx.globalAlpha = 1.0;

                // 2. Tmavý, zubatý okraj cesty
                pctx.lineWidth = 2; 
                pctx.strokeStyle = 'rgba(0, 0, 0, 0.6)'; 
                [-50, 50].forEach(side => { // Offset 50 přesně lícují s okrajem 100px cesty
                    pctx.beginPath();
                    const a0 = Math.atan2(state.path[1].y - state.path[0].y, state.path[1].x - state.path[0].x) + Math.PI/2;
                    pctx.moveTo(state.path[0].x + Math.cos(a0) * side, state.path[0].y + Math.sin(a0) * side);
                    for (let i = 1; i < state.path.length; i++) {
                        const p1 = state.path[i-1], p2 = state.path[i];
                        const dist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
                        const steps = Math.max(1, Math.floor(dist / 6));
                        const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x) + Math.PI/2;
                        for(let k = 1; k <= steps; k++) {
                            const t = k / steps;
                            const cx = p1.x + (p2.x - p1.x) * t;
                            const cy = p1.y + (p2.y - p1.y) * t;
                            const noise = (Math.random() - 0.5) * 7;
                            pctx.lineTo(cx + Math.cos(angle) * (side + noise), cy + Math.sin(angle) * (side + noise));
                        }
                    }
                    pctx.stroke();
                });
            };

            // Spuštění renderu (ihned nebo po načtení textury z disku)
            if (pathTextureImg.complete) renderPathCanvas();
            else pathTextureImg.onload = renderPathCanvas;
            pctx.strokeStyle = 'rgba(100, 110, 110, 0.4)';
            [-46, 46].forEach(side => {
                pctx.beginPath();
                const a0 = Math.atan2(state.path[1].y - state.path[0].y, state.path[1].x - state.path[0].x) + Math.PI/2;
                pctx.moveTo(state.path[0].x + Math.cos(a0) * side, state.path[0].y + Math.sin(a0) * side);
                for (let i = 1; i < state.path.length; i++) {
                    const p1 = state.path[i-1], p2 = state.path[i];
                    const dist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
                    const steps = Math.max(1, Math.floor(dist / 6));
                    const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x) + Math.PI/2;
                    for(let k = 1; k <= steps; k++) {
                        const t = k / steps;
                        const cx = p1.x + (p2.x - p1.x) * t;
                        const cy = p1.y + (p2.y - p1.y) * t;
                        const noise = (Math.random() - 0.5) * 16;
                        pctx.lineTo(cx + Math.cos(angle) * (side + noise), cy + Math.sin(angle) * (side + noise));
                    }
                }
                pctx.stroke();
            });

            if (state.bgImage.complete) { ctx.drawImage(state.bgImage, 0, 0, canvas.width, canvas.height); drawPathAndRange(ctx); state.animationFrameId = requestAnimationFrame(loop); } 
            else { state.bgImage.onload = () => { ctx.drawImage(state.bgImage, 0, 0, canvas.width, canvas.height); drawPathAndRange(ctx); if (!state.animationFrameId) state.animationFrameId = requestAnimationFrame(loop); }; }
            levelSidebar.classList.add('hidden');
            mainMenuBottom.classList.add('hidden');
        }

        async function loadAnimData() {
            try {
                const fetchPromises = POKEMONS.map(async (pokemon) => {
                    const response = await fetch(`Pokemon/SPRITES/${pokemon}/AnimData.xml`);
                    if (!response.ok) return;
                    const xmlText = await response.text();
                    const xmlDoc = new DOMParser().parseFromString(xmlText, "text/xml");
                    const pKey = pokemon.toLowerCase();
                    xmlDoc.querySelectorAll('Anim').forEach(anim => {
                        const name = anim.querySelector('Name')?.textContent; if (!name) return;
                        const copyOfNode = anim.querySelector('CopyOf');
                        if (copyOfNode) { ANIM_DATA[pKey][name] = { isCopy: copyOfNode.textContent }; return; }
                        const width = parseInt(anim.querySelector('FrameWidth')?.textContent || '32', 10);
                        const height = parseInt(anim.querySelector('FrameHeight')?.textContent || '32', 10);
                        ANIM_DATA[pKey][name] = { originalName: name, width, height };
                    });
                    for (const key in ANIM_DATA[pKey]) {
                        if (ANIM_DATA[pKey][key].isCopy) { const target = ANIM_DATA[pKey][ANIM_DATA[pKey][key].isCopy]; if (target) ANIM_DATA[pKey][key] = { ...target, originalName: target.originalName }; }
                    }
                });
                await Promise.all(fetchPromises);
            } catch (error) { console.warn(error); } finally { otherAssetsLoaded = true; checkAllLoaded(); }
        }

                this.turnBackTimer = 0; this.burnTimer = 0; this.burnDps = 0; this.fadeTimer = 0;
                
                this.animTime = Math.random() * 1.0;
                this.directionRow = 0; 
                this.dirLockTimer = 0;
            }
            
            takeDamage(amount, elementType) { const resistance = this.resistances[elementType] || 0; this.hp -= Math.max(0, amount * (1 - resistance / 100)); }
            
            update(dt) {
                this.animTime += dt;
                if (this.hp <= 0) return 'dead';
                
                if (this.paraTimer > 0) { this.paraTimer -= dt; this.takeDamage(this.paraDps * dt, 'electric'); }
                if (this.burnTimer > 0) { this.burnTimer -= dt; this.takeDamage(this.burnDps * dt, 'fire'); }
                if (this.hp <= 0) return 'dead';
                
                if (this.slowTimer > 0) this.slowTimer -= dt;
                if (this.stunTimer > 0) { this.stunTimer -= dt; return 'alive'; }
                
                const currentSpeed = (this.slowTimer > 0 || this.paraTimer > 0) ? this.baseSpeed * 0.5 : this.baseSpeed;

                let targetPoint = null;
                let isTurningBack = false;

                if (this.turnBackTimer > 0) {
                    this.turnBackTimer -= dt;
                    targetPoint = state.path[this.pathIndex];
                    isTurningBack = true;
                } else {
                    if (this.pathIndex >= state.path.length - 1) return 'reached_end';
                    targetPoint = state.path[this.pathIndex + 1];
                }

                const dx = targetPoint.x - this.x; const dy = targetPoint.y - this.y;
                const dist = Math.hypot(dx, dy); const move = currentSpeed * dt;

                // Logika uzamčení směru (Zabrání jitteringu na hranách animací)
                let targetDir;

                if (dist <= move) { 
                    this.x = targetPoint.x; this.y = targetPoint.y; 
                    if (isTurningBack) { if (this.pathIndex > 0) this.pathIndex--; } else { this.pathIndex++; }
                } else { 
                    this.x += (dx / dist) * move; this.y += (dy / dist) * move; 
                }
                this.distanceTravelled += isTurningBack ? -move : move;
                return 'alive';
            }

            drawSprite(ctx, isDead = false) {
                const drawX = this.x + this.offsetX; const drawY = this.y + this.offsetY;
                const imgObj = isDead ? enemyImages[this.type][this.level].die : enemyImages[this.type][this.level].walk;
                
                if (imgObj && imgObj.complete && imgObj.naturalHeight !== 0) {
                    const cols = isDead ? this.config.dieFrames : this.config.walkFrames;
                    const frameWidth = imgObj.naturalWidth / cols; const frameHeight = imgObj.naturalHeight / 4;
                    
                    let frameIndex = Math.floor(this.animTime * 11);
                    if (isDead) frameIndex = Math.min(frameIndex, cols - 1); else frameIndex = frameIndex % cols;
                    
                    const sx = frameIndex * frameWidth; const sy = this.directionRow * frameHeight;
                    const scale = 1.5 * (this.config.size || 1);
                    const drawWidth = frameWidth * scale; const drawHeight = frameHeight * scale;
                    
                    ctx.save(); ctx.translate(drawX, drawY);
                    if (!isDead) {
                        if (this.stunTimer > 0) ctx.filter = 'brightness(150%) drop-shadow(0 0 5px yellow)';
                        else if (this.burnTimer > 0) ctx.filter = 'sepia(100%) hue-rotate(-50deg) saturate(200%)';
                        else if (this.paraTimer > 0) ctx.filter = 'sepia(100%) hue-rotate(50deg) saturate(200%)';
                        else if (this.slowTimer > 0) ctx.filter = 'sepia(100%) hue-rotate(180deg) saturate(200%)';
                    }
                    ctx.drawImage(imgObj, sx, sy, frameWidth, frameHeight, -drawWidth/2, -drawHeight/2, drawWidth, drawHeight);
                    ctx.restore();

            }
            
            draw(ctx) {
                this.drawSprite(ctx, false);
                const drawX = this.x + this.offsetX; const drawY = this.y + this.offsetY;
                if (this.turnBackTimer > 0) { ctx.fillStyle = '#9b59b6'; ctx.beginPath(); ctx.arc(drawX, drawY - 20, 3, 0, Math.PI*2); ctx.fill(); }
                ctx.fillStyle = '#e74c3c'; ctx.fillRect(drawX - 15, drawY - 30, 20, 4);

            }
        }

        class Tower {
            constructor(x, y, elementType) {
                this.x = x; this.y = y; this.elementType = elementType; this.config = TOWER_STATS[elementType];
                this.level = 1; this.timeSinceLastShot = 0; this.angle = 0; 
                this.sleepTime = 0; this.lungeTimer = 0; this.lungeDuration = 0.25; this.hasTarget = false; 
                this.attackCount = 0; this.soundTimer = 0; this.currentSound = null; 
                
                // Rotace
                this.currentSector = null; this.targetSector = 0; this.rotationTimer = 0;
            }

            getStats() { return this.config.levels[this.level]; }
            getPKey() { const stats = this.getStats(); return (stats.spriteName || stats.name).toLowerCase(); }

            update(dt) {
                let validTarget = null; let validMaxDist = -1; let mapTarget = null; let globalMaxDist = -1;
                const stats = this.getStats(); const currentRange = stats.range;
                
                this.timeSinceLastShot += dt * 1000;
                if (this.lungeTimer > 0) this.lungeTimer -= dt;
                if (this.soundTimer > 0) this.soundTimer -= dt;

                this.hasTarget = false;
                state.enemies.forEach(e => {
                    if (e.distanceTravelled > globalMaxDist) { mapTarget = e; globalMaxDist = e.distanceTravelled; this.hasTarget = true; }
                    if (Math.hypot((e.x + e.offsetX) - this.x, (e.y + e.offsetY) - this.y) <= currentRange && e.distanceTravelled > validMaxDist) { validTarget = e; validMaxDist = e.distanceTravelled; }
                });

                if (this.hasTarget && mapTarget) {
                    const lookTarget = validTarget || mapTarget;
                    this.angle = Math.atan2((lookTarget.y + lookTarget.offsetY) - this.y, (lookTarget.x + lookTarget.offsetX) - this.x);
                    
                    this.targetSector = getSector(this.angle);
                    if (this.currentSector === null) this.currentSector = this.targetSector; // Inicializační pohled
                } else { this.sleepTime += dt; }

                if (this.currentSector !== null && this.currentSector !== this.targetSector) {
                    this.rotationTimer += dt;
                    if (this.rotationTimer >= 0.15) {
                        this.rotationTimer -= 0;
                        let diff = this.targetSector - this.currentSector;
                        if (diff > 4) diff -= 8;
                        if (diff < -4) diff += 8;

                        if (diff > 0) this.currentSector = (this.currentSector + 1) % 8;
                        else if (diff < 0) this.currentSector = (this.currentSector - 1 + 8) % 8;
                    }
                }

                if (validTarget) {
                    const hitX = validTarget.x + validTarget.offsetX; const hitY = validTarget.y + validTarget.offsetY;
                    if (stats.continuous) this.handleContinuousAttack(dt, validTarget, stats, hitX, hitY);
                    else if (this.timeSinceLastShot >= stats.cooldown) this.handleBurstAttack(validTarget, stats, hitX, hitY);
                } else {
                    if (this.currentSound) { try { this.currentSound.stop(); } catch(e){} this.currentSound = null; }
                }
            }
            
            handleContinuousAttack(dt, target, stats, hitX, hitY) {
                this.lungeTimer = 0.1; const dmg = stats.damage * dt; target.takeDamage(dmg, this.elementType);
                if (!this.currentSound) {
                    const pKey = (stats.spriteName || stats.name).toLowerCase();
                    const soundKey = (this.level === '4a' || this.level === '4b') ? `${pKey}_${this.level}` : pKey;
                    const buffer = loadedAudioBuffers[soundKey];
                    if (buffer && buffer !== 'loading') { // Kontrola, zda se buffer stihl dekódovat
                        if (audioCtx.state === 'suspended') audioCtx.resume();
                        const source = audioCtx.createBufferSource(); source.buffer = buffer; source.loop = true;
                        const gainNode = audioCtx.createGain(); gainNode.gain.value = 0.5;
                        source.connect(gainNode); gainNode.connect(audioCtx.destination); source.start(0); this.currentSound = source;
                    }
                }
                if (this.elementType === 'water' && stats.splashRadius > 0) {
                    if (Math.random() < 0.2) spawnImpact(hitX + (Math.random()-0.5)*20, hitY + (Math.random()-0.5)*20, 'water');
                    state.enemies.forEach(e => { if (e !== target && Math.hypot((e.x+e.offsetX) - hitX, (e.y+e.offsetY) - hitY) <= stats.splashRadius) e.takeDamage(dmg, this.elementType); });
                }
                if (this.elementType === 'fire' && stats.burnChance && Math.random() < stats.burnChance * dt * 10) { target.burnTimer = stats.burnDuration; target.burnDps = stats.burnDps; }
                state.projectiles.push({ type: stats.attackName, elementType: this.elementType, x1: this.x, y1: this.y, x2: hitX, y2: hitY, life: dt*2, maxLife: dt*2 });
                if (Math.random() < 0.3) spawnImpact(hitX, hitY, this.elementType);
            }
            
            handleBurstAttack(target, stats, hitX, hitY) {
                this.timeSinceLastShot = 0; this.lungeTimer = this.lungeDuration; this.attackCount++;
                if (this.currentSound) { try { this.currentSound.stop(); } catch(e){} this.currentSound = null; }
                
                const soundSuffix = (this.level === '4a' || this.level === '4b') ? `_${this.level}` : '';
                playSound(stats.spriteName || stats.name, soundSuffix);
                
                if (this.elementType === 'electric') {
                    if (stats.attackName === 'chain_lightning') {
                        let currentTarget = target; let targets = [currentTarget]; let cHitX = hitX; let cHitY = hitY;
                        for(let i = 0; i < stats.chainCount; i++) {
                            let nextTarget = null; let minDist = stats.chainRange;
                            state.enemies.forEach(e => { if(!targets.includes(e)) { let dist = Math.hypot((e.x+e.offsetX)-cHitX, (e.y+e.offsetY)-cHitY); if(dist <= minDist) { minDist = dist; nextTarget = e; } } });
                            if(nextTarget) { targets.push(nextTarget); cHitX = nextTarget.x + nextTarget.offsetX; cHitY = nextTarget.y + nextTarget.offsetY; } else break;
                        }
                        let startX = this.x; let startY = this.y;
                        targets.forEach(t => {
                            let tx = t.x + t.offsetX; let ty = t.y + t.offsetY;
                            state.projectiles.push({ type: 'chain_lightning', elementType: this.elementType, x1: startX, y1: startY, x2: tx, y2: ty, life: 0.15, maxLife: 0.15, damage: stats.damage, target: t, width: stats.beamWidth }); startX = tx; startY = ty;
                        });
                    } else if (stats.attackName === 'static_field') { state.projectiles.push({ type: 'static_field', elementType: this.elementType, x: hitX, y: hitY, life: 0.5, maxLife: 0.5, radius: stats.fieldRadius, stunDuration: stats.stunDuration, damage: stats.damage }); } 
                    else { state.projectiles.push({ type: stats.attackName, elementType: this.elementType, x1: this.x, y1: this.y, x2: hitX, y2: hitY, life: 0.1, maxLife: 0.1, width: stats.beamWidth, damage: stats.damage, target: target, paraChance: stats.paraChance, paraDuration: stats.paraDuration, paraDps: stats.paraDps }); }
                }
                else if (this.elementType === 'grass') {
                    if (stats.attackName === 'plant_trap') { state.projectiles.push({ type: 'plant_trap', elementType: this.elementType, x: hitX, y: hitY, life: stats.trapDur, maxLife: stats.trapDur, dps: stats.trapDps, radius: stats.trapRadius }); } 
                    else if (stats.attackName === 'earthquake') { state.projectiles.push({ type: 'earthquake', elementType: this.elementType, x: this.x, y: this.y, life: stats.eqDur, maxLife: stats.eqDur, dps: stats.eqDps, radius: stats.eqRadius }); } 
                    else { let dmg = stats.damage; if (stats.doubleChance && Math.random() < stats.doubleChance) dmg *= (stats.doubleMultiplier || 2); let isSplash = false; if (stats.splashRadius && this.attackCount % 2 === 0) { dmg *= (stats.splashMultiplier || 2); isSplash = true; } state.projectiles.push({ type: stats.attackName, elementType: this.elementType, x1: this.x, y1: this.y, x2: hitX, y2: hitY, life: 0.2, maxLife: 0.2, isSplash, splashR: stats.splashRadius, damage: dmg, target: target }); }
                }

                    if (stats.attackName === 'water_paralyzer') { state.projectiles.push({ type: 'water_paralyzer', elementType: this.elementType, x1: this.x, y1: this.y, x2: hitX, y2: hitY, life: 0.15, maxLife: 0.15, damage: stats.damage, target: target, stunDuration: stats.stunDuration }); } 
                    else { state.projectiles.push({ type: stats.attackName, elementType: this.elementType, x1: this.x, y1: this.y, x2: hitX, y2: hitY, life: 0.2, maxLife: 0.2, damage: stats.damage, target: target, turnChance: stats.turnChance, turnDuration: stats.turnDuration }); }
                }
                else if (this.elementType === 'fire') {

                    else if (stats.attackName === 'fire_tornado') { state.projectiles.push({ type: 'fire_tornado', elementType: this.elementType, x: hitX, y: hitY, life: stats.firestormDur, maxLife: stats.firestormDur, dps: stats.firestormDps, radius: stats.firestormRadius, target: target }); } 
                    else { state.projectiles.push({ type: stats.attackName, elementType: this.elementType, x1: this.x, y1: this.y, x2: hitX, y2: hitY, life: 0.15, maxLife: 0.15, damage: stats.damage, target: target }); }
                }
            }
            

            drawAura(ctx) {
                if (this.level === 1) return; // Level 1 bez animace

                const time = performance.now() / 1000;
                
                // Předdefinované RGB barvy pro maximální výkon
                const auras = {
                    electric: { core: '255, 250, 205', mid: '241, 196, 15' },
                    water: { core: '224, 255, 255', mid: '52, 152, 219' },
                    grass: { core: '240, 255, 240', mid: '46, 204, 113' },
                    fire: { core: '255, 228, 225', mid: '231, 76, 60' }
                };
                const color = auras[this.elementType];

                // Konfigurace počtu, poloměru a velikosti dle levelu
                let count = 0, baseRadius = 0, speed = 0, size = 0, trailLength = 0;
                if (this.level === 2) { 
                    count = 3; baseRadius = 20; speed = 1.5; size = 2.5; trailLength = 5; 
                } else if (this.level === 3) { 
                    count = 5; baseRadius = 24; speed = 2.5; size = 3.5; trailLength = 8; 
                } else { 
                    count = 8; baseRadius = 28; speed = 3.5; size = 4.5; trailLength = 12; 
                }

                ctx.save();
                ctx.globalCompositeOperation = 'screen';
                
                for (let i = 0; i < count; i++) {
                    for (let t = 0; t < trailLength; t++) {
                        const timeOffset = time - (t * 0.04);
                        const angle = (i / count) * Math.PI * 2 + timeOffset * speed;
                        
                        const px = this.x + Math.cos(angle) * baseRadius;
                        const py = this.y + Math.sin(angle) * (baseRadius * 0.5) + 2; // +12 posouvá rovinu rotace na piedestal

                        if (particleSize === 0) continue;

                        ctx.beginPath();
                        ctx.arc(px, py, particleSize * 2, 0, Math.PI * 2);
                        
                        const grad = ctx.createRadialGradient(px, py, 0, px, py, particleSize * 2);
                        grad.addColorStop(0, `rgba(${color.core}, ${opacity})`);
                        grad.addColorStop(0.4, `rgba(${color.mid}, ${opacity * 0.8})`);
                        grad.addColorStop(1, `rgba(${color.mid}, 0)`);
                        
                        ctx.fillStyle = grad;
                        ctx.fill();
                    }
                }
                ctx.restore();
            }

            draw(ctx) {
                this.drawAura(ctx);

                let drawX = this.x; let drawY = this.y; let animName = 'Rotate'; let frameIndex = 0;
                if (this.lungeTimer > 0) {

                    drawX += Math.cos(this.angle) * offset; drawY += Math.sin(this.angle) * offset; // Útok zůstává na absolutním úhlu pro přesnost

                    if (img.complete && img.naturalHeight !== 0) ctx.drawImage(img, frameIndex * animData.width, getDirectionRowFromSector(sectorToDraw) * animData.height, animData.width, animData.height, Math.floor(drawX - drawWidth / 2), Math.floor(drawY - drawHeight / 2), drawWidth, drawHeight);
                }
            }
        }

        function spawnImpact(x, y, elementType) {

            else if (elementType === 'grass') { colors = ['#2ecc71', '#27ae60']; shapes = ['leaf']; }

        function drawPathAndRange(ctx) {
            ctx.lineJoin = 'round'; ctx.lineCap = 'round';
            if (state.pathCanvas) ctx.drawImage(state.pathCanvas, 0, 0);
            
            state.slots.forEach(slot => {
                const isHovered = state.hoveredSlot === slot;

                if (piedestalImg.complete && piedestalImg.naturalHeight !== 0) {
                    const targetWidth = slot.radius * 2.5; 
                    const targetHeight = piedestalImg.height * (targetWidth / piedestalImg.width);
                    const drawX = slot.x - targetWidth / 2;
                    const drawY = slot.y - targetHeight / 2 + 5; 

                    ctx.save();
                    if (isHovered) {
                        ctx.filter = 'brightness(1.2) drop-shadow(0 0 4px rgba(241, 196, 15, 0.6))';
                    }
                    ctx.drawImage(piedestalImg, drawX, drawY, targetWidth, targetHeight);
                    ctx.restore();
                }
            });

            if ((state.hoveredSlot && state.hoveredSlot.tower) || (state.hoveredUpgrade && state.selectedSlot && state.selectedSlot.tower)) {
                const tower = state.hoveredUpgrade ? state.selectedSlot.tower : state.hoveredSlot.tower; 
                let displayRange = state.hoveredUpgrade ? tower.config.levels[state.hoveredUpgradeLevel].range : tower.getStats().range;
                ctx.beginPath(); ctx.arc(tower.x, tower.y, displayRange, 0, Math.PI * 2); 
                ctx.fillStyle = 'rgba(255, 255, 255, 0.15)'; ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)'; 
                ctx.lineWidth = 1; ctx.fill(); ctx.stroke();
            } else if (state.selectedSlot && !state.selectedSlot.tower && state.hoveredTowerType) {
                ctx.beginPath(); ctx.arc(state.selectedSlot.x, state.selectedSlot.y, TOWER_STATS[state.hoveredTowerType].levels[1].range, 0, Math.PI * 2); 
                ctx.fillStyle = 'rgba(255, 255, 255, 0.15)'; ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)'; 
                ctx.lineWidth = 1; ctx.fill(); ctx.stroke();
            }
        }

        function updateAndDrawProjectiles(dt, ctx) {
            for (let i = state.projectiles.length - 1; i >= 0; i--) {
                const p = state.projectiles[i]; p.life -= dt;
                
                if (p.type === 'particle') {
                    p.x += p.vx * dt; p.y += p.vy * dt; ctx.fillStyle = p.color; ctx.globalAlpha = Math.max(0, p.life / p.maxLife); ctx.beginPath();
                    if (p.shape === 'leaf') ctx.ellipse(p.x, p.y, p.size, p.size/2, Math.atan2(p.vy, p.vx), 0, Math.PI*2);
                    else if (p.shape === 'spark') { ctx.moveTo(p.x, p.y - p.size); ctx.lineTo(p.x + p.size/2, p.y + p.size); ctx.lineTo(p.x - p.size/2, p.y + p.size); }
                    else ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                    ctx.fill(); ctx.globalAlpha = 1.0; if (p.life <= 0) state.projectiles.splice(i, 1); continue;
                } else if (p.type === 'impact_ring') {
                    ctx.strokeStyle = p.color; ctx.lineWidth = 2; ctx.globalAlpha = Math.max(0, p.life / p.maxLife); ctx.beginPath(); ctx.arc(p.x, p.y, 15 * (1 - p.life / p.maxLife), 0, Math.PI * 2); ctx.stroke(); ctx.globalAlpha = 1.0; if (p.life <= 0) state.projectiles.splice(i, 1); continue;
                }

                if (p.type === 'static_field') {
                    const intensity = p.life / p.maxLife; ctx.fillStyle = `rgba(241, 196, 15, ${intensity * 0.4})`; ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
                    ctx.strokeStyle = `rgba(255, 255, 255, ${intensity})`; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.stroke();
                    for(let k=0; k<3; k++) { const px = p.x + (Math.random() - 0.5) * p.radius * 2; const py = p.y + (Math.random() - 0.5) * p.radius * 2; if(Math.hypot(px-p.x, py-p.y) <= p.radius) { ctx.fillStyle = '#ffffff'; ctx.fillRect(px, py, 3, 3); } }
                    state.enemies.forEach(e => { if (Math.hypot((e.x+e.offsetX) - p.x, (e.y+e.offsetY) - p.y) <= p.radius) { e.takeDamage(p.damage * dt, p.elementType); e.stunTimer = Math.max(e.stunTimer || 0, p.stunDuration); } });
                    if (p.life <= 0) state.projectiles.splice(i, 1); continue;
                }

                if (p.type === 'plant_trap') {
                    state.enemies.forEach(e => { if (Math.hypot((e.x+e.offsetX) - p.x, (e.y+e.offsetY) - p.y) <= p.radius) e.takeDamage(p.dps * dt, p.elementType); });
                    if (plantTrapImg.complete && plantTrapImg.naturalHeight !== 0) {
                        const elapsed = p.maxLife - p.life; const frameIndex = Math.floor((elapsed % 1.0) * 7);
                        const fw = plantTrapImg.width / 7; const fh = plantTrapImg.height / 4; const size = p.radius * 4;
                        ctx.save(); ctx.globalAlpha = Math.min(1, p.life * 2);
                        ctx.drawImage(plantTrapImg, frameIndex * fw, fh, fw, fh, p.x - size / 2, p.y - size / 2, size, size);
                        ctx.restore();
                    }
                    if (p.life <= 0) state.projectiles.splice(i, 1); continue;
                }

                if(p.type==='earthquake'){
                    state.enemies.forEach(e=>{if(Math.hypot((e.x+e.offsetX)-p.x,(e.y+e.offsetY)-p.y)<=p.radius)e.takeDamage(p.dps*dt,p.elementType);});
                    ctx.save();
                    const pr=p.life/p.maxLife;
                    const shakeX = (Math.random() - 0.5) * 12 * pr; const shakeY = (Math.random() - 0.5) * 12 * pr;
                    const drawW=(baseR,points,amp,color,width,fill=false)=>{
                        ctx.beginPath();
                        for(let k=0;k<=points;k++){
                            const a=(k/points)*Math.PI*2;
                            const jaggedAmp = (k % 2 === 0 ? amp : -amp) + (Math.random() * amp * 0.4);
                            const r = Math.max(0, baseR + jaggedAmp);
                            
                            const px = p.x + shakeX + Math.cos(a) * r;
                            const py = p.y + shakeY + Math.sin(a) * r;
                            k===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
                        }
                        ctx.closePath();
                        fill?(ctx.fillStyle=color,ctx.fill()):(ctx.strokeStyle=color,ctx.lineWidth=width,ctx.stroke());
                    };
                    
                    ctx.lineJoin = 'miter';
                    drawW(p.radius*(1-pr), 36, 12*pr, `rgba(144,238,144,${pr*0.5})`, 4); drawW(p.radius*0.85, 40, 18*pr, `rgba(46,204,113,${0.3+0.3*pr})`, 3); drawW(p.radius*0.55, 30, 22*pr, `rgba(39,174,96,${0.4+0.4*pr})`, 2); drawW(p.radius*0.25, 20, 10*pr, `rgba(22,160,133,${0.2+0.5*pr})`, 0, true);
                    ctx.restore();
                    if(p.life<=0)state.projectiles.splice(i,1);continue;
                }

                if (p.type === 'fire_spin' || p.type === 'fire_hurricane') {
                    if (fireStormImg.complete && fireStormImg.naturalHeight !== 0) {
                        const elapsed = p.maxLife - p.life;
                        const frameIndex = Math.floor((elapsed * 15) % 13); 
                        const fw = fireStormImg.width / 13;
                        const fh = fireStormImg.height;
                        
                        // Zvětšení o 50 % pro fire_hurricane
                        const baseSize = p.radius * 2.5;
                        const size = p.type === 'fire_hurricane' ? baseSize * 1.5 : baseSize;
                        
                        ctx.save();
                        ctx.globalAlpha = Math.min(0.75, p.life * 3); 
                        ctx.drawImage(fireStormImg, frameIndex * fw, 0, fw, fh, p.x - size / 2, p.y - size / 2, size, size);
                        ctx.restore();
                    }
                    
                    state.enemies.forEach(e => { if (Math.hypot((e.x+e.offsetX) - p.x, (e.y+e.offsetY) - p.y) <= p.radius) e.takeDamage(p.dps * dt, p.elementType); });
                    if (p.life <= 0) state.projectiles.splice(i, 1); continue;
                }

                if (p.type === 'fire_tornado') {
                    if (p.target && p.target.hp > 0) { p.x = p.target.x + p.target.offsetX; p.y = p.target.y + p.target.offsetY; }
                    
                    if (fireTornadoImg.complete && fireTornadoImg.naturalHeight !== 0) {
                        const elapsed = p.maxLife - p.life;
                        const frameIndex = Math.floor((elapsed * 15) % 8); 
                        const fw = fireTornadoImg.width / 8;
                        const fh = fireTornadoImg.height;
                        const size = p.radius * 3; 
                        
                        ctx.save();
                        ctx.globalAlpha = Math.min(0.65, p.life * 3); 
                        ctx.drawImage(fireTornadoImg, frameIndex * fw, 0, fw, fh, p.x - size / 2, p.y - size / 2 - size * 0.2, size, size);
                        ctx.restore();
                    }
                    
                    state.enemies.forEach(e => { if (Math.hypot((e.x+e.offsetX) - p.x, (e.y+e.offsetY) - p.y) <= p.radius) e.takeDamage(p.dps * dt, p.elementType); });
                    if (p.life <= 0) state.projectiles.splice(i, 1); continue;
                }

                if (p.life <= 0) {
                    if (p.target) {
                        p.target.takeDamage(p.damage || 0, p.elementType);
                        if (p.paraChance && Math.random() < p.paraChance) { p.target.paraTimer = p.paraDuration; p.target.paraDps = p.paraDps; }
                        if (p.turnChance && Math.random() < p.turnChance) p.target.turnBackTimer = p.turnDuration;
                        if (p.stunDuration) p.target.stunTimer = Math.max(p.target.stunTimer || 0, p.stunDuration);
                    }
                    if (p.isSplash) {
                        state.projectiles.push({ type: 'splash_anim', x: p.x2, y: p.y2, maxLife: 0.3, life: 0.3, r: p.splashR, color: '#27ae60' });
                        state.enemies.forEach(e => { if (e !== p.target && Math.hypot((e.x+e.offsetX) - p.x2, (e.y+e.offsetY) - p.y2) <= p.splashR) e.takeDamage(p.damage, p.elementType); });
                    }
                    if (['thundershock', 'thunderbolt', 'thunder', 'chain_lightning', 'vine_whip', 'razor_leaf', 'solar_beam', 'water_pulse', 'water_paralyzer', 'ember'].includes(p.type)) spawnImpact(p.x2, p.y2, p.elementType);
                    state.projectiles.splice(i, 1); continue;
                }

                const progress = 1 - (p.life / p.maxLife); if (!p.x1 || !p.x2 && p.type !== 'splash_anim') continue;
                let sx = p.x1, sy = p.y1;
                if (['thundershock', 'thunderbolt', 'thunder', 'chain_lightning', 'vine_whip', 'solar_beam', 'water_gun', 'hydro_pump', 'water_cutter', 'flamethrower'].includes(p.type)) { const ang = Math.atan2(p.y2 - p.y1, p.x2 - p.x1); sx += Math.cos(ang) * 30; sy += Math.sin(ang) * 20; }
                const bx = sx + (p.x2 - sx) * progress; const by = sy + (p.y2 - sy) * progress;

                if (p.type.includes('thunder') || p.type === 'chain_lightning') { ctx.strokeStyle = '#f1c40f'; ctx.lineWidth = p.width || 3; ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo((sx+p.x2)/2 + (Math.random()-0.5)*20, (sy+p.y2)/2 + (Math.random()-0.5)*20); ctx.lineTo(p.x2, p.y2); ctx.stroke(); } 
                else if (p.type === 'vine_whip') { ctx.strokeStyle = '#2ecc71'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(sx, sy); ctx.quadraticCurveTo(sx, by, p.x2, p.y2); ctx.stroke(); } 
                else if (p.type === 'razor_leaf') { ctx.fillStyle = '#27ae60'; const angle = Math.atan2(p.y2 - p.y1, p.x2 - p.x1); const perpAngle = angle + Math.PI / 2; const offsetDist = 12; const drawLeaf = (cx, cy) => { ctx.beginPath(); ctx.ellipse(cx, cy, 8, 4, angle, 0, Math.PI*2); ctx.fill(); }; drawLeaf(bx, by); drawLeaf(bx + Math.cos(perpAngle) * offsetDist, by + Math.sin(perpAngle) * offsetDist); drawLeaf(bx - Math.cos(perpAngle) * offsetDist, by - Math.sin(perpAngle) * offsetDist);}
                else if (p.type === 'solar_beam') { ctx.strokeStyle = '#f1c40f'; ctx.lineWidth = 6; ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(p.x2, p.y2); ctx.stroke(); ctx.strokeStyle = '#2ecc71'; ctx.lineWidth = 3; ctx.stroke(); } 
                else if (p.type === 'water_gun' || p.type === 'hydro_pump') { ctx.strokeStyle = p.type === 'water_gun' ? '#3498db' : '#2980b9'; ctx.lineWidth = p.type === 'water_gun' ? 3 : 6; ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(p.x2, p.y2); ctx.stroke(); } 
                else if (p.type === 'water_cutter') { ctx.strokeStyle = '#00a8ff'; ctx.lineWidth = 5; ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(p.x2, p.y2); ctx.stroke(); ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2; ctx.stroke(); } 
                else if (p.type === 'water_pulse') { ctx.fillStyle = '#2980b9'; ctx.beginPath(); ctx.ellipse(bx, by, 12, 4, Math.atan2(p.y2-p.y1, p.x2-p.x1), 0, Math.PI*2); ctx.fill(); } 
                else if (p.type === 'water_paralyzer') { ctx.fillStyle = '#00ffff'; ctx.beginPath(); ctx.arc(bx, by, 8, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2; ctx.stroke(); }
                else if (p.type === 'ember') { 
                    ctx.save(); ctx.translate(bx, by); ctx.rotate(Math.atan2(p.y2 - p.y1, p.x2 - p.x1)); ctx.globalCompositeOperation = 'screen';
                    const g = ctx.createRadialGradient(0,0,0,0,0,24);
                    g.addColorStop(0,'#fff'); g.addColorStop(0.2,'#fc0'); g.addColorStop(0.6,'rgba(231,76,60,0.6)'); g.addColorStop(1,'rgba(231,76,60,0)');
                    ctx.fillStyle = g; ctx.beginPath(); ctx.moveTo(16,0); ctx.quadraticCurveTo(0,16,-40,0); ctx.quadraticCurveTo(0,-16,16,0); ctx.fill(); ctx.restore(); 
                }
                else if (p.type === 'flamethrower') {
                    const d = Math.hypot(p.x2 - sx, p.y2 - sy) * progress, a = Math.atan2(p.y2 - sy, p.x2 - sx), w = 2 + d * 0.08;
                    ctx.save(); ctx.translate(sx, sy); ctx.rotate(a); ctx.globalCompositeOperation = 'screen'; const g = ctx.createLinearGradient(0, 0, d, 0);
                    g.addColorStop(0, `rgba(255,255,200,${progress})`); g.addColorStop(0.2, `rgba(255,215,0,${progress})`); g.addColorStop(0.5, `rgba(255,100,0,${progress*0.8})`); g.addColorStop(0.8, `rgba(220,20,0,${progress*0.5})`); g.addColorStop(1, 'transparent');
                    ctx.fillStyle = g; ctx.beginPath(); ctx.moveTo(0, -1); ctx.lineTo(d, -w); ctx.lineTo(d, w); ctx.lineTo(0, 1); ctx.fill(); ctx.restore();
                } else if (p.type === 'splash_anim') { ctx.strokeStyle = `rgba(39, 174, 96, ${p.life / p.maxLife})`; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(p.x, p.y, p.r * Math.pow(1 - p.life / p.maxLife, 0.5), 0, Math.PI * 2); ctx.stroke(); }
            }
        }

        function loop(timestamp) {
            if (state.gameOver) return; 
            if (state.isPaused) { state.lastTime = timestamp; state.animationFrameId = requestAnimationFrame(loop); return; }
            
            const dt = (timestamp - state.lastTime) / 1000; state.lastTime = timestamp;
            if (state.bgImage.complete && state.bgImage.naturalHeight !== 0) ctx.drawImage(state.bgImage, 0, 0, canvas.width, canvas.height); else ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Vykreslení statických objektů mapy pod cestou a věžemi
            if (state.objects && state.objects.length > 0) {
                state.objects.forEach(obj => {
                    let img = loadedImages[obj.src];
                    if (!img) {
                        img = new Image(); img.src = obj.src; loadedImages[obj.src] = img;
                    } else if (img.complete && img.naturalHeight !== 0) {
                        ctx.drawImage(img, obj.x - img.width / 2, obj.y - img.height / 2);
                    }
                });
            }

            if (state.wavesActive) {
                state.gameTime += dt;
                if (state.currentWaveIndex < state.levelWaves.length) {
                    const currentWave = state.levelWaves[state.currentWaveIndex];
                    if (state.gameTime >= currentWave.delay && !state.isSpawningWave) { state.isSpawningWave = true; state.enemiesToSpawn = currentWave.count; waveDisplay.textContent = `${state.currentWaveIndex + 1}/${state.levelWaves.length}`; }
                    if (state.isSpawningWave && state.enemiesToSpawn > 0) {
                        state.spawnTimer += dt;
                        if (state.spawnTimer >= currentWave.interval) { state.enemies.push(new Enemy(currentWave.enemyType, currentWave.enemyLevel)); state.enemiesToSpawn--; state.spawnTimer = 0; if (state.enemiesToSpawn <= 0) { state.currentWaveIndex++; state.isSpawningWave = false; state.gameTime = 0; } }
                    }
                }
            }

            drawPathAndRange(ctx);

            for (let i = state.deadEnemies.length - 1; i >= 0; i--) {
                const de = state.deadEnemies[i]; de.fadeTimer -= dt; de.animTime += dt;
                if (de.fadeTimer <= 0) state.deadEnemies.splice(i, 1);
                else { ctx.save(); ctx.filter = `opacity(${de.fadeTimer / 2.0})`; de.drawSprite(ctx, true); ctx.restore(); }
            }

            state.towers.forEach(t => t.update(dt)); state.towers.forEach(t => t.draw(ctx));

            for (let i = state.enemies.length - 1; i >= 0; i--) {
                const enemy = state.enemies[i]; const status = enemy.update(dt);
                if (status === 'reached_end') { 
                    state.gameOver = true;
                    gameMusic.pause();
                    muteAllTowers();
                    
                    soundEnd.play().catch(e => console.warn("End sound failed:", e));
                    soundEnd.onended = () => endGame(false);
                    return; 
                } 
                else if (status === 'dead') {
                    updateGold(enemy.goldReward); state.enemiesKilled++; enemy.fadeTimer = 2.0; enemy.animTime = 0;
                    state.deadEnemies.push(enemy); state.enemies.splice(i, 1); 
                    if (state.enemiesKilled === state.totalLevelEnemies && !state.winSequenceStarted) { 
                        state.winSequenceStarted = true; gameMusic.pause(); soundFanfare.play().catch(e => console.warn(e));
                        state.winTimeoutId = setTimeout(() => { if (!state.gameOver) endGame(true); }, 3000);
                    } 
                } else enemy.draw(ctx);
            }

            updateAndDrawProjectiles(dt, ctx);
            state.animationFrameId = requestAnimationFrame(loop);
        }

        async function initializeGame() { await Promise.all([loadEnemyImages(), loadAnimData()]); renderLevelMenu(); createRadialMenu(); }
        initializeGame();

        // --- Logika skrytého Debug Menu ---
        const debugTrigger = document.getElementById('debug-trigger');
        const debugMenu = document.getElementById('debug-menu');
        const debugInput = document.getElementById('debug-level-input');
        const debugSave = document.getElementById('debug-save-btn');

        debugTrigger.addEventListener('click', (e) => {
            e.stopPropagation();
            debugInput.value = maxUnlockedLevel;
            debugMenu.classList.toggle('hidden');
        });

        debugSave.addEventListener('click', () => {
            const newLevel = parseInt(debugInput.value);
            if (newLevel >= 1 && newLevel <= 10) {
                maxUnlockedLevel = newLevel;
                localStorage.setItem('pokemonTD_maxLevel', maxUnlockedLevel);
                renderLevelMenu();
                debugMenu.classList.add('hidden');
            }
        });

        // Zavření menu při kliknutí kamkoliv jinam
        document.addEventListener('click', (e) => {
            if (!debugMenu.contains(e.target) && e.target !== debugTrigger) {
                debugMenu.classList.add('hidden');
            }
        });

    </script>
</body>
