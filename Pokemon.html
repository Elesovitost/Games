<!DOCTYPE html> 
<html lang="cs"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=840, viewport-fit=cover">
    <title>Pokemon - Tower Defense</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <style>
        :root { --bg-dark: #2c3e50; --panel-bg: #34495e; --text-light: #ecf0f1; --accent: #e74c3c; --canvas-bg: #1a252f; --win-color: #2ecc71; --upgrade-color: #f39c12; --level-menu-bg: #2c3e50; --btn-size: 40px; }
        body { margin: 0; min-height: 100vh; background-color: var(--bg-dark); font-family: system-ui, -apple-system, sans-serif; color: var(--text-light); display: flex; justify-content: center; align-items: center; overflow: hidden; touch-action: pinch-zoom; }
        .main-container { display: flex; gap: 20px; }
        .level-sidebar { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: row; gap: 10px; background: rgba(52, 73, 94, 0.2); padding: 10px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 20; visibility: visible; }
        .game-ui.active ~ .level-sidebar, .level-sidebar.hidden { display: none; }
        .level-btn { width: 50px; height: 50px; border: 2px solid transparent; border-radius: 8px; color: white; font-size: 1.2rem; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: all 0.2s ease; }
        .level-btn.completed { background: #27ae60; border-color: #2ecc71; }
        .level-btn.unlocked { background: #f1c40f; border-color: #f39c12; color: #2c3e50; animation: pulseGold 1.5s infinite; }
        .level-btn.unlocked:hover { transform: scale(1.05); filter: brightness(1.1); animation: none; }
        #completed-screen { position: absolute; top: 120px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 15; width: 90%; pointer-events: none; }
        .comp-title { font-size: 5rem; font-weight: 900; color: #2ecc71; text-shadow: 3px 3px 6px #000, 0 0 20px #27ae60; margin: 0; letter-spacing: 5px; }
        .comp-subtitle { font-size: 1.5rem; font-weight: bold; color: #f1c40f; text-shadow: 2px 2px 4px #000; margin-top: 10px; text-transform: uppercase; }
        .comp-pokes { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 30px; }
        .comp-poke-sleep { width: 64px; height: 64px; background-size: auto 100%; background-position: left center; background-repeat: no-repeat; filter: drop-shadow(2px 2px 3px #000); }

        .level-btn:disabled { cursor: not-allowed; background: #c0392b; border-color: #e74c3c; opacity: 0.8; }
        .level-wrapper { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .level-stars { font-size: 0.9rem; height: 1.2em; color: #f1c40f; text-shadow: 1px 1px 1px #000; letter-spacing: 1px; visibility: hidden; }
        .level-wrapper:has(.completed) .level-stars { visibility: visible; }
        .level-btn.completed.stars-3 { border-color: #f1c40f !important; box-shadow: 0 0 8px #f1c40f; }
        .level-btn.completed.stars-2 { border-color: #ffffff !important; }
        .level-btn.completed.stars-1 { border-color: #e67e22 !important; }
        .game-wrapper { display: flex; flex-direction: column; gap: 1rem; }
        .game-ui { position: absolute; top: 0; left: 0; width: 100%; box-sizing: border-box; z-index: 10; display: flex; justify-content: space-between; align-items: center; background: rgba(52, 73, 94, 0.2); padding: 5px 15px; font-size: 1rem; visibility: hidden; }
        .game-ui.active { visibility: visible; }
        .stats { display: flex; gap: 1.5rem; text-shadow: 1px 1px 2px #000; }
        .controls-group { display: flex; gap: 10px; }
        .icon-btn { width: 30px; height: 30px; background: var(--accent); color: white; border: none; border-radius: 4px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: filter 0.2s ease, transform 0.1s ease; }
        .icon-btn:hover:not(:disabled) { filter: brightness(1.1); transform: scale(1.05); }
        .icon-btn:active:not(:disabled) { transform: scale(0.95); }
        .icon-btn:disabled { opacity: 0.5; cursor: not-allowed; background: #7f8c8d; }
        .icon-btn svg { width: 16px; height: 16px; fill: currentColor; }
        .top-dex-group { display: flex;  gap: 10px;  margin-left: 20px; margin-right: auto; }
        .top-dex-btn { background-size: cover; background-position: center; background-repeat: no-repeat;border: 1px solid rgba(0, 0, 0, 0.8) !important;}
        #btn-top-dex-pokemon { background-image: url('Pokemon/Pictures/Enc-pok.jpg'); }
        #btn-top-dex-enemies { background-image: url('Pokemon/Pictures/Enc-mon.png'); }
        .targeting-group { display: flex; gap: 5px; margin-left: 15px; border-left: 2px solid rgba(255,255,255,0.2); padding-left: 15px; }
        .target-btn { width: 30px; height: 30px; background: #34495e; color: white; border: 2px solid transparent; border-radius: 4px; cursor: pointer; font-weight: bold; display: flex; justify-content: center; align-items: center; transition: all 0.2s; font-size: 14px; padding: 0; }
        .target-btn.active { border-color: #f1c40f; box-shadow: 0 0 8px rgba(241, 196, 15, 0.8); animation: pulseTarget 1.5s infinite; background: #2c3e50; }
        @keyframes pulseTarget { 0% { box-shadow: 0 0 4px rgba(241, 196, 15, 0.5); } 50% { box-shadow: 0 0 12px rgba(241, 196, 15, 1); } 100% { box-shadow: 0 0 4px rgba(241, 196, 15, 0.5); } }
        .btn-end { background: #c0392b; }
        .btn-play-pause { background: #27ae60; }
        .btn-primary { background: var(--accent); color: white; border: none; padding: 0.5rem 1rem; font-size: 1rem; border-radius: 4px; cursor: pointer; font-weight: bold; transition: filter 0.2s ease; }
        .btn-primary:hover { filter: brightness(1.1); }
        .canvas-container { position: relative; border: 4px solid var(--panel-bg); border-radius: 8px; overflow: hidden; background: url('Pokemon/Backgrounds/main.jpg') no-repeat center / cover; width: 800px; height: 800px; }
        #game-canvas { display: block; image-rendering: pixelated; }
        #tower-menu, #upgrade-menu { position: absolute; pointer-events: none; z-index: 5; }
        .hidden { display: none !important; }
        .radial-btn { position: absolute; background: rgba(52, 73, 94, 0.9); border: 2px solid transparent; cursor: pointer; border-radius: 50%; width: 60px; height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.2s ease, border-color 0.2s ease; color: white; pointer-events: auto; transform: translate(-50%, -50%); box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        .radial-btn:hover:not(:disabled) { border-color: var(--text-light); transform: translate(-50%, -50%) scale(1.1); }
        .radial-btn.upgrade { background: rgba(243, 156, 18, 0.9); border-color: #e67e22; }
        .radial-btn:disabled { background: rgba(127, 140, 141, 0.9); border-color: #95a5a6; cursor: not-allowed; }
        .price-tag { font-size: 0.7rem; font-weight: bold; background: rgba(0,0,0,0.7); padding: 2px 4px; border-radius: 4px; position: absolute; bottom: -10px; }
        .modal { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        #modal-text { font-size: 2.2rem; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; text-shadow: 2px 2px 4px #000; }
        #modal-text.win { color: var(--win-color); }
        #modal-text.lose { color: var(--accent); }
        #unlock-container { display: flex; flex-direction: column; align-items: center; margin-top: 20px; opacity: 0; transform: scale(0); }
        #unlock-container.active { animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .unlock-star { position: relative; font-size: 4rem; line-height: 1; color: #f1c40f; display: flex; justify-content: center; align-items: center; filter: drop-shadow(0 0 15px rgba(241,196,15,1)); }
        #unlock-level-num { position: absolute; font-size: 1.8rem; color: #2c3e50; font-weight: 900; text-shadow: none; margin-top: 3px; font-family: sans-serif; }
        .unlock-text { font-size: 1.2rem; color: #f1c40f; letter-spacing: 4px; margin-top: 10px; text-transform: uppercase; text-shadow: 2px 2px 4px #000; animation: unlockPulse 1s infinite alternate; font-weight: bold; }
        .fade-in { animation: fadeIn 0.5s ease forwards; }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes unlockPulse { 0% { opacity: 0.7; filter: drop-shadow(0 0 5px #f1c40f); } 100% { opacity: 1; filter: drop-shadow(0 0 15px #f1c40f); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .earned-stars-container { font-size: 3.5rem; margin-top: 15px; letter-spacing: 10px; opacity: 0; transform: translateY(-20px); transition: all 0.5s ease; text-shadow: 2px 2px 5px #000; }
        .earned-stars-container.active { opacity: 1; transform: translateY(0); }
        .bonus-unlock-container { display: flex; flex-direction: column; align-items: center; margin-top: 15px; opacity: 0; transform: scale(0.5); transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 10px; border: 1px solid rgba(255, 215, 0, 0.3); }
        .bonus-unlock-container.active { opacity: 1; transform: scale(1); }
        .bonus-unlock-img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #ffd700; box-shadow: 0 0 15px rgba(255,215,0,0.8); background-color: rgba(44, 62, 80, 0.8); background-size: cover; background-position: center; margin-bottom: 8px; }
        .bonus-unlock-text { font-size: 0.9rem; color: #ecf0f1; text-transform: uppercase; letter-spacing: 1px; }

        .pokemon-menu-icon { width: 48px; height: 48px; background-size: cover; background-repeat: no-repeat; background-position: center; image-rendering: auto; border-radius: 50%; overflow: hidden; }
        #info-tooltip { position: absolute; background: rgba(44, 62, 80, 0.75); border: 1px solid #7f8c8d; border-radius: 6px; color: #ecf0f1; padding: 12px; font-size: 0.9rem; pointer-events: none; z-index: 999; width: 240px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 6px; transition: opacity 0.2s ease, visibility 0.2s ease; backdrop-filter: blur(4px); }
        #info-tooltip.hidden { opacity: 0; visibility: hidden; }
        .tooltip-header { font-weight: bold; text-align: center; border-bottom: 1px solid #7f8c8d; padding-bottom: 6px; margin-bottom: 2px; font-size: 1rem; color: #f1c40f; }
        .tooltip-row { display: flex; justify-content: space-between; }
        .tooltip-effects { margin-top: 6px; font-size: 0.8rem; font-style: italic; border-top: 1px dotted #7f8c8d; padding-top: 6px; color: #bdc3c7; }
        .main-menu-bottom { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 20; transition: opacity 0.3s ease; }
        .main-menu-bottom.hidden { opacity: 0; pointer-events: none; }
       .dex-btn { width: 50px; height: 50px; border-radius: 8px; border: 2px solid rgb(79, 87, 32); box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: all 0.2s ease; padding: 0; background-size: cover; background-position: center; background-repeat: no-repeat; cursor: pointer; }
        .dex-btn:hover { transform: scale(1.05); border-color: #d4f543; filter: brightness(1.1); }
        #btn-dex-pokemon { background-image: url('Pokemon/Pictures/Enc-pok.jpg'); }
        #btn-dex-enemies { background-image: url('Pokemon/Pictures/Enc-mon.png'); }
        .dex-modal { position: absolute; inset: 20px; background: rgba(44, 62, 80, 0.98); border: 4px solid var(--panel-bg); border-radius: 12px; z-index: 30; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .dex-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: rgba(0,0,0,0.4); border-bottom: 2px solid var(--panel-bg); }
        .dex-header h2 { margin: 0; font-size: 1.8rem; color: #f1c40f; text-shadow: 1px 1px 3px #000; }
        .close-dex { background: none; border: none; font-size: 1.5rem; cursor: pointer; transition: transform 0.2s; filter: grayscale(1); }
        .close-dex:hover { transform: scale(1.2); filter: grayscale(0); }

       .dex-content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 10px; display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); align-content: start; gap: 8px; box-sizing: border-box; }
        .enemy-card { position: relative; background: rgba(0,0,0,0.6); border: 1px solid #7f8c8d; border-radius: 6px; padding: 6px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; transition: transform 0.2s; box-sizing: border-box; height: 100%; min-height: 120px; overflow: hidden; }
        .enemy-card:hover { transform: translateY(-3px); border-color: #e74c3c; background: rgba(0,0,0,0.8); z-index: 5; }
        .enemy-card h3 { position: relative; z-index: 1; margin: 0; font-size: 0.85rem; color: #e74c3c; width: 100%; text-align: center; text-transform: capitalize; background: rgba(0,0,0,0.6); border-radius: 4px; padding: 2px 0; text-shadow: 1px 1px 2px #000; border-bottom: 1px solid #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .enemy-stats { position: relative; z-index: 1; font-size: 0.75rem; width: 100%; display: flex; flex-direction: column; gap: 2px; color: #ecf0f1; text-align: center; background: rgba(0,0,0,0.6); border-radius: 4px; padding: 4px; text-shadow: 1px 1px 2px #000; box-sizing: border-box; }
        .res-stats { display: flex; justify-content: center; flex-wrap: wrap; gap: 4px; font-size: 0.65rem; margin-top: 2px; }
        .dex-sprite-viewport { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); overflow: hidden; z-index: 0; pointer-events: none; }
        .dex-sprite-strip { position: absolute; left: 0; top: 0; background-repeat: no-repeat; image-rendering: pixelated; }
        @keyframes dex-sprite-walk { from { transform: translateX(0); } to { transform: translateX(-100%); } }
        #pokemon-dex-content { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; padding: 10px; overflow-y: auto; overflow-x: hidden; align-content: start; height: 100%; box-sizing: border-box; }
        .poke-card { position: relative; background: rgba(0,0,0,0.6); border: 1px solid #7f8c8d; border-radius: 6px; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; text-align: center; transition: transform 0.2s; height: 100%; box-sizing: border-box; gap: 8px; min-width: 0; }
        .poke-card:hover { transform: translateY(-3px); border-color: #ffd700; background: rgba(0,0,0,0.9); z-index: 5; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .poke-card h3 { position: relative; z-index: 1; margin: 0; font-size: 0.95rem; width: 100%; background: rgba(0,0,0,0.6); border-radius: 4px; padding: 4px 0; text-shadow: 1px 1px 2px #000; border-bottom: 1px solid #555; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .poke-card .dex-sprite-viewport { position: relative; top: auto; left: auto; transform: none; margin: 5px 0; flex-shrink: 0; z-index: 1; pointer-events: none; }
        .split-stats-container { position: relative; z-index: 1; display: flex; width: 100%; gap: 6px; align-items: stretch; margin-top: auto; }
        .split-stat-block { flex: 1; background: rgba(0,0,0,0.6); border-radius: 4px; padding: 6px; display: flex; flex-direction: column; align-items: center; box-sizing: border-box; justify-content: flex-start; }
        .split-header { font-size: 0.75rem; font-weight: bold; color: #f1c40f; border-bottom: 1px dotted #7f8c8d; width: 100%; margin-bottom: 4px; padding-bottom: 2px; }
        .poke-stats { position: relative; z-index: 1; font-size: 0.8rem; color: #ecf0f1; display: flex; flex-direction: column; gap: 4px; width: 100%; background: rgba(0,0,0,0.6); border-radius: 4px; padding: 6px; text-shadow: 1px 1px 2px #000; box-sizing: border-box; flex-grow: 1; }
        .poke-stats strong { color: #f1c40f; }
        .poke-effects { font-size: 0.75rem; color: #a29bfe; font-style: italic; margin-top: 4px; border-top: 1px dotted #666; padding-top: 4px; line-height: 1.2; }
        #bonus-container { position: absolute; bottom: 20px; left: 20px; display: flex; gap: 10px; z-index: 20; }
        .bonus-btn { width: 50px; height: 50px; border-radius: 8px; border: 3px solid transparent; cursor: pointer; background-size: cover; background-position: center; transition: transform 0.2s, filter 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.5); background-color: rgba(0,0,0,0.5); }
        .bonus-btn.ready { border-color: #ffd700; animation: pulseGold 1.5s infinite; filter: brightness(1.2); }
        .bonus-btn.ready:hover { transform: scale(1.1); }
        .bonus-btn.used { border-color: #7f8c8d; filter: grayscale(1) brightness(0.5); cursor: not-allowed; animation: none; }
        .bonus-btn.selected { border-color: #2ecc71; transform: scale(1.1); animation: none; box-shadow: 0 0 15px #2ecc71; }
        canvas.bonus-placement {     cursor: cell !important; }
        @keyframes pulseGold { 0% { box-shadow: 0 0 5px #ffd700; } 50% { box-shadow: 0 0 20px #ffd700; } 100% { box-shadow: 0 0 5px #ffd700; } }
        .enter-anim-circle { position: absolute; width: 250px; height: 250px; border: 4px solid #ffd700; border-radius: 50%; overflow: hidden; pointer-events: none; z-index: 15; transform: translate(-50%, -50%); box-shadow: 0 0 15px rgba(255, 215, 0, 0.8), inset 0 0 15px rgba(255, 215, 0, 0.8); background: rgba(0,0,0,0.4); opacity: 1; transition: opacity 0.5s ease; }
        .enter-anim-circle img { width: 100%; height: 100%; object-fit: cover; }
        #debug-trigger { position: absolute; top: 0; left: 0; width: 50px; height: 50px; z-index: 1000; cursor: default; }
        #debug-menu { position: absolute; top: 15px; left: 15px; background: var(--panel-bg); border: 2px solid var(--accent); padding: 15px; z-index: 1001; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 10px; }
        #debug-menu label { font-weight: bold; font-size: 0.9rem; color: var(--text-light); }
        #debug-menu input { padding: 5px; border-radius: 4px; border: 1px solid #7f8c8d; background: #2c3e50; color: white; width: 60px; }
    </style>
</head>
<body>
    <div class="main-container">
        <div id="info-tooltip" class="hidden"></div>
        <main class="game-wrapper">
            <section class="canvas-container" id="main-canvas-container">
                <nav class="level-sidebar" id="level-sidebar"></nav>
                <div id="completed-screen" class="hidden"><h1 class="comp-title">COMPLETED</h1><div class="comp-subtitle" id="comp-subtitle"></div><div class="comp-pokes" id="comp-pokes"></div></div>
                <div id="debug-trigger"></div>
                <div id="debug-menu" class="hidden">
                    <label>Odemčeno kol:</label>
                    <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 5px;">
                        <input type="number" id="debug-level-input" min="1" max="10">
                        <button id="debug-save-btn" class="btn-primary" style="padding: 5px 10px; font-size: 0.8rem;">Uložit</button>
                    </div>
                    <button id="debug-win-btn" class="btn-primary" style="padding: 5px 10px; font-size: 0.8rem; background: #27ae60;">Kompletace</button>
                    <button id="debug-last-wave-btn" class="btn-primary" style="padding: 5px 10px; font-size: 0.8rem; background: #f39c12;">Poslední vlna</button>
                </div>
                <header class="game-ui" id="game-ui-header">
                    <div class="stats">
                        <span>🪙 <strong id="gold-display">500</strong></span>
                        <span>❤️ <strong id="lives-display">10</strong></span>
                        <span class="wave-container" style="cursor: help;">Vlna: <strong id="wave-display">0/10</strong></span>
                        <div class="targeting-group">
                            <button id="btn-target-first" class="target-btn active" title="Zaměřit prvního (Nejblíže cíli)">1</button>
                            <button id="btn-target-strongest" class="target-btn" title="Zaměřit nejsilnějšího (Nejvíce Max HP)">💀</button>
                        </div>
                    </div>
                    <div class="top-dex-group">
                        <button id="btn-top-dex-pokemon" class="icon-btn top-dex-btn" aria-label="Pokemon Encyclopedia" title="Encyklopedie Pokémonů"></button>
                        <button id="btn-top-dex-enemies" class="icon-btn top-dex-btn" aria-label="Enemy Encyclopedia" title="Encyklopedie Nepřátel"></button>
                    </div>
                    <div class="controls-group">
                        <button id="btn-play-pause" class="icon-btn btn-play-pause" title="Spustit hru" disabled>
                            <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            <svg class="icon-pause hidden" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        </button>
                        <button id="btn-end-game" class="icon-btn btn-end" title="Ukončit hru" disabled><svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg></button>
                    </div>
                </header>
                <canvas id="game-canvas" width="800" height="800"></canvas>
                <div id="tower-menu" class="hidden" aria-label="Výběr věže"></div>
                <div id="upgrade-menu" class="hidden" aria-label="Vylepšení věže"></div>
                <div id="game-modal" class="modal hidden" role="dialog" aria-labelledby="modal-text">
                    <span id="modal-text"></span>
                    <div id="earned-stars" class="earned-stars-container hidden"></div>
                    <div id="unlock-container" class="hidden">
                        <div class="unlock-text">Unlocked</div>
                    </div>
                    <div id="bonus-unlock" class="bonus-unlock-container hidden">
                        <div id="bonus-img" class="bonus-unlock-img"></div>
                        <div class="bonus-unlock-text">New bonus: <span id="bonus-name" style="color: #ffd700; font-weight: bold;"></span></div>
                    </div>
                    <button id="restart-btn" class="btn-primary hidden" style="margin-top: 1.5rem; font-size: 1.1rem; text-transform: uppercase; background: #7f8c8d; letter-spacing: 1.5px; padding: 10px 25px;">Continue</button>
                </div>
                <div id="bonus-container" class="hidden"></div>
                <nav class="main-menu-bottom" id="main-menu-bottom">
                    <button id="btn-dex-pokemon" class="icon-btn dex-btn" aria-label="Pokemon Encyclopedia" title="Encyklopedie Pokemonů"></button>
                    <button id="btn-dex-enemies" class="icon-btn dex-btn" aria-label="Enemy Encyclopedia" title="Encycklopedie Nepřátel"></button>
                </nav>

                const stats = BONUS_STATS[type]; const bM = getRPGMult('bonus_dmg', 6) ? (1+RPG_CONFIG.bonusDmg) : 1; const sN = type.charAt(0).toUpperCase() + type.slice(1), pK = type.toLowerCase(); let aN = 'Hop'; if (type === 'machamp') aN = 'Punch'; else if (type === 'espeon') aN = 'Attack'; else if (type === 'onix' || type === 'snorlax') aN = 'Shoot'; else if (type === 'vaporeon') aN = 'Swing'; else if (type === 'mewtwo') aN = 'Hover'; const fC = stats.frames; const ad = (ANIM_DATA[pK] && ANIM_DATA[pK][aN]) ? ANIM_DATA[pK][aN] : {width:64, height:64}; const sc = 1.25, dW = Math.floor(ad.width * sc), dH = Math.floor(ad.height * sc), sW = dW * fC, sH = dH * 8, rO = (stats.row || 0) * dH; const atkName = stats.attack || 'Special Attack'; 
                
                html += `<div class="poke-card" style="border-color: #6c5ce7;"><h3 style="color: ${bonusColor}">${sN} (Bonus)</h3><div class="dex-sprite-viewport" style="width: ${dW}px; height: ${dH}px;"><div class="dex-sprite-strip" style="width: ${sW}px; height: ${sH}px; background-image: url('Pokemon/SPRITES/${sN}/${aN}-Anim.png'); background-size: ${sW}px ${sH}px; background-position: left 0 top -${rO}px; animation: dex-sprite-walk 1s steps(${fC}) infinite;"></div></div><div class="poke-stats" style="margin-top: auto; flex-grow: 0;"><div><strong>⚔️ Attack:</strong> ${atkName}</div><div><strong>🎯 Element:</strong> ${stats.element}</div><div><strong>⏳ Duration:</strong> ${stats.duration}s</div><div><strong>⭕ Radius:</strong> ${stats.radius}</div><div><strong>💥 DPS:</strong> ${stats.dmg > 0 ? ((stats.dmg * stats.duration) * bM).toFixed(1).replace('.0', '') : (type === 'mewtwo' ? `${Math.round(10 * bM)} - ${Math.round(100 * bM)}` : '0')}</div></div></div>`; 
            });
            
            ui.pokemonDexContent.innerHTML = html;
        }

        const dbgTrg = document.getElementById('debug-trigger'); const dbgMenu = document.getElementById('debug-menu'); const dbgInp = document.getElementById('debug-level-input');
        dbgTrg.addEventListener('dblclick', (e) => {    e.stopPropagation();    dbgInp.value = maxUnlockedLevel;    dbgMenu.classList.toggle('hidden');});
        document.getElementById('debug-save-btn').addEventListener('click', () => { const nl = parseInt(dbgInp.value); if (nl >= 1 && nl <= 10) { maxUnlockedLevel = nl; localStorage.setItem('pokemonTD_maxLevel', maxUnlockedLevel); for (let k in levelStats) { if (parseInt(k) >= nl) delete levelStats[k]; } localStorage.setItem('pokemonTD_levelStats', JSON.stringify(levelStats)); renderLevelMenu(); dbgMenu.classList.add('hidden'); } });
        document.getElementById('debug-win-btn').addEventListener('click', () => { maxUnlockedLevel = 10; localStorage.setItem('pokemonTD_maxLevel', maxUnlockedLevel); for(let i=1; i<=10; i++) levelStats[i] = 3; localStorage.setItem('pokemonTD_levelStats', JSON.stringify(levelStats)); renderLevelMenu(); if(window.checkUnspentStars) window.checkUnspentStars(); dbgMenu.classList.add('hidden'); });
        document.addEventListener('click', (e) => { if (!dbgMenu.contains(e.target) && e.target !== dbgTrg) dbgMenu.classList.add('hidden'); });


    // ==========================================
    // 8. RPG UPGRADE SYSTÉM
    // ==========================================
    window.upgradeState = JSON.parse(localStorage.getItem('pokemonTD_upgrades')) || {};
    const p = (v) => Math.round(v * 100) + '%';
    const RPG_DATA = {
        dmg_electric: { col: 1, row: 1, max: 3, req: null, bg: 'Pokedex-lightning.jpg', title: `Electric Damage`, desc: `Increases damage by ${p(RPG_CONFIG.dmg)}.` },
        dmg_fire: { col: 1, row: 2, max: 3, req: null, bg: 'Pokedex-fire.jpg', title: `Fire Damage`, desc: `Increases damage by ${p(RPG_CONFIG.dmg)}.` },
        dmg_water: { col: 1, row: 3, max: 3, req: null, bg: 'Pokedex-water.jpg', title: `Water Damage`, desc: `Increases damage by ${p(RPG_CONFIG.dmg)}.` },
        dmg_grass: { col: 1, row: 4, max: 3, req: null, bg: 'Pokedex-grass.jpg', title: `Grass Damage`, desc: `Increases damage by ${p(RPG_CONFIG.dmg)}.` },
        rng_electric: { col: 2, row: 1, max: 3, req: 'dmg_electric', bg: 'Pokedex-lightning.jpg', title: `Electric Range`, desc: `Increases range of electric attacks by ${p(RPG_CONFIG.rng)}.` },
        rng_fire: { col: 2, row: 2, max: 3, req: 'dmg_fire', bg: 'Pokedex-fire.jpg', title: `Fire Range`, desc: `Increases range of fire attacks by ${p(RPG_CONFIG.rng)}.` },
        rng_water: { col: 2, row: 3, max: 3, req: 'dmg_water', bg: 'Pokedex-water.jpg', title: `Water Range`, desc: `Increases range of water attacks by ${p(RPG_CONFIG.rng)}.` },
        rng_grass: { col: 2, row: 4, max: 3, req: 'dmg_grass', bg: 'Pokedex-grass.jpg', title: `Grass Range`, desc: `Increases range of grass attacks by ${p(RPG_CONFIG.rng)}.` },
        aura_electric: { col: 3, row: 1, max: 3, req: 'rng_electric', bg: 'Pokedex-lightning.jpg', title: 'Electric Shield', desc: `Emits electric sparks. ${RPG_CONFIG.aura.elec.dps} DMG/s × LVL.` },
        aura_fire: { col: 3, row: 2, max: 3, req: 'rng_fire', bg: 'Pokedex-fire.jpg', title: 'Orbiting Fire Comet', desc: `Rotating flame. ${RPG_CONFIG.aura.fire.dmg} DMG on touch × LVL.` },
        aura_water: { col: 3, row: 3, max: 3, req: 'rng_water', bg: 'Pokedex-water.jpg', title: 'Freezing Mist', desc: `Slows enemies in range by ${p(RPG_CONFIG.aura.water.slow)}.` },
        aura_grass: { col: 3, row: 4, max: 3, req: 'rng_grass', bg: 'Pokedex-grass.jpg', title: 'Razor Leaves', desc: `Shoots sharp cutting leaves. ${RPG_CONFIG.aura.grass.dmg} DMG × LVL.` },
        bonus_dmg: { col: 4, row: 1, max: 6, req: '5_MAXED', bg: 'Pokedex-multibonus.jpg', title: `Bonus Pokémon Power`, desc: `Increases damage of bonus Pokémon by +${p(RPG_CONFIG.bonusDmg)}.` },
        gold_boost: { col: 4, row: 4, max: 6, req: '5_MAXED', bg: 'Pokedex-money.jpg', title: `Extra Gold`, desc: `Increases gold gained from enemies by ${p(RPG_CONFIG.gold)}.` }
    };
    Object.keys(RPG_DATA).forEach(k => { if (window.upgradeState[k] === undefined) window.upgradeState[k] = 0; });

    (function initRPG() {
        const style = document.createElement('style');
        style.textContent = `
            #btn-upgrades { background: #000; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; }
            @keyframes pulse-rpg-btn {
                0% { box-shadow: 0 0 5px #f1c40f; border-color: transparent; }
                50% { box-shadow: 0 0 20px #f1c40f, inset 0 0 10px rgba(241,196,15,0.3); border-color: #ffd700; }
                100% { box-shadow: 0 0 5px #f1c40f; border-color: transparent; }
            }
            #btn-upgrades.has-stars { animation: pulse-rpg-btn 1.5s infinite; }
            .rpg-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; padding: 20px; overflow-y: auto; flex: 1; }
            .rpg-node { position: relative; width: 80%; justify-self: center; background-color: #34495e; background-size: cover; background-position: center; border: 2px solid #7f8c8d; border-radius: 8px; padding: 22px 8px 8px 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; user-select: none; text-align: center; overflow: hidden; }
            .rpg-node::before { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.25); z-index: 0; pointer-events: none; }
            .rpg-node:hover { filter: brightness(1.15); border-color: #ecf0f1; }
            .rpg-node.locked { opacity: 0.5; pointer-events: none; filter: grayscale(1); }
            .rpg-node.active { border-color: #f1c40f; box-shadow: 0 0 10px rgba(241, 196, 15, 0.9); }
            .rpg-pips { display: flex; gap: 4px; position: absolute; top: 4px; z-index: 1; }
            .pip { font-size: 1.1rem; color: #000; text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff; line-height: 1; }
            .pip.filled { color: #f1c40f; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; }
            .rpg-title { position: relative; z-index: 1; font-size: 0.95rem; font-weight: 900; color: #000; margin-top: 4px; text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff, 0 0 4px #fff; }
            .rpg-desc { position: relative; z-index: 1; font-size: 0.75rem; font-weight: 900; color: #000; margin-top: 4px; line-height: 1.2; text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff, 0 0 3px #fff; }
            .stars-head { font-size: 1.5rem; font-weight: bold; color: #f1c40f; }
        `; 
        document.head.appendChild(style);
        const btn = document.createElement('button'); btn.id = 'btn-upgrades'; btn.className = 'icon-btn dex-btn'; btn.innerHTML = '⭐'; btn.title = 'Strom vylepšení';
        document.getElementById('main-menu-bottom').appendChild(btn);
        
        const modal = document.createElement('div'); modal.id = 'rpg-modal'; modal.className = 'dex-modal hidden'; modal.setAttribute('role', 'dialog');
        modal.innerHTML = `<div class="dex-header"><div style="display:flex; align-items:center; gap: 15px;"><span class="stars-head" id="rpg-stars-display">⭐ 0</span><button id="rpg-reset-btn" class="btn-primary" style="background:#7f8c8d; font-size: 0.7rem; padding: 6px 12px; text-transform: uppercase; letter-spacing: 1px;">Reset</button></div><button class="close-dex" onclick="document.getElementById('rpg-modal').classList.add('hidden')">❌</button></div><div class="rpg-grid" id="rpg-grid"></div>`;
        document.getElementById('main-canvas-container').appendChild(modal);
        
        function getStars() { 
            let earned = 0; Object.values(levelStats).forEach(s => earned += s); 
            let spent = 0; Object.values(window.upgradeState).forEach(v => spent += v); 
            return { earned, spent, avail: earned - spent }; 
        }

        // Globální funkce pro kontrolu z jiných částí kódu
        window.checkUnspentStars = () => {
            if (getStars().avail > 0) btn.classList.add('has-stars');
            else btn.classList.remove('has-stars');
        };
        
        function renderTree() { 
            const grid = document.getElementById('rpg-grid'); grid.innerHTML = ''; 
            const s = getStars(); document.getElementById('rpg-stars-display').textContent = `⭐ ${s.avail}`; 
            
            Object.entries(RPG_DATA).forEach(([id, data]) => { 
                const lvl = window.upgradeState[id];
                let isLocked = false;
                
                if (data.req === '5_MAXED') {
                    const maxedOthers = Object.keys(window.upgradeState).filter(k => k !== id && window.upgradeState[k] >= RPG_DATA[k].max).length;
                    isLocked = maxedOthers < 5;
                } else if (data.req) {
                    isLocked = window.upgradeState[data.req] < RPG_DATA[data.req].max;
                }
                
                const node = document.createElement('div'); 
                node.className = `rpg-node ${isLocked ? 'locked' : ''} ${lvl === data.max ? 'active' : ''}`; 
                node.style.gridColumn = data.col; node.style.gridRow = data.row; 
                node.style.backgroundImage = `url('Pokemon/Pictures/${data.bg}')`; 
                
                let pips = ''; 
                for(let i=0; i<data.max; i++) pips += `<span class="pip ${i < lvl ? 'filled' : ''}">★</span>`; 
                
                node.innerHTML = `<div class="rpg-pips">${pips}</div><div class="rpg-title">${data.title}</div><div class="rpg-desc">${data.desc}</div>`;
                node.onclick = () => { 
                    if(!isLocked && lvl < data.max && getStars().avail > 0) { 
                        window.upgradeState[id]++; 
                        localStorage.setItem('pokemonTD_upgrades', JSON.stringify(window.upgradeState)); 
                        AUDIO.clickShort.currentTime = 0; AUDIO.clickShort.play().catch(()=>{}); 
                        renderTree(); 
                        window.checkUnspentStars(); // Aktualizace po nákupu
                    } 
                }; 
                grid.appendChild(node); 
            }); 
        }
        
        btn.onclick = () => { modal.classList.remove('hidden'); renderTree(); AUDIO.clickShort.currentTime = 0; AUDIO.clickShort.play().catch(()=>{}); };
        document.getElementById('rpg-reset-btn').onclick = () => { 
            Object.keys(window.upgradeState).forEach(k => window.upgradeState[k] = 0); 
            localStorage.setItem('pokemonTD_upgrades', JSON.stringify(window.upgradeState)); 
            renderTree(); 
            window.checkUnspentStars(); // Aktualizace po resetu
        };

        // Zkontroluj hvězdy rovnou při načtení
        window.checkUnspentStars();
    })();

        let mainMusicFading = false; AUDIO.mainScreenMusic.loop = true;
        async function initializeGame() { await Promise.all([loadEnemyImages(), loadAnimData()]); renderLevelMenu(); createRadialMenu(); AUDIO.mainScreenMusic.play().catch(e => console.warn("Autoplay blokován prohlížečem:", e)); }
        initializeGame();
        document.addEventListener('click', () => { if (mainMusicFading || AUDIO.mainScreenMusic.paused) return; mainMusicFading = true; let vol = AUDIO.mainScreenMusic.volume; const fade = setInterval(() => { vol -= 0.1; if (vol <= 0) { AUDIO.mainScreenMusic.volume = 0; AUDIO.mainScreenMusic.pause(); clearInterval(fade); } else AUDIO.mainScreenMusic.volume = vol; }, 50); }, { once: true });
    
        document.getElementById('debug-last-wave-btn').addEventListener('click', () => {
            if (state.gameOver || !state.activeLevelId) return;
            state.currentWaveIndex = state.levelWaves.length - 1;
            state.gameTime = state.levelWaves[state.currentWaveIndex].delay;
            state.wavesActive = true;
            state.isSpawningWave = false;
            ui.iconPlay.classList.add('hidden');
            ui.iconPause.classList.remove('hidden');
            ui.waveDisplay.textContent = `${state.currentWaveIndex + 1}/${state.levelWaves.length}`;
            dbgMenu.classList.add('hidden');
        });
    </script>
