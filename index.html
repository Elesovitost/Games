<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Herní Rozcestník</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #1e272e; /* Čisté tmavé pozadí */
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: system-ui, -apple-system, sans-serif;
      color: #ecf0f1;
    }

    .games-grid {
      display: grid;
      /* Responzivní mřížka: automaticky zalamuje sloupce podle šířky obrazovky */
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 40px;
      max-width: 1000px;
      padding: 40px;
      width: 100%;
      justify-content: center;
    }

    .game-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      /* Plynulý zdvih celé karty při hoveru */
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .game-cover-wrapper {
      width: 200px;
      height: 200px;
      border-radius: 24px;
      background: #2c3e50;
      box-shadow: 0 10px 20px rgba(0,0,0,0.4);
      overflow: hidden;
      border: 4px solid transparent;
      transition: box-shadow 0.3s ease, border 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .game-cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    /* Hover efekty */
    .game-card:hover {
      transform: translateY(-12px);
    }

    .game-card:hover .game-cover-wrapper {
      box-shadow: 0 15px 35px rgba(241, 196, 15, 0.5);
      border-color: #f1c40f;
    }

    .game-card:hover .game-cover {
      transform: scale(1.1); /* Zoom obrázku uvnitř ořezu */
    }

    .game-title {
      margin-top: 16px;
      font-size: 1.2rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      transition: color 0.3s ease;
      text-align: center;
    }

    .game-card:hover .game-title {
      color: #f1c40f;
    }

    /* Efekt po kliknutí */
    .game-card.clicked .game-cover-wrapper {
      animation: pulse-glow 1.5s ease forwards;
    }

    .whiteout {
      position: fixed;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1000ms ease;
      z-index: 9999;
    }

    .whiteout.visible {
      opacity: 1;
    }

    @keyframes pulse-glow {
      0% { filter: brightness(1); transform: scale(1); }
      50% { filter: brightness(1.5) drop-shadow(0 0 20px white); transform: scale(1.05); }
      100% { filter: brightness(3) drop-shadow(0 0 50px white); transform: scale(1.05); }
    }
  </style>
</head>
<body>

  <div class="games-grid" id="games-grid"></div>
  <div class="whiteout" id="whiteout"></div>
  
  <audio id="bg-music" src="index-tech-background.mp3" loop></audio>
  <audio id="poweron-sound" src="index-tech-poweron.mp3"></audio>
  <audio id="hover-hum" src="index-tech-hum.mp3" loop></audio>

  <script>
    const games = [
      { name: 'ABECEDA', file: 'ABC.html', image: 'ABC.webp' },
      { name: 'HADI', file: 'Snakes.html', image: 'Snakes.webp' },
      { name: 'BLUDIŠTĚ', file: 'Maze.html', image: 'Maze.webp' },
      { name: 'HODINY', file: 'Clock.html', image: 'Clock.webp' },
      { name: 'MAKROFÁG', file: 'Macrophage.html', image: 'Macrophage.jpg' },
      { name: 'OBCHOD', file: 'Money.html', image: 'Money.jpg' },
      { name: 'ENGLISH', file: 'ENGLISH.html', image: 'English.jpg' },
      // Nově přidaný Pokémon
      { name: 'POKÉMON', file: 'Pokemon.html', image: 'Pokemon.jpg' } 
    ];

    const grid = document.getElementById('games-grid');
    const whiteout = document.getElementById('whiteout');
    const bgMusic = document.getElementById('bg-music');
    const powerSound = document.getElementById('poweron-sound');
    const humSound = document.getElementById('hover-hum');
    humSound.volume = 0.3;

    // Generování HTML pro každou hru
    games.forEach(game => {
      const card = document.createElement('div');
      card.className = 'game-card';
      
      // Implementován fallback (onerror) v případě, že chybí obrázek (např. u Pokémona)
      card.innerHTML = `
        <div class="game-cover-wrapper">
          <img src="${game.image}" alt="${game.name}" class="game-cover" 
               onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'200\\' height=\\'200\\'><rect width=\\'200\\' height=\\'200\\' fill=\\'%2334495e\\'/><text x=\\'50%\\' y=\\'50%\\' fill=\\'%23ecf0f1\\' font-family=\\'sans-serif\\' font-size=\\'24\\' text-anchor=\\'middle\\' dy=\\'.3em\\'>?</text></svg>'">
        </div>
        <div class="game-title">${game.name}</div>
      `;

      card.addEventListener('click', () => {
        if (card.classList.contains('clicked')) return;

        powerSound.currentTime = 0;
        powerSound.play().catch(() => {});
        bgMusic.pause();

        card.classList.add('clicked');

        setTimeout(() => whiteout.classList.add('visible'), 500);
        setTimeout(() => window.location.href = game.file, 1500);
      });

      card.addEventListener('mouseenter', () => {
        humSound.currentTime = 0;
        humSound.play().catch(() => {});
      });

      card.addEventListener('mouseleave', () => {
        humSound.pause();
        humSound.currentTime = 0;
      });

      grid.appendChild(card);
    });

    // Inicializace audia při první interakci uživatele
    function StartAction() {
      const startMusic = () => {
        bgMusic.volume = 0.5;
        bgMusic.play().catch(() => {});
        
        // Přehrání a okamžitá pauza humSound odblokuje audio kontext prohlížeče
        humSound.play().then(() => {
          humSound.pause();
          humSound.currentTime = 0;
        }).catch(() => {});

        window.removeEventListener('mousemove', startMusic);
      };

      window.addEventListener('mousemove', startMusic);
    }
    
    StartAction();

    // Reset při návratu zpět na stránku pomocí tlačítka "Zpět" v prohlížeči
    window.addEventListener('pageshow', (event) => {
      if (event.persisted) {
        location.reload();
      }
    });
  </script>
</body>
</html>
